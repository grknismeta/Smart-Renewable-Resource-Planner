<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SRRP — Responsive Prototip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="tokens.css"/>
  <style>
    body { background: #0B0E14; }
    @keyframes srrp-pulse {
      0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.6; }
      100% { transform: translate(-50%, -50%) scale(2.4); opacity: 0; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="app-shell.jsx"></script>

  <script type="text/babel">
    const Intro = () => (
      <div style={{ width: 1100, padding: '24px 28px', background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 18, color: 'var(--text)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
          <div style={{ width: 36, height: 36, borderRadius: 10, background: 'linear-gradient(135deg, var(--solar), var(--wind))', display: 'grid', placeItems: 'center' }}>
            <Icon name="globe" size={18} color="white"/>
          </div>
          <div>
            <div style={{ font: '700 18px/1 var(--font)', letterSpacing: '-.01em' }}>SRRP · Uçtan Uca Responsive Prototip</div>
            <div style={{ font: '500 12px/1.4 var(--font)', color: 'var(--text-3)', marginTop: 4 }}>Desktop · Tablet · Mobile — aynı paylaşımlı state, üç farklı düzen.</div>
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 10, marginTop: 10 }}>
          {[
            ['Sol panel', 'Senaryolar (varsayılan) + Pinlerim sekmeli'],
            ['Marker', 'Operasyon (CF halka) ↔ Trend (sparkline) toggle + cluster'],
            ['Ekleme', 'Tıkla → popover → "Detaylı düzenle" panel'],
            ['Detay', 'Desktop: sağ panel · Mobile/Tablet: bottom sheet'],
          ].map(([k, v], i) => (
            <div key={i} style={{ padding: 10, background: 'rgba(0,0,0,.25)', borderRadius: 10, border: '1px solid var(--border-2)' }}>
              <div style={{ font: '500 10px/1 var(--font)', color: 'var(--accent)', textTransform: 'uppercase', letterSpacing: '.06em' }}>{k}</div>
              <div style={{ font: '500 12px/1.4 var(--font)', color: 'var(--text-2)', marginTop: 6 }}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 14, padding: 12, background: 'rgba(20,184,166,.06)', border: '1px solid rgba(20,184,166,.25)', borderRadius: 10, font: '500 12px/1.5 var(--font)', color: 'var(--text-2)' }}>
          <b style={{ color: 'var(--accent)' }}>Etkileşimli:</b> Pin'lere tıkla, sol paneldeki sekmeleri değiştir, harita üst sağındaki marker mode toggle'ı dene, "Yeni Kaynak Ekle" butonuna bas — popover sonra detaylı panel açılır. Her artboard'ı çift tıklayarak fullscreen odakla.
        </div>
      </div>
    );

    const App = () => (
      <DesignCanvas title="SRRP · Responsive Prototip">
        <DCSection id="intro" title="00 · Brief">
          <DCArtboard id="brief" label="Tasarım kararları" width={1100} height={250}>
            <Intro/>
          </DCArtboard>
        </DCSection>
        <DCSection id="desktop" title="01 · Desktop (1280×800)">
          <DCArtboard id="desktop-1" label="Harita + senaryo paneli + üretim özeti" width={1280} height={800}>
            <DesktopApp/>
          </DCArtboard>
        </DCSection>
        <DCSection id="tablet" title="02 · Tablet (820×1180 — iPad portrait)">
          <DCArtboard id="tablet-1" label="Compact rail + sekmeli panel" width={820} height={1180}>
            <TabletApp/>
          </DCArtboard>
        </DCSection>
        <DCSection id="mobile" title="03 · Mobile (390×844 — iPhone)">
          <DCArtboard id="mobile-1" label="Bottom-sheet'lerle akış" width={430} height={930}>
            <IOSFrame device="iphone-15" theme="black">
              <MobileApp/>
            </IOSFrame>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
