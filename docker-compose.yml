version: '3.8'

services:
  # --- PostgreSQL + PostGIS ---
  db:
    image: postgis/postgis:16-3.4
    container_name: srrp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: srrp_admin
      POSTGRES_PASSWORD: srrp_secure_2026
      POSTGRES_DB: srrp_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U srrp_admin -d srrp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: srrp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- FastAPI Backend ---
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: srrp_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://srrp_admin:srrp_secure_2026@db:5432/srrp_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=9a8b7c6d5e4f3a2b1c0d9e8f7a6b5c4d3e2f1a0b9c8d7e6f5a4b3c2d1e0f
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - backend_data:/app/data

volumes:
  pgdata:
  redisdata:
  backend_data:
