    // ── 3D Terrain ─────────────────────────────────────────────────
    // 2026-05-17 Sprint S2 — AWS Open Data Terrain Tiles (terrarium PNG).
    // Eski MapLibre demo tile'ları düşük resolution + sınırlıydı; AWS
    // Mapzen mirror (S3) global yüksek resolution DEM ücretsiz sağlar.
    // Encoding: terrarium (R,G,B → elevation = (R*256 + G + B/256) - 32768)
    // CDN: https://registry.opendata.aws/terrain-tiles/

    var _srrpTerrainExaggeration = 1.5;

    window.srrpSetTerrain = function (enable, exaggeration) {
      const map = window._srrpMap;
      if (!map) return;
      if (typeof exaggeration === 'number' && exaggeration > 0) {
        _srrpTerrainExaggeration = exaggeration;
      }
      try {
        if (enable) {
          if (!map.getSource('srrp-dem')) {
            map.addSource('srrp-dem', {
              type: 'raster-dem',
              tiles: [
                'https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'
              ],
              encoding: 'terrarium',
              tileSize: 256,
              maxzoom: 15,
              attribution: 'Mapzen / AWS Open Data'
            });
          }
          map.setTerrain({
            source: 'srrp-dem',
            exaggeration: _srrpTerrainExaggeration
          });

          // 2026-05-19 — Hillshade gölgelendirme: 3D algısı dramatic artar.
          // Dağlar koyu/açık gradient ile yükseklik hissi verir. Choropleth
          // üstüne uygulanır (paint'in altında değil; sınır çizgilerinin
          // altında). Kullanıcı raporu: "kabartma var ama yüksekliği
          // anlamıyorum" → bu fix.
          if (!map.getLayer('srrp-hillshade')) {
            // Choropleth fill'in HEMEN ÜSTÜNE ekle (gölge data'yı renksel
            // olarak desteklesin); sınır çizgilerinin altında kalsın.
            var beforeLayerId = undefined;
            try {
              if (map.getLayer('srrp-provinces-line')) {
                beforeLayerId = 'srrp-provinces-line';
              }
            } catch (_) {}
            map.addLayer({
              id: 'srrp-hillshade',
              type: 'hillshade',
              source: 'srrp-dem',
              paint: {
                'hillshade-shadow-color': '#000000',
                'hillshade-highlight-color': '#ffffff',
                'hillshade-accent-color': '#454545',
                'hillshade-exaggeration': 0.55,
                'hillshade-illumination-direction': 335,  // KKB öğle güneşi
                'hillshade-illumination-anchor': 'viewport',
              }
            }, beforeLayerId);
          }
        } else {
          map.setTerrain(null);
          // Hillshade'i de kaldır
          try { if (map.getLayer('srrp-hillshade')) map.removeLayer('srrp-hillshade'); } catch (_) {}
          // Kaynak hata vermeden kaldır
          try { if (map.getSource('srrp-dem')) map.removeSource('srrp-dem'); } catch (_) {}
        }
      } catch (e) { console.error('[SRRP] srrpSetTerrain:', e); }
    };

    /**
     * Hillshade gölge yoğunluğunu ayarla (0.0-1.5).
     * Layers panel slider'ı bunu çağırır.
     */
    window.srrpSetHillshadeIntensity = function (intensity) {
      const map = window._srrpMap;
      if (!map || typeof intensity !== 'number') return;
      var v = Math.max(0, Math.min(1.5, intensity));
      try {
        if (map.getLayer('srrp-hillshade')) {
          map.setPaintProperty('srrp-hillshade', 'hillshade-exaggeration', v);
        }
      } catch (e) { console.error('[SRRP] srrpSetHillshadeIntensity:', e); }
    };

    /**
     * 2026-05-27 (O1/O2) — İzohips (contour) overlay.
     *   srrpToggleContour(enabled, opacity, source)
     *     enabled: bool — aç/kapa
     *     opacity: 0-1 — overlay görünürlüğü
     *     source : 'opentopo' (raster, default) | 'self' (vektör MVT)
     *
     * - 'opentopo' : OpenTopoMap raster tile (CC-BY-SA, ~10K req/saat).
     * - 'self'     : Kendi MVT contour endpoint'imiz
     *                /api/v1/tiles/contour/{z}/{x}/{y}.pbf (O2 pipeline).
     *                mbtiles yoksa tile'lar boş döner (204) → harita boş çizer,
     *                Dart tarafı meta endpoint'ini kontrol edip fallback yapar.
     *
     * Kaynak değişiminde eski layer/source temizlenir.
     */
    var _srrpContourMode = null; // 'opentopo' | 'self' | null

    function _srrpRemoveContour() {
      const map = window._srrpMap;
      if (!map) return;
      // Raster
      try { if (map.getLayer('srrp-contour')) map.removeLayer('srrp-contour'); } catch (_) {}
      try { if (map.getSource('srrp-contour-src')) map.removeSource('srrp-contour-src'); } catch (_) {}
      // Vektör
      try { if (map.getLayer('srrp-contour-line')) map.removeLayer('srrp-contour-line'); } catch (_) {}
      try { if (map.getLayer('srrp-contour-label')) map.removeLayer('srrp-contour-label'); } catch (_) {}
      try { if (map.getSource('srrp-contour-vec')) map.removeSource('srrp-contour-vec'); } catch (_) {}
      _srrpContourMode = null;
    }

    function _srrpContourBeforeLayer() {
      const map = window._srrpMap;
      try {
        if (map.getLayer('srrp-provinces-line')) return 'srrp-provinces-line';
        if (map.getLayer('srrp-districts-line')) return 'srrp-districts-line';
      } catch (_) {}
      return undefined;
    }

    window.srrpToggleContour = function (enabled, opacity, source) {
      const map = window._srrpMap;
      if (!map) return;
      var op = (typeof opacity === 'number')
        ? Math.max(0, Math.min(1, opacity))
        : 0.5;
      var mode = (source === 'self') ? 'self' : 'opentopo';
      try {
        if (!enabled) { _srrpRemoveContour(); return; }

        // Kaynak değiştiyse önce temizle
        if (_srrpContourMode && _srrpContourMode !== mode) {
          _srrpRemoveContour();
        }

        var beforeLayerId = _srrpContourBeforeLayer();

        if (mode === 'opentopo') {
          if (!map.getSource('srrp-contour-src')) {
            map.addSource('srrp-contour-src', {
              type: 'raster',
              tiles: [
                'https://a.tile.opentopomap.org/{z}/{x}/{y}.png',
                'https://b.tile.opentopomap.org/{z}/{x}/{y}.png',
                'https://c.tile.opentopomap.org/{z}/{x}/{y}.png',
              ],
              tileSize: 256,
              maxzoom: 17,
              attribution:
                '© <a href="https://opentopomap.org">OpenTopoMap</a> (CC-BY-SA)',
            });
          }
          if (!map.getLayer('srrp-contour')) {
            map.addLayer({
              id: 'srrp-contour',
              type: 'raster',
              source: 'srrp-contour-src',
              paint: { 'raster-opacity': op },
            }, beforeLayerId);
          } else {
            map.setPaintProperty('srrp-contour', 'raster-opacity', op);
          }
        } else {
          // self-hosted vektör MVT
          var base = (window.SRRP_API_BASE || 'http://localhost:8000').replace(/\/$/, '');
          if (!map.getSource('srrp-contour-vec')) {
            map.addSource('srrp-contour-vec', {
              type: 'vector',
              tiles: [base + '/api/v1/tiles/contour/{z}/{x}/{y}.pbf'],
              minzoom: 8,
              maxzoom: 14,
              attribution: '© SRRP / SRTM (NASA)',
            });
          }
          if (!map.getLayer('srrp-contour-line')) {
            map.addLayer({
              id: 'srrp-contour-line',
              type: 'line',
              source: 'srrp-contour-vec',
              'source-layer': 'contour',
              paint: {
                'line-color': '#8B4513',
                'line-opacity': op,
                // 100m'nin katları (ana izohips) daha kalın
                'line-width': [
                  'interpolate', ['linear'], ['zoom'],
                  8, 0.4,
                  12, 0.8,
                  14, 1.2,
                ],
              },
            }, beforeLayerId);
          } else {
            map.setPaintProperty('srrp-contour-line', 'line-opacity', op);
          }
        }
        _srrpContourMode = mode;
      } catch (e) { console.error('[SRRP] srrpToggleContour:', e); }
    };

    /** Contour opacity güncelle (aktif moda göre). */
    window.srrpSetContourOpacity = function (opacity) {
      const map = window._srrpMap;
      if (!map || typeof opacity !== 'number') return;
      var v = Math.max(0, Math.min(1, opacity));
      try {
        if (map.getLayer('srrp-contour')) {
          map.setPaintProperty('srrp-contour', 'raster-opacity', v);
        }
        if (map.getLayer('srrp-contour-line')) {
          map.setPaintProperty('srrp-contour-line', 'line-opacity', v);
        }
      } catch (e) { console.error('[SRRP] srrpSetContourOpacity:', e); }
    };

    /**
     * Terrain aktifken sadece exaggeration değiştir (kaynağı yeniden yükleme).
     * Layers panel slider'ı bunu çağırır.
     */
    window.srrpSetTerrainExaggeration = function (exaggeration) {
      const map = window._srrpMap;
      if (!map || typeof exaggeration !== 'number' || exaggeration <= 0) return;
      _srrpTerrainExaggeration = exaggeration;
      try {
        if (map.getSource('srrp-dem')) {
          map.setTerrain({ source: 'srrp-dem', exaggeration: exaggeration });
        }
      } catch (e) { console.error('[SRRP] srrpSetTerrainExaggeration:', e); }
    };

    // ── Sky layer (terrain ile birlikte atmosfer görünümü) ─────────

    window.srrpSetSky = function (enable) {
      const map = window._srrpMap;
      if (!map) return;
      try {
        if (enable) {
          if (!map.getLayer('srrp-sky')) {
            map.addLayer({
              id: 'srrp-sky',
              type: 'sky',
              paint: {
                'sky-type': 'atmosphere',
                'sky-atmosphere-sun': [0.0, 90.0],
                'sky-atmosphere-sun-intensity': 15
              }
            });
          }
        } else {
          if (map.getLayer('srrp-sky')) map.removeLayer('srrp-sky');
        }
      } catch (e) { console.error('[SRRP] srrpSetSky:', e); }
    };

    // ── Globe projeksiyon ──────────────────────────────────────────
    // style.setProjection() Flutter paketi üzerinden 4.7.1'de bozuk; JS shim kullan.

    window.srrpSetGlobe = function (enable) {
      const map = window._srrpMap;
      if (!map) return;

      // İl/ilçe sınır çizgilerini gizle/göster
      var borderLayerIds = ['srrp-provinces-line', 'srrp-districts-line'];

      try {
        map.setProjection({ type: enable ? 'globe' : 'mercator' });
        if (enable) {
          // Global mod: sınır kısıtlamasını kaldır, dünya gezinebilir.
          // 2026-06-05: _srrpGlobeActive bayrağı — style.load handler'ı globe
          // açıkken TR sınırını ZORLAMASIN (yoksa dünya görünümü kırılırdı).
          window._srrpGlobeActive = true;
          window._srrpSavedMaxBounds = map.getMaxBounds();
          map.setMaxBounds(null);
          // İl/ilçe sınırlarını gizle
          borderLayerIds.forEach(function(id) {
            try { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'none'); } catch(_) {}
          });
          // Seçim katmanlarını da gizle
          ['srrp-sel-hit', 'srrp-sel-hover', 'srrp-sel-extrusion', 'srrp-sel-unique-fill'].forEach(function(id) {
            try { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'none'); } catch(_) {}
          });
          console.log('[SRRP] Globe ON — maxBounds kaldırıldı, sınırlar gizlendi');
        } else {
          // Türkiye moduna dön
          // 2026-06-05: globe bayrağını kapat + TR varsayılan sınırını geri uygula
          // (stale _srrpSavedMaxBounds yerine sabit TR kutusu → her zaman doğru).
          window._srrpGlobeActive = false;
          window._srrpSavedMaxBounds = null;
          window._srrpDesiredMaxBounds = window._SRRP_TR_BOUNDS;
          map.setMaxBounds(window._SRRP_TR_BOUNDS);
          // 2. İl/ilçe sınırlarını tekrar göster
          borderLayerIds.forEach(function(id) {
            try { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'visible'); } catch(_) {}
          });
          // 3. Seçim katmanlarını tekrar göster
          ['srrp-sel-hit', 'srrp-sel-hover', 'srrp-sel-extrusion', 'srrp-sel-unique-fill'].forEach(function(id) {
            try { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'visible'); } catch(_) {}
          });
          // 4. Türkiye üzerinde değilse animasyonlu olarak Türkiye'ye dön
          var center = map.getCenter();
          var isOverTurkey = center.lng >= 25 && center.lng <= 45 &&
                             center.lat >= 35 && center.lat <= 43;
          if (!isOverTurkey) {
            map.flyTo({
              center: [35.2, 39.0],
              zoom: 6,
              duration: 2000,
              essential: true
            });
          }
          console.log('[SRRP] Globe OFF — maxBounds geri yüklendi, sınırlar gösterildi');
        }
      } catch (e) { console.error('[SRRP] srrpSetGlobe:', e); }
    };

    // ── Tıklama Sorgusu (queryRenderedFeatures) ───────────────────────
    // Flutter Web'de MapLibre'nin layer-specific click handler'ları çalışmaz
    // (platform view event routing sorunu). Bunun yerine Dart MapEventClick'ten
    // koordinat alınır ve bu fonksiyon ile hangi feature'a tıklandığı sorgulanır.
    // Dönen JSON: {type: 'pin'|'selection'|'none', properties: {...}}
    window.srrpQueryClick = function(lng, lat) {
      var map = window._srrpMap;
      // Defensive: map yoksa veya style yüklenmemişse (reload sırasında) erken çık.
      if (!map || typeof map.getLayer !== 'function' || typeof map.queryRenderedFeatures !== 'function') {
        console.log('[SRRP-Q] EARLY-EXIT: map veya getLayer/queryRenderedFeatures yok');
        return '{"type":"none"}';
      }
      // NOT: map.isStyleLoaded() KULLANMA — sürekli tile yükleme sırasında hep
      // false döner. Bunun yerine custom _srrpStyleReady flag (ilk style.load
      // sonra true). Bkz: https://github.com/maplibre/maplibre-gl-js/issues/1683
      if (!window._srrpStyleReady) {
        console.log('[SRRP-Q] EARLY-EXIT: ilk style.load henüz fire etmedi');
        return '{"type":"none"}';
      }
      // 2026-05-17 — clickGuard early-exit KALDIRILDI. Eski davranış: guard
      // aktifken queryClick komple atlanıyordu → pinler arası geçiş çalışmaz.
      // Yeni: query her zaman yapılır; Dart tarafı (`_onMapClick`) guard'a
      // göre pin haricini yutar, pin tıklamasına izin verir (pop-up açıkken
      // başka pine geçiş).

      // Diagnostic — hangi layer'lar mevcut, click anında ne durumda?
      var diag = {
        pins:    !!map.getLayer('srrp-pins-circles'),
        cluster: !!map.getLayer('srrp-cluster-single'),
        selHit:  !!map.getLayer('srrp-sel-hit'),
        selFb:   !!map.getLayer('srrp-sel-hit-prov-fallback'),
        choro:   !!map.getLayer('srrp-choropleth-fill'),
      };
      console.log('[SRRP-Q] click @' + lng.toFixed(3) + ',' + lat.toFixed(3) + ' | layers:', diag);

      try {
        var point = map.project([lng, lat]);

        // 1. Pin katmanı (normal + cluster tekil)
        var pinLayers = [];
        if (diag.pins) pinLayers.push('srrp-pins-circles');
        if (diag.cluster) pinLayers.push('srrp-cluster-single');

        if (pinLayers.length > 0) {
          // 3D/eğimli görünümde de çalışması için geniş bbox kullan
          var bbox = [[point.x - 12, point.y - 12], [point.x + 12, point.y + 12]];
          var pinHits = map.queryRenderedFeatures(bbox, { layers: pinLayers });
          if (pinHits.length > 0) {
            console.log('[SRRP-Q] -> PIN match');
            var props = pinHits[0].properties;
            return JSON.stringify({ type: 'pin', properties: props });
          }
        }

        // 2. Seçim katmanı (il/ilçe/bölge) + fallback layer
        if (diag.selHit) {
          var selHits = map.queryRenderedFeatures(point, { layers: ['srrp-sel-hit'] });
          console.log('[SRRP-Q] sel-hit query result:', selHits.length);
          if (selHits.length > 0) {
            var selProps = selHits[0].properties;
            console.log('[SRRP-Q] -> SELECTION match', selProps);
            return JSON.stringify({ type: 'selection', properties: selProps });
          }
        }
        if (diag.selFb) {
          var fbHits = map.queryRenderedFeatures(point, { layers: ['srrp-sel-hit-prov-fallback'] });
          console.log('[SRRP-Q] sel-fb query result:', fbHits.length);
          if (fbHits.length > 0) {
            var fbProps = fbHits[0].properties || {};
            return JSON.stringify({ type: 'selection', properties: fbProps });
          }
        }

        // 3. Cluster bubble tıklaması → zoom in
        if (map.getLayer('srrp-cluster-circles')) {
          var clusterHits = map.queryRenderedFeatures(point, { layers: ['srrp-cluster-circles'] });
          if (clusterHits.length > 0) {
            var clusterId = clusterHits[0].properties.cluster_id;
            var src = map.getSource('srrp-pins-cluster');
            if (src && clusterId !== undefined) {
              src.getClusterExpansionZoom(clusterId, function(err, zoom) {
                if (!err) {
                  map.easeTo({
                    center: clusterHits[0].geometry.coordinates,
                    zoom: zoom,
                    duration: 500
                  });
                }
              });
            }
            return JSON.stringify({ type: 'cluster' });
          }
        }

        // 4. Choropleth katmanı tıklaması (ilçe tematik harita)
        if (diag.choro) {
          var choroHits = map.queryRenderedFeatures(point, { layers: ['srrp-choropleth-fill'] });
          console.log('[SRRP-Q] choro query result:', choroHits.length);
          if (choroHits.length > 0) {
            var choroProps = choroHits[0].properties || {};

      try { map.addLayer({ id:'srrp-pins-shadow', type:'circle', source:SRC, paint:{

    // ── 3D Binalar (akıllı source-layer tespiti) ───────────────────

    window.srrpAddBuildings = function (beforeId) {
      const map = window._srrpMap;
      if (!map) return false;
      try {
        const style = map.getStyle();
        if (!style || !style.sources) return false;

        // Source adını auto-detect et
        const candidates = ['omnt', 'openmaptiles', 'vectorTiles', 'composite'];
        let sourceId = null;
        for (const c of candidates) {
          if (style.sources[c] && style.sources[c].type === 'vector') {
            sourceId = c;
            break;
          }
        }
        if (!sourceId) {
          console.warn('[SRRP] 3D buildings: vektör kaynak bulunamadı. Mevcut kaynaklar:', Object.keys(style.sources));
          return false;
        }
        console.log('[SRRP] 3D buildings: kaynak =', sourceId);

        if (map.getLayer('srrp-buildings-3d')) map.removeLayer('srrp-buildings-3d');

        // Stile ait bina katmanlarını gizle (çift katman önleme)

          type: 'fill-extrusion',
          source: sourceId,
          'source-layer': 'building',

              80,  '#5ba4e8',

    // ── Windy-Tarzı Rüzgar Akış Görselleştirmesi v3 ────────────────────────────
    // Full-trail-redraw yaklaşımı: her frame canvas temizlenir, her parçacığın
    // lon/lat trail'i map.project() ile yeniden çizilir.
    //
    // Avantajları:
    //  ✓ Gri birikim (alpha residue) olmaz
    //  ✓ Pan/zoom sırasında izler doğru pozisyonda kalır
    //  ✓ Dikdörtgen sınır görünmez
    //  ✓ Move handler'a gerek yok

    window.srrpStartWindParticles = function (geojsonStr) {
      const map = window._srrpMap;
      if (!map) return;
      window.srrpStopWindParticles();

      let data;
      try { data = JSON.parse(geojsonStr); } catch (e) {
        console.error('[SRRP] wind: GeoJSON parse hatası', e);
        return;
      }

      const vectors = data.features
        .filter(f => f.properties.speed > 0.3)
        .map(f => {
          const bRad = f.properties.bearing * Math.PI / 180;
          return {
            lon:   f.geometry.coordinates[0],
            lat:   f.geometry.coordinates[1],
            u:     Math.sin(bRad) * f.properties.speed,
            v:     Math.cos(bRad) * f.properties.speed,
            speed: f.properties.speed,
          };
        });

      if (vectors.length === 0) return;

      // ─── Grid sınırları — geniş tutarak dikdörtgen kenarını görünmez yap ───
      const B = { minLon: 22.0, maxLon: 48.0, minLat: 33.0, maxLat: 45.0 };

      // ─── IDW Bilinear Interpolasyon Grid ───
      const GW = 100, GH = 50;
      const gridU = new Float32Array(GW * GH);
      const gridV = new Float32Array(GW * GH);
      const gridS = new Float32Array(GW * GH);

      (function buildGrid() {
        // Vektörlerin konveks zarf mesafesini hesapla
        for (let gy = 0; gy < GH; gy++) {
          for (let gx = 0; gx < GW; gx++) {
            const lon = B.minLon + (gx + 0.5) * (B.maxLon - B.minLon) / GW;
            const lat = B.minLat + (gy + 0.5) * (B.maxLat - B.minLat) / GH;

            // Hızlı IDW: en yakın 4 vektör (daha fazla vektörle daha doğru ama yavaş)
            let n0d = Infinity, n1d = Infinity, n2d = Infinity, n3d = Infinity;
            let n0 = null, n1 = null, n2 = null, n3 = null;
            for (let vi = 0; vi < vectors.length; vi++) {
              const vec = vectors[vi];
              const d2 = (vec.lon - lon) ** 2 + (vec.lat - lat) ** 2;
              if (d2 < n0d) { n3d=n2d; n3=n2; n2d=n1d; n2=n1; n1d=n0d; n1=n0; n0d=d2; n0=vec; }
              else if (d2 < n1d) { n3d=n2d; n3=n2; n2d=n1d; n2=n1; n1d=d2; n1=vec; }
              else if (d2 < n2d) { n3d=n2d; n3=n2; n2d=d2; n2=vec; }
              else if (d2 < n3d) { n3d=d2; n3=vec; }
            }

            let wSum = 0, uSum = 0, vSum = 0;
            var nn = [n0, n1, n2, n3]; var nd = [n0d, n1d, n2d, n3d];
            for (let k = 0; k < 4; k++) {
              if (!nn[k]) continue;
              const w = 1.0 / (nd[k] + 0.0001);
              uSum += nn[k].u * w;
              vSum += nn[k].v * w;
              wSum += w;
            }

            const idx = gy * GW + gx;
            if (wSum > 0) {
              gridU[idx] = uSum / wSum;
              gridV[idx] = vSum / wSum;
              gridS[idx] = Math.sqrt((uSum / wSum) ** 2 + (vSum / wSum) ** 2);
            }

            // En yakın veri noktası çok uzaksa → hızı sıfırla (Türkiye dışı)
            if (n0d > 4.0) { gridU[idx] = 0; gridV[idx] = 0; gridS[idx] = 0; }
          }
        }
      })();

      // Bilinear interpolasyon
      function gridLookup(lon, lat) {
        const fx = (lon - B.minLon) / (B.maxLon - B.minLon) * GW - 0.5;
        const fy = (lat - B.minLat) / (B.maxLat - B.minLat) * GH - 0.5;
        const gx0 = Math.max(0, Math.min(GW - 2, Math.floor(fx)));
        const gy0 = Math.max(0, Math.min(GH - 2, Math.floor(fy)));
        const tx = fx - gx0, ty = fy - gy0;
        const i00 = gy0 * GW + gx0, i10 = i00 + 1;
        const i01 = i00 + GW, i11 = i01 + 1;
        const a = (1-tx)*(1-ty), b = tx*(1-ty), c = (1-tx)*ty, d = tx*ty;
        return {
          u:     gridU[i00]*a + gridU[i10]*b + gridU[i01]*c + gridU[i11]*d,
          v:     gridV[i00]*a + gridV[i10]*b + gridV[i01]*c + gridV[i11]*d,
          speed: gridS[i00]*a + gridS[i10]*b + gridS[i01]*c + gridS[i11]*d,
        };
      }

      // ─── Zoom-adaptif parametreler ───
      function getZoomParams() {
        const z = map.getZoom();
        if (z < 7)  return { count: 600,  minSpd: 3.0, trailLen: 30, maxAge: 4.5, speedMul: 5.0  };
        if (z < 9)  return { count: 900,  minSpd: 1.5, trailLen: 25, maxAge: 3.5, speedMul: 4.0  };
        if (z < 11) return { count: 1200, minSpd: 0.8, trailLen: 20, maxAge: 3.0, speedMul: 3.0  };
        return              { count: 1500, minSpd: 0.3, trailLen: 16, maxAge: 2.5, speedMul: 2.0  };
      }

      // ─── Windy renk paleti ───
      function speedColor(spd, alpha) {
        let r, g, b2;
        if (spd < 2) {
          const t = spd / 2;
          r = 60 + t * 20;  g = 100 + t * 80;  b2 = 180 + t * 40;
        } else if (spd < 4) {
          const t = (spd - 2) / 2;
          r = 80 - t * 20;  g = 180 + t * 50;  b2 = 220 + t * 15;
        } else if (spd < 7) {
          const t = (spd - 4) / 3;
          r = 60 + t * 80;  g = 230 + t * 10;  b2 = 235 - t * 150;
        } else if (spd < 10) {
          const t = (spd - 7) / 3;
          r = 140 + t * 115; g = 240 - t * 40;  b2 = 85 - t * 55;
        } else if (spd < 14) {
          const t = (spd - 10) / 4;
          r = 255;            g = 200 - t * 130; b2 = 30 + t * 10;
        } else {
          const t = Math.min((spd - 14) / 8, 1);
          r = 255;            g = 70 + t * 100;  b2 = 40 + t * 140;
        }
        return 'rgba(' + Math.round(r) + ',' + Math.round(g) + ',' + Math.round(b2) + ',' + alpha.toFixed(3) + ')';
      }

      function speedWidth(spd) {
        if (spd < 2)  return 0.8;
        if (spd < 5)  return 1.2;
        if (spd < 8)  return 1.8;
        if (spd < 12) return 2.5;
        return 3.2;
      }

      // ─── Canvas oluşturma ───
      const container = map.getContainer();
      container.style.position = 'relative';
      const mlCanvas = map.getCanvas();

      function _windCanvasSize() {
        var rect = container.getBoundingClientRect();
        if (rect.width > 0 && rect.height > 0) return { w: Math.round(rect.width), h: Math.round(rect.height) };
        if (mlCanvas.width > 0 && mlCanvas.height > 0) return { w: mlCanvas.width, h: mlCanvas.height };
        if (container.clientWidth > 0) return { w: container.clientWidth, h: container.clientHeight };
        return { w: window.innerWidth || 800, h: window.innerHeight || 600 };
      }

      const canvas = document.createElement('canvas');
      canvas.id = 'srrp-wind-canvas';
      // Canvas'ı harita container'ının içine ekle (body yerine)
      // Bu sayede Flutter'ın platform view z-order'ı bozulmaz
      // Mobil ve masaüstünde aynı şekilde çalışır
      // z-index BELİRTME — auto kalsın.
      // Platform view slot (flt-platform-view-slot) position:absolute ama z-index:auto,
      // yani stacking context açmıyor. İçerideki z-index:N değeri root stacking'e
      // "yayılıyor" ve Flutter overlay canvas'ı (UI widget'ları) ile çakışıyor.
      // z-index yokken canvas DOM sıralamasında map canvas'tan sonra eklendiği için
      // doğal olarak map üstünde, ama Flutter overlay DOM'da platform view slot'tan
      // sonra olduğu için UI widget'ları wind canvas'ın üstünde kalır.
      canvas.style.cssText = 'position:absolute;pointer-events:none;'
        + 'top:0;left:0;width:100%;height:100%;';
      container.appendChild(canvas);
      const ctx = canvas.getContext('2d');

      // DPI ölçekleme (retina/mobil ekranlar için)
      const dpr = window.devicePixelRatio || 1;

      var _initSize = _windCanvasSize();
      canvas.width = Math.round(_initSize.w * dpr);
      canvas.height = Math.round(_initSize.h * dpr);
      ctx.scale(dpr, dpr);

      function _windResync() {
        var sz = _windCanvasSize();
        var needsResize = (canvas.width !== Math.round(sz.w * dpr)) || (canvas.height !== Math.round(sz.h * dpr));
        if (needsResize) {
          canvas.width = Math.round(sz.w * dpr);
          canvas.height = Math.round(sz.h * dpr);
          ctx.scale(dpr, dpr);
        }
        // Container içi absolute konumlandırma — ek ayar gerekmez
      }
      map.on('resize', _windResync);
      window._srrpWindResync = _windResync;

      // ─── Parçacık havuzu — trail ile ───
      const MAX_P = 1600;
      const MAX_TRAIL = 35;  // maksimum kuyruk uzunluğu

      // Her parçacığın durumu
      const pLon = new Float64Array(MAX_P);
      const pLat = new Float64Array(MAX_P);
      const pAge = new Float32Array(MAX_P);
      const pMaxAge = new Float32Array(MAX_P);
      const pSpd = new Float32Array(MAX_P);

      // Trail: her parçacık için lon/lat ring buffer
      // [particle_i * MAX_TRAIL * 2 + trail_j * 2 + 0] = lon
      // [particle_i * MAX_TRAIL * 2 + trail_j * 2 + 1] = lat
      const trails = new Float64Array(MAX_P * MAX_TRAIL * 2);
      const tHead  = new Int32Array(MAX_P);   // ring buffer head
      const tLen   = new Int32Array(MAX_P);   // mevcut trail uzunluğu
      var activeN  = 0;

      function resetParticle(i, params) {
        var att = 0;
        do {
          pLon[i] = B.minLon + Math.random() * (B.maxLon - B.minLon);
          pLat[i] = B.minLat + Math.random() * (B.maxLat - B.minLat);
          var w = gridLookup(pLon[i], pLat[i]);
          pSpd[i] = w.speed;
          if (w.speed >= params.minSpd || att > 10) break;
          att++;
        } while (true);
        pAge[i] = Math.random() * 0.5;
        pMaxAge[i] = params.maxAge * (0.6 + Math.random() * 0.8);
        tHead[i] = 0;
        tLen[i] = 0;
        // İlk noktayı trail'e ekle
        var base = i * MAX_TRAIL * 2;
        trails[base] = pLon[i];
        trails[base + 1] = pLat[i];
        tLen[i] = 1;
      }

      var zp = getZoomParams();
      activeN = zp.count;
      for (var ii = 0; ii < activeN; ii++) resetParticle(ii, zp);

      console.log('[SRRP] Wind v3 başlatılıyor:', vectors.length, 'vektör,',
                  activeN, 'parçacık, grid:', GW, 'x', GH);

      // ─── Animasyon döngüsü ───
      var rafId = null, lastTs = 0;

      function frame(ts) {
        var dt = Math.min((ts - lastTs) / 1000, 0.05);
        lastTs = ts;

        var sz = _windCanvasSize();
        var wDpr = Math.round(sz.w * dpr), hDpr = Math.round(sz.h * dpr);
        if (canvas.width !== wDpr || canvas.height !== hDpr) {
          canvas.width = wDpr; canvas.height = hDpr;
          ctx.scale(dpr, dpr);
        }
        var cw = sz.w, ch = sz.h;
        var params = getZoomParams();

        // Parçacık sayısını ayarla
        if (activeN < params.count && activeN < MAX_P) {
          var add = Math.min(params.count - activeN, 40);
          for (var a = 0; a < add; a++) resetParticle(activeN + a, params);
          activeN += add;
        } else if (activeN > params.count) {
          activeN = Math.max(params.count, activeN - 40);
        }

        // ══════════════════════════════════════════════════════════════
        // HER FRAME: canvas'ı tamamen temizle → gri birikim YOK
        // ══════════════════════════════════════════════════════════════
        ctx.clearRect(0, 0, cw, ch);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        var usedTrailLen = Math.min(params.trailLen, MAX_TRAIL);

        for (var i = 0; i < activeN; i++) {
          pAge[i] += dt;
          if (pAge[i] >= pMaxAge[i]) { resetParticle(i, params); continue; }

          var wind = gridLookup(pLon[i], pLat[i]);
          if (wind.speed < 0.2) { pAge[i] = pMaxAge[i]; continue; }
          if (wind.speed < params.minSpd * 0.5) { pAge[i] = pMaxAge[i]; continue; }

          // Hareket
          var moveFactor = 0.00008 * params.speedMul * dt * 60;
          var nx = pLon[i] + wind.u * moveFactor;
          var ny = pLat[i] + wind.v * moveFactor;

          if (nx < B.minLon || nx > B.maxLon || ny < B.minLat || ny > B.maxLat) {
            resetParticle(i, params); continue;
          }

          // Trail'e yeni noktayı ekle
          pLon[i] = nx;
          pLat[i] = ny;
          pSpd[i] = wind.speed;

          var head = (tHead[i] + 1) % usedTrailLen;
          tHead[i] = head;
          if (tLen[i] < usedTrailLen) tLen[i]++;
          var bIdx = (i * MAX_TRAIL + head) * 2;
          trails[bIdx] = nx;
          trails[bIdx + 1] = ny;

          // ─── Trail çizimi ───
          var len = tLen[i];
          if (len < 2) continue;

          // Yaşam opaklığı
          var lt = pAge[i] / pMaxAge[i];
          var lifeAlpha = lt < 0.08 ? lt / 0.08 : lt > 0.75 ? (1.0 - lt) / 0.25 : 1.0;
          var baseAlpha = Math.min(0.35 + wind.speed * 0.055, 0.92);
          var maxAlpha = lifeAlpha * baseAlpha;
          var lw = speedWidth(wind.speed);

          // Trail segmentlerini çiz — kuyruktan başa, alpha artarak
          ctx.lineWidth = lw;
          for (var j = 1; j < len; j++) {
            // Ring buffer'dan sıralı indeks (kuyruk → baş)
            var ti0 = (head - len + j + usedTrailLen) % usedTrailLen;
            var ti1 = (head - len + j + 1 + usedTrailLen) % usedTrailLen;
            var b0 = (i * MAX_TRAIL + ti0) * 2;
            var b1 = (i * MAX_TRAIL + ti1) * 2;

            // Projeksiyon — lon/lat → ekran pikseli
            var p0 = map.project([trails[b0], trails[b0+1]]);
            var p1 = map.project([trails[b1], trails[b1+1]]);

            // Ekran dışı kontrolü
            if (p0.x < -50 || p0.x > cw+50 || p0.y < -50 || p0.y > ch+50) continue;

            // Segment alpha: kuyruk soluk → baş parlak
            var segT = (j / (len - 1));       // 0=kuyruk, 1=baş
            var segAlpha = segT * segT * maxAlpha;  // kuadratik artış

            ctx.beginPath();
            ctx.moveTo(p0.x, p0.y);
            ctx.lineTo(p1.x, p1.y);
            ctx.strokeStyle = speedColor(wind.speed, segAlpha);
            ctx.stroke();
          }
        }

        rafId = requestAnimationFrame(frame);
      }

      // Başlangıç boyutu (DPI-aware)
      rafId = requestAnimationFrame(frame);
      window._srrpWindRafId  = rafId;
      window._srrpWindCanvas = canvas;
    };

    var _srrpUniqPalette = [

      'rgba(88,214,141,0.42)',    //  1 yeşil (ana)
      'rgba(244,208,63,0.42)',    //  2 sarı (ana)

    /**
     * Greedy graph-coloring: bitişik poligonlar birbirinden farklı renk alır.
     *
     * Komşuluk tespiti: VERTEX-SHARING
     *  Her polygon'un tüm vertex'leri ~100m hassasiyetle key'e dönüştürülür.
     *  Aynı vertex key'ini paylaşan polygon'lar = gerçek komşu.
     *  Bbox overlap'e göre çok daha doğru sonuç verir.
     */
    function _addUniqueColorLayer(srcId, hoverProp, hitFilter) {
      var map = window._srrpMap;
      if (!map) return;

      // Önceki unique katmanı temizle
      try { if (map.getLayer('srrp-sel-unique')) map.removeLayer('srrp-sel-unique'); } catch(_) {}

      // Polygon vertex'lerini topla → Set<string> olarak döndür
      function _vertexKeys(feature) {
        var keys = {};
        try {
          var geom = feature.geometry;
          if (!geom) return keys;
          var allRings;
          if (geom.type === 'Polygon') {
            allRings = geom.coordinates;
          } else if (geom.type === 'MultiPolygon') {
            allRings = [];
            for (var p = 0; p < geom.coordinates.length; p++) {
              for (var r = 0; r < geom.coordinates[p].length; r++) {
                allRings.push(geom.coordinates[p][r]);
              }
            }
          } else { return keys; }
          for (var i = 0; i < allRings.length; i++) {
            var ring = allRings[i];
            for (var j = 0; j < ring.length; j++) {
              // ~100m hassasiyet: Math.round(coord * 1000)
              var k = Math.round(ring[j][0] * 1000) + ',' + Math.round(ring[j][1] * 1000);
              keys[k] = true;
            }
          }
        } catch(_) {}
        return keys;
      }

      function _build() {
        // 2026-05-08 — Tematik harita aktifken graph coloring layer'ını
        // (srrp-sel-unique) eklemiyoruz; aksi takdirde choropleth fill'inin
        // üstüne random renkler binip "karmakarışık renklendirme" görünüyor.
        // Choropleth modunda kullanıcı zaten data-bazlı rengi görüyor;
        // ilçe/il sınırı için sadece srrp-sel-hit (görünmez, tıklama için)
        // ve srrp-sel-hover (mouseover highlight) yeterli.
        if (_activeChoroplethId !== null) {
          console.log('[SRRP] _setupSelectionLayers._build: choropleth aktif → graph coloring atlanıyor (' + srcId + ')');
          return;
        }
        var raw = map.querySourceFeatures(srcId);
        // Değere göre tekilleştir; her değer için vertex key'leri birleştir
        var byVal = {};
        raw.forEach(function(f) {
          var val = f.properties && f.properties[hoverProp];
          if (!val) return;
          var vk = _vertexKeys(f);
          if (!byVal[val]) {
            byVal[val] = { val: val, vkeys: vk };
          } else {
            // MultiPolygon tile'lar: vertex key'leri birleştir
            var existing = byVal[val].vkeys;
            var newKeys = Object.keys(vk);
            for (var i = 0; i < newKeys.length; i++) existing[newKeys[i]] = true;
          }
        });

        var vals = Object.keys(byVal);
        if (vals.length === 0) {
          setTimeout(_build, 300);
          return;
        }

        // Vertex → feature listesi haritası oluştur
        var vertexToFeatures = {};
        for (var i = 0; i < vals.length; i++) {
          var v = vals[i];
          var kList = Object.keys(byVal[v].vkeys);
          for (var j = 0; j < kList.length; j++) {
            var vk = kList[j];
            if (!vertexToFeatures[vk]) vertexToFeatures[vk] = [];
            vertexToFeatures[vk].push(v);
          }
        }

        // Komşuluk grafiğini oluştur (ortak vertex paylaşanlar)
        var adj = {};
        vals.forEach(function(v) { adj[v] = {}; });
        var vfKeys = Object.keys(vertexToFeatures);
        for (var i = 0; i < vfKeys.length; i++) {
          var feats = vertexToFeatures[vfKeys[i]];
          if (feats.length < 2) continue;
          for (var a = 0; a < feats.length; a++) {
            for (var b = a + 1; b < feats.length; b++) {
              adj[feats[a]][feats[b]] = true;
              adj[feats[b]][feats[a]] = true;
            }
          }
        }

        // adj objelerini diziye çevir
        var adjArr = {};
        vals.forEach(function(v) { adjArr[v] = Object.keys(adj[v]); });

        // Greedy coloring: en çok komşusu olanı önce boya
        vals.sort(function(a,b) { return adjArr[b].length - adjArr[a].length; });
        var colorOf = {};
        var P = _srrpUniqPalette.length;
        vals.forEach(function(v) {
          var usedByNeighbor = {};
          var nb = adjArr[v];
          for (var i = 0; i < nb.length; i++) {
            if (colorOf[nb[i]] !== undefined) usedByNeighbor[colorOf[nb[i]]] = true;
          }
          var c = 0;
          while (usedByNeighbor[c] && c < P - 1) c++;
          colorOf[v] = c;
        });

        // MapLibre 'match' ifadesi oluştur
        var matchParts = ['match', ['get', hoverProp]];
        vals.forEach(function(v) {
          matchParts.push(v);
          matchParts.push(_srrpUniqPalette[colorOf[v] % P]);
        });
        matchParts.push('rgba(0,0,0,0)'); // fallback

        var spec = {
          id: 'srrp-sel-unique',
          type: 'fill',
          source: srcId,
          paint: {
            'fill-color': matchParts,
            'fill-outline-color': 'rgba(44,62,80,0.22)',
            'fill-opacity': 1
          }
        };
        if (hitFilter) spec.filter = hitFilter;
        try {
          var before = map.getLayer('srrp-sel-hit') ? 'srrp-sel-hit' : undefined;
          map.addLayer(spec, before);
          var maxC = 0;
          for (var v in colorOf) { if (colorOf[v] > maxC) maxC = colorOf[v]; }
          console.log('[SRRP] Graph-coloring (vertex-adj): ' + vals.length + ' bölge, ' +
            (maxC + 1) + '/' + P + ' renk kullanıldı.');
        } catch(e) {
          console.warn('[SRRP] Unique color layer eklenemedi:', e);
        }
      }

      _build();
    }

    // ────────────────────────────────────────────────────────────────────
    // 2026-05-08 Madde 5+6+7 — Floating pop-up coğrafi anchor
    // Pin form/popover'ı pin'in ekran pikseline anchor etmek için MapLibre
