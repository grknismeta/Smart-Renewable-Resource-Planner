<html>
<head>
  <!--

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="frontend">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SRRP — Akıllı Yenilenebilir Kaynak Planlayıcısı</title>
  <link rel="manifest" href="manifest.json">

  <!-- MapLibre logo/attribution gizle -->
  <style>
    .maplibregl-ctrl-logo,
    .maplibregl-ctrl-attrib,
    .maplibregl-ctrl-attrib-inner,
    .mapboxgl-ctrl-logo,
    .mapboxgl-ctrl-attrib { display: none !important; }
  </style>

  <!-- Google Fonts: Noto Sans (Türkçe + Latin Extended + Unicode kapsamı) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap">

  <!-- MapLibre GL JS — Lazy-load: Sadece MapLibre moduna geçilince yüklenir.
       srrpEnsureMapLibre(callback) fonksiyonu ile yönetilir.
       Standart harita kullanıcıları için ~800KB script yüklenmez → lag yok. -->

  <!-- SRRP MapLibre Shim
       Amaç: Flutter maplibre paketi "source-layer" parametresini desteklemiyor.
       Bu shim MapLibre.Map constructor'ını Proxy ile sararak son harita örneğini
       window._srrpMap'e kaydeder; ardından Dart tarafından çağrılacak global
       yardımcı fonksiyonları (srrpAddLayer, srrpRemoveLayer, srrpSetTerrain) tanımlar.
  -->
  <script>
  (function () {
    // ── MapLibre Proxy/Shim kurulumu ──────────────────────────────────────────
    // maplibregl yüklendikten SONRA çağrılır (hem eager hem lazy yüklemede).
    var _proxyInstalled = false;
    function _srrpSetupProxy() {
      if (_proxyInstalled || typeof maplibregl === 'undefined') return;
      _proxyInstalled = true;

    // ── İdari sınır düzeltici ──────────────────────────────────────
    // Her style.load sonrası otomatik çalışır.
    // - İl (admin-1 / state) sınırları: solid, her zoom'da görünür
    // - İlçe (admin-2 / county / district) sınırları: zoom ≥ 7'de görünür
    // Carto dark-matter, OpenFreeMap Liberty ve benzer stillerin farklı
    // layer-id convention'larını hepsini yakalar.
    function _srrpApplyAdminBorderFixes(map) {
      try {
        const style = map.getStyle();
        if (!style || !style.layers) return;

        var provCount = 0, distCount = 0;

        for (const layer of style.layers) {
          if (layer.type !== 'line') continue;
          const id = layer.id.toLowerCase();

          // İl / eyalet sınırı — her zaman solid, belirgin
          const isProv = id.includes('admin-1') || id.includes('admin_1') ||
                         id.includes('state-border') || id.includes('state_border') ||
                         (id.includes('boundary') && id.includes('state')) ||
                         (id.includes('boundary') && id.includes('province'));

          // İlçe / ilçe sınırı — yalnızca yakın zoom'da
          const isDist = id.includes('admin-2') || id.includes('admin_2') ||
                         id.includes('county') || id.includes('district') ||
                         (id.includes('boundary') && id.includes('county'));

          if (isProv) {
            provCount++;
            try { map.setPaintProperty(id, 'line-dasharray', [1, 0]); } catch(_) {}
            try { map.setPaintProperty(id, 'line-color', 'rgba(220,220,220,0.55)'); } catch(_) {}
            try { map.setPaintProperty(id, 'line-width',
              ['interpolate', ['linear'], ['zoom'], 3, 0.4, 6, 0.8, 10, 1.4]); } catch(_) {}
            try { map.setPaintProperty(id, 'line-opacity', 1); } catch(_) {}
            try { map.setLayoutProperty(id, 'visibility', 'visible'); } catch(_) {}
          } else if (isDist) {
            distCount++;
            try { map.setPaintProperty(id, 'line-opacity',
              ['step', ['zoom'], 0, 7, 0.55]); } catch(_) {}
            try { map.setPaintProperty(id, 'line-dasharray', [1, 0]); } catch(_) {}
            try { map.setLayoutProperty(id, 'visibility', 'visible'); } catch(_) {}
          }
        }
        console.log('[SRRP] Admin sınır düzeltmeleri uygulandı — il:', provCount, 'ilçe:', distCount,
                     '(toplam line layer:', style.layers.filter(l => l.type === 'line').length + ')');
      } catch (e) {
        console.warn('[SRRP] Admin border fix hatası:', e);
      }
    }

    // Map constructor'ını Proxy ile sar — son örneği yakala
    maplibregl.Map = new Proxy(maplibregl.Map, {
      construct(Target, args) {
        const instance = Reflect.construct(Target, args);
        window._srrpMap = instance;

        // Her style.load'da (ilk yükleme + stil değişimi) sınır düzeltmesini uygula
        instance.on('style.load', function() {
          // Dart tarafındaki _initLayers'ın bitmesini bekle (100ms yeterli)
          setTimeout(function() { _srrpApplyAdminBorderFixes(instance); }, 150);
          // MapLibre varsayılan 'grab' cursor'ını kaldır — 'default' kullan
          instance.getCanvas().style.cursor = 'default';
        });

        // Drag sırasında grabbing cursor — başka durumda default
        instance.on('mousedown', function() {
          if (!window._mapInteractive) return;
          instance.getCanvas().style.cursor = 'grabbing';
        });
        instance.on('mouseup', function() {
          instance.getCanvas().style.cursor = 'default';
        });
        instance.on('dragend', function() {
          instance.getCanvas().style.cursor = 'default';
        });

        // ── Eksik İkonları Şeffaf Piksel ile Doldur (Uyarı Kirliliğini Önle) ──
        instance.on('styleimagemissing', function(e) {
          const id = e.id;
          // 1x1 şeffaf RGBA piksel data
          const data = new Uint8Array([0, 0, 0, 0]);
          instance.addImage(id, { width: 1, height: 1, data: data });
        });

        return instance;
      }
    });
    } // end _srrpSetupProxy

    // ── Pin Hover Detection ─────────────────────────────────────────
    // Dart, srrpSetPinHoverFn ile bir callback kaydeder.
    // srrpSetupPinHover ise 'srrp-pins-circles' layer'ına
    // mousemove / mouseleave handler'larını bağlar.
    // _initLayers her stil değişiminden sonra çağırır (layer yeniden oluşturulur).

    window._srrpPinHoverFn          = null;
    window._srrpPinMousemoveHandler = null;
    window._srrpPinMouseleaveHandler = null;

    window.srrpSetPinHoverFn = function(fn) {
      window._srrpPinHoverFn = fn;
    };

    window.srrpSetupPinHover = function() {
      const map = window._srrpMap;
      if (!map) return;

      const LAYER = 'srrp-pins-circles';

      // Eski handler'ları temizle (duplicate önle)
      if (window._srrpPinMousemoveHandler) {
        try { map.off('mousemove',  LAYER, window._srrpPinMousemoveHandler); } catch(_) {}
        try { map.off('mouseleave', LAYER, window._srrpPinMouseleaveHandler); } catch(_) {}
      }

      window._srrpPinMousemoveHandler = function(e) {
        if (!e.features || e.features.length === 0) return;
        const id = String(e.features[0].properties.id);
        map.getCanvas().style.cursor = 'pointer';
        if (window._srrpPinHoverFn) window._srrpPinHoverFn(id);
      };

      window._srrpPinMouseleaveHandler = function() {
        map.getCanvas().style.cursor = 'default';
        if (window._srrpPinHoverFn) window._srrpPinHoverFn('');
      };

      map.on('mousemove',  LAYER, window._srrpPinMousemoveHandler);
      map.on('mouseleave', LAYER, window._srrpPinMouseleaveHandler);
    };

    // ── Pin Click Detection ─────────────────────────────────────────
    // Dart, srrpSetPinClickFn ile bir callback kaydeder.
    // srrpSetupPinClick ise 'srrp-pins-circles' layer'ına
    // click handler bağlar. Pin tıklaması olduğunda properties JSON gönderilir.
    // Ayrıca cluster single pin tıklaması da desteklenir.

    window._srrpPinClickFn      = null;
    window._srrpPinClickHandler = null;
    window._srrpClusterClickHandler = null;

    window.srrpSetPinClickFn = function(fn) {
      window._srrpPinClickFn = fn;
    };

    window.srrpSetupPinClick = function() {
      const map = window._srrpMap;
      if (!map) return;

      const LAYER   = 'srrp-pins-circles';
      const CLUSTER = 'srrp-cluster-single';

      // Eski handler'ları temizle (duplicate önle)
      if (window._srrpPinClickHandler) {
        try { map.off('click', LAYER, window._srrpPinClickHandler); } catch(_) {}
      }
      if (window._srrpClusterClickHandler) {
        try { map.off('click', CLUSTER, window._srrpClusterClickHandler); } catch(_) {}
      }

      window._srrpPinClickHandler = function(e) {
        if (window._srrpClickGuard) return;
        if (!e.features || e.features.length === 0) return;
        var props = e.features[0].properties;
        // NOT: _srrpClickGuard burada AÇILMAZ — seçim katmanı tıklamalarını
        // engellemekten kaçınılır. Dart tarafında _jsClickHandled bayrağı
        // MapEventClick çakışmasını zaten önler.
        if (window._srrpPinClickFn) {
          try {
            window._srrpPinClickFn(JSON.stringify(props));
          } catch(err) { console.error('[SRRP] pinClickFn hata:', err); }
        }
      };

      map.on('click', LAYER, window._srrpPinClickHandler);

      // Cluster single pin tıklaması (kümeleme aktifken tekil pinler)
      window._srrpClusterClickHandler = function(e) {
        if (window._srrpClickGuard) return;
        if (!e.features || e.features.length === 0) return;
        var props = e.features[0].properties;
        if (window._srrpPinClickFn) {
          try {
            window._srrpPinClickFn(JSON.stringify(props));
          } catch(err) { console.error('[SRRP] clusterClickFn hata:', err); }
        }
      };

      // Cluster layer henüz yoksa hata vermez, map.on sessizce yok sayar
      try { map.on('click', CLUSTER, window._srrpClusterClickHandler); } catch(_) {}
    };

    // ── Pin Kümeleme (Cluster) ──────────────────────────────────────
    // srrpUpdateClusterPins: Flutter pin layer'larını gizler,
    //   MapLibre cluster source + layer'larını kurar.
    // srrpClearClusterPins: Cluster layer'larını kaldırır,
    //   Flutter pin layer'larını tekrar gösterir.

    var _CSRC = 'srrp-pins-cluster';
    var _CCIRC = 'srrp-cluster-circles';
    var _CCNT  = 'srrp-cluster-count';
    var _CSINGLE = 'srrp-cluster-single';
    var _FLUTTER_PIN_LAYERS = [
      'srrp-pins-shadow', 'srrp-pins-circles',
      'srrp-pins-labels', 'srrp-pins-city-labels'
    ];

    window._srrpClusterActive = false;

    window.srrpUpdateClusterPins = function(geojsonStr) {
      var map = window._srrpMap;
      if (!map) return;

      // Flutter pin layer'larını gizle
      _FLUTTER_PIN_LAYERS.forEach(function(id) {
        try { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'none'); } catch(_) {}
      });

      // Mevcut cluster layer/source'u kaldır (yeniden yükle)
      [_CCIRC, _CCNT, _CSINGLE].forEach(function(id) {
        try { if (map.getLayer(id)) map.removeLayer(id); } catch(_) {}
      });
      try { if (map.getSource(_CSRC)) map.removeSource(_CSRC); } catch(_) {}

      var geojson;
      try { geojson = JSON.parse(geojsonStr); } catch(_) { return; }

      map.addSource(_CSRC, {
        type: 'geojson',
        data: geojson,
        cluster: true,
        clusterMaxZoom: 10,
        clusterRadius: 60
      });

      // Cluster çemberleri (birden fazla pin)
      map.addLayer({
        id: _CCIRC, type: 'circle', source: _CSRC,
        filter: ['has', 'point_count'],
        paint: {
          'circle-color': [
            'step', ['get', 'point_count'],
            '#4ECDC4', 5, '#FFD93D', 15, '#FF6B6B'
          ],
          'circle-radius': ['step', ['get', 'point_count'], 22, 5, 30, 15, 40],
          'circle-stroke-width': 2,
          'circle-stroke-color': '#ffffff',
          'circle-opacity': 0.88
        }
      });

      // Cluster sayı etiketi
      map.addLayer({
        id: _CCNT, type: 'symbol', source: _CSRC,
        filter: ['has', 'point_count'],
        layout: {
          'text-field': '{point_count_abbreviated}',
          'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
          'text-size': 13
        },
        paint: { 'text-color': '#ffffff' }
      });

      // Tekil pinler (kümelenmemiş)
      map.addLayer({
        id: _CSINGLE, type: 'circle', source: _CSRC,
        filter: ['!', ['has', 'point_count']],
        paint: {
          'circle-color': ['coalesce', ['get', 'color'], '#66BB6A'],
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 4, 6, 10, 10],
          'circle-stroke-width': 2,
          'circle-stroke-color': '#ffffff',
          'circle-opacity': 0.9
        }
      });

      window._srrpClusterActive = true;
    };

    window.srrpClearClusterPins = function() {
      var map = window._srrpMap;
      if (!map) return;

      [_CCIRC, _CCNT, _CSINGLE].forEach(function(id) {
        try { if (map.getLayer(id)) map.removeLayer(id); } catch(_) {}
      });
      try { if (map.getSource(_CSRC)) map.removeSource(_CSRC); } catch(_) {}

      // Flutter pin layer'larını geri göster
      _FLUTTER_PIN_LAYERS.forEach(function(id) {
        try { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'visible'); } catch(_) {}
      });

      window._srrpClusterActive = false;
    };

    // ── GADM Sınır Katmanları ───────────────────────────────────────
    // Dart _initLayers içinden çağrılır.
    // MapLibre, data URL'si olan GeoJSON source'u otomatik fetch eder.

    // Türkiye coğrafi sınırları — bu bbox dışındaki ilçe feature'ları (ör. Yunan adaları)
    // district GeoJSON'dan elenir.
    var _TR_BOUNDS = { minLon: 25.0, maxLon: 46.0, minLat: 35.0, maxLat: 43.0 };

    /**
     * GeoJSON feature'ının merkez noktasını (yaklaşık centroid) hesaplar.
     * Polygon: ilk ring, MultiPolygon: ilk poligonun ilk ring'i.
     * Döner: [lon, lat] veya null.
     */
    function _featureCentroid(feature) {
      try {
        var geom = feature.geometry;
        if (!geom) return null;
        var rings = geom.type === 'Polygon'
          ? geom.coordinates
          : (geom.type === 'MultiPolygon' ? geom.coordinates[0] : null);
        if (!rings || !rings[0] || !rings[0].length) return null;
        var coords = rings[0];
        var sumLon = 0, sumLat = 0, n = coords.length;
        for (var i = 0; i < n; i++) { sumLon += coords[i][0]; sumLat += coords[i][1]; }
        return [sumLon / n, sumLat / n];
      } catch (_) { return null; }
    }

    /**
     * İlçe GeoJSON'unu Türkiye sınırları içinde filtrele.
     * Yunan adaları ve yanlış konumlanmış feature'ları eler.
     */
    function _filterDistrictGeoJson(geojson) {
      if (!geojson || !Array.isArray(geojson.features)) return geojson;
      var b = _TR_BOUNDS;
      geojson.features = geojson.features.filter(function(f) {
        var c = _featureCentroid(f);
        if (!c) return false; // geometri yok → ele
        return c[0] >= b.minLon && c[0] <= b.maxLon &&
               c[1] >= b.minLat && c[1] <= b.maxLat;
      });
      return geojson;
    }

    window.srrpLoadBorderLayers = function(provUrl, distUrl, regUrl) {
      const map = window._srrpMap;
      if (!map) { console.warn('[SRRP] srrpLoadBorderLayers: map yok'); return; }

      const PROV_SRC  = 'srrp-borders-provinces';
      const DIST_SRC  = 'srrp-borders-districts';
      const REG_SRC   = 'srrp-borders-regions';
      const PROV_LINE = 'srrp-provinces-line';
      const DIST_LINE = 'srrp-districts-line';

      console.log('[SRRP] Sınır katmanları yükleniyor…');

      // Temizle (stil değişiminde yeniden kurulur)
      [PROV_LINE, DIST_LINE].forEach(function(id) {
        try { if (map.getLayer(id)) map.removeLayer(id); } catch(_) {}
      });
      [PROV_SRC, DIST_SRC, REG_SRC].forEach(function(id) {
        try { if (map.getSource(id)) map.removeSource(id); } catch(_) {}
      });

      // İl + bölge source: URL doğrudan yükle (Türkiye dışı veri yok)
      try {
        map.addSource(PROV_SRC, { type: 'geojson', data: provUrl });
        console.log('[SRRP] İl GeoJSON source eklendi:', provUrl);
      } catch(e) { console.error('[SRRP] İl source eklenemedi:', e); }

      if (regUrl) {
        try {
          map.addSource(REG_SRC, { type: 'geojson', data: regUrl });
        } catch(e) { console.error('[SRRP] Bölge source eklenemedi:', e); }
      }

      // İlçe source: fetch et → Türkiye dışı feature'ları ele → source'a ekle
      // distUrl'yi choropleth için de sakla
      window._srrpDistUrl = distUrl;

      fetch(distUrl)
        .then(function(r) { return r.json(); })
        .then(function(geojson) {
          // Map hâlâ mevcut mu kontrol et (stil değişimi sırasında kaybolabilir)
          var m = window._srrpMap;
          if (!m) { console.warn('[SRRP] İlçe fetch tamamlandı ama map artık yok'); return; }
          // Source zaten eklenmişse atla (tekrar çağrı koruması)
          if (m.getSource(DIST_SRC)) { console.log('[SRRP] İlçe source zaten mevcut, atlanıyor'); return; }
          var filtered = _filterDistrictGeoJson(geojson);
          var removed = geojson.features
            ? (geojson.features.length - filtered.features.length) : 0;
          if (removed > 0) {
            console.log('[SRRP] İlçe GeoJSON: ' + removed + ' Türkiye dışı feature elendi.');
          }
          // Choropleth için cache'le (orijinal, kliplenmemiş GeoJSON)
          _choroplethGeoCache = filtered;

          m.addSource(DIST_SRC, { type: 'geojson', data: filtered });
          console.log('[SRRP] İlçe GeoJSON source eklendi, feature sayısı:', filtered.features.length);
          // Kaynak eklenince sınır çizgilerini çiz
          _addDistrictLines(m, DIST_SRC, PROV_SRC, DIST_LINE, PROV_LINE);
        })
        .catch(function(err) {
          console.error('[SRRP] İlçe GeoJSON yüklenemedi, URL ile fallback:', err);
          var m = window._srrpMap;
          if (!m) return;
          // Hata halinde filtresiz yükle
          try {
            if (!m.getSource(DIST_SRC)) {
              m.addSource(DIST_SRC, { type: 'geojson', data: distUrl });
              _addDistrictLines(m, DIST_SRC, PROV_SRC, DIST_LINE, PROV_LINE);
            }
          } catch(e2) { console.error('[SRRP] İlçe fallback da başarısız:', e2); }
        });
    };

    function _addDistrictLines(map, DIST_SRC, PROV_SRC, DIST_LINE, PROV_LINE) {
      // beforeId: srrp-pins-shadow varsa onun altına, yoksa en üste ekle
      var beforeId = map.getLayer('srrp-pins-shadow') ? 'srrp-pins-shadow' : undefined;

      // İlçe sınırı (ince, zoom >= 6'da görünür, pin katmanının altında)
      try {
        map.addLayer({
          id: DIST_LINE,
          type: 'line',
          source: DIST_SRC,
          minzoom: 6,
          paint: {
            'line-color': '#7a8fa3',
            'line-width': ['interpolate', ['linear'], ['zoom'], 6, 0.3, 10, 0.7],
            'line-opacity': ['interpolate', ['linear'], ['zoom'], 6, 0.25, 8, 0.45]
          }
        }, beforeId);
        console.log('[SRRP] İlçe sınır katmanı eklendi');
      } catch(e) { console.warn('[SRRP] dist-line:', e); }

      // İl sınırı (belirgin, her zoom'da görünür)
      try {
        map.addLayer({
          id: PROV_LINE,
          type: 'line',
          source: PROV_SRC,
          paint: {
            'line-color': '#a0b5c8',
            'line-width': ['interpolate', ['linear'], ['zoom'], 3, 0.6, 6, 1.0, 10, 1.5],
            'line-opacity': ['interpolate', ['linear'], ['zoom'], 3, 0.45, 5, 0.65]
          }
        }, beforeId);
        console.log('[SRRP] İl sınır katmanı eklendi');
      } catch(e) { console.warn('[SRRP] prov-line:', e); }
    }

    // ── Choropleth (İlçe Tematik Harita) Katmanları ───────────────────

    var _activeChoroplethId = null;
    var _choroplethSrcId    = 'srrp-choropleth-src';

    /**
     * İlçe poligonlarını veri bazlı renklendirir.
     * Ayrı GeoJSON source oluşturur, her feature'a _cval property ekler,
     * MapLibre native interpolate ile sürekli gradyan sağlar.
     *
     * @param {string} mode - 'solar' | 'wind' | 'temp' | 'none'
     * @param {string} dataJson - JSON: {"İl|İlçe": {wind, solar, temp}}
     */
    // Orijinal ilçe GeoJSON cache (fetch sonrası saklanır)
    var _choroplethGeoCache = null;

    // Choropleth geçiş süresi (ms)
    var _CHORO_TRANSITION_MS = 600;
    // Fade-out sonrası katman temizleme zamanlayıcısı
    var _choroFadeTimer = null;

    window.srrpSetChoropleth = function(mode, dataJson) {
      var map = window._srrpMap;
      if (!map) return;

      var FILL_ID = 'srrp-choropleth-fill';
      var LINE_ID = 'srrp-choropleth-line';

      // Önceki fade-out zamanlayıcısını iptal et
      if (_choroFadeTimer) { clearTimeout(_choroFadeTimer); _choroFadeTimer = null; }

      // ── Kapatma: fade-out sonra temizle ──────────────────────────────
      if (mode === 'none' || !dataJson) {
        if (map.getLayer(FILL_ID)) {
          map.setPaintProperty(FILL_ID, 'fill-opacity', 0);
        }
        if (map.getLayer(LINE_ID)) {
          map.setPaintProperty(LINE_ID, 'line-opacity', 0);
        }
        _choroFadeTimer = setTimeout(function() {
          try { if (map.getLayer(FILL_ID)) map.removeLayer(FILL_ID); } catch(_) {}
          try { if (map.getLayer(LINE_ID)) map.removeLayer(LINE_ID); } catch(_) {}
          try { if (map.getSource(_choroplethSrcId)) map.removeSource(_choroplethSrcId); } catch(_) {}
          _activeChoroplethId = null;
        }, _CHORO_TRANSITION_MS + 50);
        return;
      }

      var data;
      try { data = JSON.parse(dataJson); } catch(e) { console.error('[SRRP] Choropleth JSON:', e); return; }

      // Cache varsa direkt kullan, yoksa border URL'den fetch et
      if (_choroplethGeoCache) {
        _applyChoropleth(map, mode, data, _choroplethGeoCache, FILL_ID, LINE_ID);
      } else {
        var distUrl = window._srrpDistUrl;
        if (!distUrl) {
          console.error('[SRRP] Choropleth: distUrl bulunamadı, border layers henüz yüklenmemiş olabilir');
          return;
        }
        fetch(distUrl)
          .then(function(r) { return r.json(); })
          .then(function(geojson) {
            var filtered = _filterDistrictGeoJson(geojson);
            _choroplethGeoCache = filtered;
            var m = window._srrpMap;
            if (!m) return;
            _applyChoropleth(m, mode, data, filtered, FILL_ID, LINE_ID);
          })
          .catch(function(err) {
            console.error('[SRRP] Choropleth GeoJSON fetch hatası:', err);
          });
      }
    };

    function _applyChoropleth(map, mode, data, geojson, FILL_ID, LINE_ID) {
      var features = geojson.features || [];
      var vals = [];

      // Her feature'a _cval property ekle (orijinal GeoJSON'ı mutate etmiyoruz, klonluyoruz)
      var newFeatures = [];
      for (var i = 0; i < features.length; i++) {
        var f = features[i];
        var props = f.properties || {};
        var n1 = props.NAME_1 || '';
        var n2 = props.NAME_2 || '';
        var compositeKey = n1 + '|' + n2;

        var entry = data[compositeKey];
        var val = entry ? entry[mode] : null;

        newFeatures.push({
          type: 'Feature',
          properties: {
            NAME_1: n1,
            NAME_2: n2,
            _cval: (val != null && val !== undefined) ? val : -9999
          },
          geometry: f.geometry
        });
        if (val != null && val !== undefined) vals.push(val);
      }

      if (vals.length === 0) {
        console.warn('[SRRP] Choropleth: eşleşen veri yok, mode=' + mode);
        return;
      }

      // ── Sabit fiziksel skala — tüm modlar için ────────────────
      vals.sort(function(a, b) { return a - b; });
      console.log('[SRRP] Choropleth veri aralığı: ' + vals[0].toFixed(1) + '–' + vals[vals.length-1].toFixed(1) +
        ', n=' + vals.length + ', mode=' + mode);

      // ── Renk rampası (sabit fiziksel değerler) ────────────
      var stops = _choroplethBuildStops(mode);

      var colorExpr = ['interpolate', ['linear'], ['get', '_cval']];
      for (var s = 0; s < stops.length; s++) {
        colorExpr.push(stops[s][0]);
        colorExpr.push(stops[s][1]);
      }

      var fillColorExpr = [
        'case',
        ['==', ['get', '_cval'], -9999], 'rgba(0,0,0,0)',
        colorExpr
      ];

      var fillOpacityExpr = [
        'case',
        ['==', ['get', '_cval'], -9999], 0,
        0.82
      ];

      var newGeoJson = { type: 'FeatureCollection', features: newFeatures };

      // ── Katman zaten varsa: veri + renk güncelle (geçişli) ────────
      var layerExists = false;
      try { layerExists = !!map.getLayer(FILL_ID); } catch(_) {}

      if (layerExists) {
        // Kaynak verisini güncelle
        try {
          map.getSource(_choroplethSrcId).setData(newGeoJson);
        } catch(e) {
          console.warn('[SRRP] Source güncelleme hatası, yeniden oluşturuluyor:', e);
          layerExists = false; // Aşağıda yeniden oluşturulsun
        }
      }

      if (layerExists) {
        // Renk geçişi: setPaintProperty ile MapLibre transition mekanizması
        map.setPaintProperty(FILL_ID, 'fill-color', fillColorExpr);
        map.setPaintProperty(FILL_ID, 'fill-opacity', fillOpacityExpr);
        map.setPaintProperty(LINE_ID, 'line-opacity', 1);
        _activeChoroplethId = FILL_ID;
        console.log('[SRRP] Choropleth güncellendi (geçişli): mode=' + mode +
          ', ' + vals.length + ' veri');
        return;
      }

      // ── İlk yükleme: katmanları sıfırdan oluştur ─────────────────
      // Önce eski kalıntıları temizle
      try { if (map.getLayer(FILL_ID)) map.removeLayer(FILL_ID); } catch(_) {}
      try { if (map.getLayer(LINE_ID)) map.removeLayer(LINE_ID); } catch(_) {}
      try { if (map.getSource(_choroplethSrcId)) map.removeSource(_choroplethSrcId); } catch(_) {}

      try {
        map.addSource(_choroplethSrcId, { type: 'geojson', data: newGeoJson });
      } catch(e) {
        console.error('[SRRP] Choropleth source eklenemedi:', e);
        return;
      }

      var beforeId = map.getLayer('srrp-districts-line') ? 'srrp-districts-line' : undefined;
      var transitionConf = { duration: _CHORO_TRANSITION_MS, delay: 0 };

      try {
        // Fill katmanı — opacity 0'dan başla, geçişle 0.82'ye çık
        map.addLayer({
          id: FILL_ID,
          type: 'fill',
          source: _choroplethSrcId,
          paint: {
            'fill-color': fillColorExpr,
            'fill-opacity': 0,
            'fill-color-transition': transitionConf,
            'fill-opacity-transition': transitionConf,
          }
        }, beforeId);

        // Sınır çizgisi
        map.addLayer({
          id: LINE_ID,
          type: 'line',
          source: _choroplethSrcId,
          paint: {
            'line-color': [
              'case',
              ['==', ['get', '_cval'], -9999], 'rgba(0,0,0,0)',
              'rgba(255,255,255,0.35)'
            ],
            'line-width': ['interpolate', ['linear'], ['zoom'], 5, 0.4, 8, 1.0, 12, 1.5],
            'line-opacity': 0,
            'line-opacity-transition': transitionConf,
          }
        }, beforeId);

        // Fade-in: sonraki frame'de opacity'yi hedef değere çek
        requestAnimationFrame(function() {
          try {
            map.setPaintProperty(FILL_ID, 'fill-opacity', fillOpacityExpr);
            map.setPaintProperty(LINE_ID, 'line-opacity', 1);
          } catch(_) {}
        });

        _activeChoroplethId = FILL_ID;
        console.log('[SRRP] Choropleth oluşturuldu (fade-in): mode=' + mode +
          ', ' + newFeatures.length + ' feature, ' + vals.length + ' veri');
      } catch(e) {
        console.error('[SRRP] Choropleth katman eklenemedi:', e);
      }
    };

    /**
     * Mod bazlı renk rampası üretir — 10 eşit aralıklı stop.
     * Renk dizileri perceptually uniform ve koyu arka plan üzerinde
     * yüksek kontrast sağlayacak şekilde seçilmiştir.
     */
    function _choroplethBuildStops(mode) {
      // Tüm modlar sabit fiziksel değer → renk eşlemesi kullanır.
      // Native (map_view_maplibre_native.dart) ve tooltip (map_layer_mixin.dart)
      // ile birebir aynı renkler.
      if (mode === 'solar') {
        // Güneş ışınımı: 0–800 W/m²
        return [
          [  0, '#1a1a2e'],   // gece / sıfır — koyu lacivert
          [ 50, '#FFFFCC'],   // çok düşük — soluk sarı
          [150, '#FFEDA0'],
          [250, '#FED976'],
          [350, '#FEB24C'],
          [450, '#FD8D3C'],
          [550, '#FC4E2A'],
          [650, '#E31A1C'],
          [750, '#BD0026'],
          [800, '#4D0014'],   // maksimum — koyu bordo
        ];
      } else if (mode === 'wind') {
        // Rüzgar hızı: 0–25 m/s
        return [
          [ 0, '#F7FBFF'],    // sakin — neredeyse beyaz
          [ 2, '#DEEBF7'],
          [ 4, '#C6DBEF'],
          [ 6, '#9ECAE1'],
          [ 8, '#6BAED6'],
          [10, '#4292C6'],
          [13, '#2171B5'],
          [16, '#08519C'],
          [20, '#083D7F'],
          [25, '#08306B'],    // fırtına — koyu lacivert
        ];
      } else {
        // Sıcaklık: -15°C → +45°C sabit fiziksel skala
        return [
          [-15, '#08306B'],   // çok soğuk — koyu lacivert
          [ -5, '#2171B5'],
          [  0, '#E0F3F8'],   // donma noktası — beyazımsı
          [  5, '#C6DBEF'],
          [ 10, '#ABD9E9'],
          [ 15, '#74ADD1'],
          [ 20, '#66BD63'],   // ılık — yeşil
          [ 25, '#A6D96A'],
          [ 30, '#FEE08B'],   // sıcak — sarı
          [ 33, '#FDAE61'],
          [ 36, '#F46D43'],   // çok sıcak — turuncu
          [ 40, '#D73027'],   // aşırı — kırmızı
          [ 45, '#A50026'],   // tehlikeli — koyu kırmızı
        ];
      }
    }

    // ── Layer yardımcıları ──────────────────────────────────────────

    window.srrpAddLayer = function (specJson, beforeId) {
      const map = window._srrpMap;
      if (!map) return;
      try {
        const spec = JSON.parse(specJson);
        if (map.getLayer(spec.id)) map.removeLayer(spec.id);
        map.addLayer(spec, beforeId || undefined);
      } catch (e) { console.error('[SRRP] srrpAddLayer:', e); }
    };

    window.srrpRemoveLayer = function (id) {
      const map = window._srrpMap;
      if (!map) return;
      try { if (map.getLayer(id)) map.removeLayer(id); } catch (e) {}
    };

    // ── 3D Terrain ─────────────────────────────────────────────────
    // MapLibre ^0.2.2 Flutter paketi setTerrain() sunmuyor; JS üzerinden çağrılır.

    window.srrpSetTerrain = function (enable) {
      const map = window._srrpMap;
      if (!map) return;
      try {
        if (enable) {
          if (!map.getSource('srrp-dem')) {
            map.addSource('srrp-dem', {
              type: 'raster-dem',
              url: 'https://demotiles.maplibre.org/terrain-tiles/tiles.json',
              tileSize: 256
            });
          }
          map.setTerrain({ source: 'srrp-dem', exaggeration: 1.5 });
        } else {
          map.setTerrain(null);
          // Kaynak hata vermeden kaldır
          try { if (map.getSource('srrp-dem')) map.removeSource('srrp-dem'); } catch (_) {}
        }
      } catch (e) { console.error('[SRRP] srrpSetTerrain:', e); }
    };

    // ── Sky layer (terrain ile birlikte atmosfer görünümü) ─────────

    window.srrpSetSky = function (enable) {
      const map = window._srrpMap;
      if (!map) return;
      try {
        if (enable) {
          if (!map.getLayer('srrp-sky')) {
            map.addLayer({
              id: 'srrp-sky',
              type: 'sky',
              paint: {
                'sky-type': 'atmosphere',
                'sky-atmosphere-sun': [0.0, 90.0],
                'sky-atmosphere-sun-intensity': 15
              }
            });
          }
        } else {
          if (map.getLayer('srrp-sky')) map.removeLayer('srrp-sky');
        }
      } catch (e) { console.error('[SRRP] srrpSetSky:', e); }
    };

    // ── Globe projeksiyon ──────────────────────────────────────────
    // style.setProjection() Flutter paketi üzerinden 4.7.1'de bozuk; JS shim kullan.

    window.srrpSetGlobe = function (enable) {
      const map = window._srrpMap;
      if (!map) return;

      // İl/ilçe sınır çizgilerini gizle/göster
      var borderLayerIds = ['srrp-provinces-line', 'srrp-districts-line'];

      try {
        map.setProjection({ type: enable ? 'globe' : 'mercator' });
        if (enable) {
          // Global mod: sınır kısıtlamasını kaldır, dünya gezinebilir
          window._srrpSavedMaxBounds = map.getMaxBounds();
          map.setMaxBounds(null);
          // İl/ilçe sınırlarını gizle
          borderLayerIds.forEach(function(id) {
            try { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'none'); } catch(_) {}
          });
          // Seçim katmanlarını da gizle
          ['srrp-sel-hit', 'srrp-sel-hover', 'srrp-sel-extrusion', 'srrp-sel-unique-fill'].forEach(function(id) {
            try { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'none'); } catch(_) {}
          });
          console.log('[SRRP] Globe ON — maxBounds kaldırıldı, sınırlar gizlendi');
        } else {
          // Türkiye moduna dön
          // 1. Sınır kısıtlamasını geri yükle
          if (window._srrpSavedMaxBounds) {
            map.setMaxBounds(window._srrpSavedMaxBounds);
            window._srrpSavedMaxBounds = null;
          }
          // 2. İl/ilçe sınırlarını tekrar göster
          borderLayerIds.forEach(function(id) {
            try { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'visible'); } catch(_) {}
          });
          // 3. Seçim katmanlarını tekrar göster
          ['srrp-sel-hit', 'srrp-sel-hover', 'srrp-sel-extrusion', 'srrp-sel-unique-fill'].forEach(function(id) {
            try { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'visible'); } catch(_) {}
          });
          // 4. Türkiye üzerinde değilse animasyonlu olarak Türkiye'ye dön
          var center = map.getCenter();
          var isOverTurkey = center.lng >= 25 && center.lng <= 45 &&
                             center.lat >= 35 && center.lat <= 43;
          if (!isOverTurkey) {
            map.flyTo({
              center: [35.2, 39.0],
              zoom: 6,
              duration: 2000,
              essential: true
            });
          }
          console.log('[SRRP] Globe OFF — maxBounds geri yüklendi, sınırlar gösterildi');
        }
      } catch (e) { console.error('[SRRP] srrpSetGlobe:', e); }
    };

    // ── Tıklama Sorgusu (queryRenderedFeatures) ───────────────────────
    // Flutter Web'de MapLibre'nin layer-specific click handler'ları çalışmaz
    // (platform view event routing sorunu). Bunun yerine Dart MapEventClick'ten
    // koordinat alınır ve bu fonksiyon ile hangi feature'a tıklandığı sorgulanır.
    // Dönen JSON: {type: 'pin'|'selection'|'none', properties: {...}}
    window.srrpQueryClick = function(lng, lat) {
      var map = window._srrpMap;
      if (!map) return '{"type":"none"}';
      if (window._srrpClickGuard) return '{"type":"none"}';

      try {
        var point = map.project([lng, lat]);

        // 1. Pin katmanı (normal + cluster tekil)
        var pinLayers = [];
        if (map.getLayer('srrp-pins-circles')) pinLayers.push('srrp-pins-circles');
        if (map.getLayer('srrp-cluster-single')) pinLayers.push('srrp-cluster-single');

        if (pinLayers.length > 0) {
          // 3D/eğimli görünümde de çalışması için geniş bbox kullan
          var bbox = [[point.x - 12, point.y - 12], [point.x + 12, point.y + 12]];
          var pinHits = map.queryRenderedFeatures(bbox, { layers: pinLayers });
          if (pinHits.length > 0) {
            var props = pinHits[0].properties;
            return JSON.stringify({ type: 'pin', properties: props });
          }
        }

        // 2. Seçim katmanı (il/ilçe/bölge)
        if (map.getLayer('srrp-sel-hit')) {
          var selHits = map.queryRenderedFeatures(point, { layers: ['srrp-sel-hit'] });
          if (selHits.length > 0) {
            var selProps = selHits[0].properties;
            return JSON.stringify({ type: 'selection', properties: selProps });
          }
        }

        // 3. Cluster bubble tıklaması → zoom in
        if (map.getLayer('srrp-cluster-circles')) {
          var clusterHits = map.queryRenderedFeatures(point, { layers: ['srrp-cluster-circles'] });
          if (clusterHits.length > 0) {
            var clusterId = clusterHits[0].properties.cluster_id;
            var src = map.getSource('srrp-pins-cluster');
            if (src && clusterId !== undefined) {
              src.getClusterExpansionZoom(clusterId, function(err, zoom) {
                if (!err) {
                  map.easeTo({
                    center: clusterHits[0].geometry.coordinates,
                    zoom: zoom,
                    duration: 500
                  });
                }
              });
            }
            return JSON.stringify({ type: 'cluster' });
          }
        }

        // 4. Choropleth katmanı tıklaması (ilçe tematik harita)
        if (map.getLayer('srrp-choropleth-fill')) {
          var choroHits = map.queryRenderedFeatures(point, { layers: ['srrp-choropleth-fill'] });
          if (choroHits.length > 0) {
            var choroProps = choroHits[0].properties || {};
            return JSON.stringify({
              type: 'choropleth',
              properties: {
                NAME_1: choroProps.NAME_1 || '',
                NAME_2: choroProps.NAME_2 || '',
              }
            });
          }
        }
      } catch(e) {
        console.error('[SRRP] srrpQueryClick hata:', e);
      }

      return '{"type":"none"}';
    };

    // ── Şehre animasyonlu zoom (Önerilen Bölgeler için) ──────────────

    window.srrpFlyTo = function (lat, lon, zoom) {
      const map = window._srrpMap;
      if (!map) return;
      try {
        map.flyTo({ center: [lon, lat], zoom: zoom || 10, duration: 1200 });
      } catch (e) { console.error('[SRRP] srrpFlyTo:', e); }
    };

    window.srrpZoomIn = function () {
      const map = window._srrpMap;
      if (map) map.zoomIn({ duration: 300 });
    };

    window.srrpZoomOut = function () {
      const map = window._srrpMap;
      if (map) map.zoomOut({ duration: 300 });
    };

    // ── Kamera pitch (3D görünüm için) ─────────────────────────────

    window.srrpSetPitch = function (pitch) {
      const map = window._srrpMap;
      if (!map) return;
      try {
        map.easeTo({ pitch: pitch, duration: 800 });
      } catch (e) { console.error('[SRRP] srrpSetPitch:', e); }
    };

    // ── Harita etkileşimini aç/kapat ───────────────────────────────
    // Flutter overlay widget'ları (panel, slider, vb.) harita üzerindeyken
    // kullanıcı sürükleme/scroll hareketlerinin MapLibre'ye geçmesini önlemek için
    // Dart Listener.onPointerDown/Up'tan çağrılır.
    // NOT: pointerEvents CSS'e DOKUNMA — kaldırılırsa click olayları gelmez.
    window._mapInteractive = true;
    // Click guard: Dialog açıkken seçim katmanı tıklamalarını da bastır.
    // Dart tarafından MapViewMapLibre.setClickGuard ile kontrol edilir.
    window._srrpClickGuard = false;
    window.srrpSetClickGuard = function (active) {
      window._srrpClickGuard = !!active;
    };
    window.srrpSetMapInteractive = function (enable) {
      window._mapInteractive = enable;
      const map = window._srrpMap;
      if (!map) return;
      try {
        if (enable) {
          map.dragPan.enable();
          map.scrollZoom.enable();
          map.touchZoomRotate.enable();
          map.dragRotate.enable();
          map.keyboard.enable();
          map.doubleClickZoom.enable();
        } else {
          map.dragPan.disable();
          map.scrollZoom.disable();
          map.touchZoomRotate.disable();
          map.dragRotate.disable();
          map.keyboard.disable();
          map.doubleClickZoom.disable();
        }
      } catch (e) { console.error('[SRRP] srrpSetMapInteractive:', e); }
    };

    // ── Harita sınırlandırma (maxBounds) ──────────────────────────────
    window.srrpSetMaxBounds = function (swLng, swLat, neLng, neLat) {
      const map = window._srrpMap;
      if (!map) return;
      try {
        map.setMaxBounds([[swLng, swLat], [neLng, neLat]]);
        console.log('[SRRP] maxBounds ayarlandı:', swLng, swLat, neLng, neLat);
      } catch (e) { console.error('[SRRP] srrpSetMaxBounds:', e); }
    };

    window.srrpClearMaxBounds = function () {
      const map = window._srrpMap;
      if (!map) return;
      try { map.setMaxBounds(null); } catch (e) {}
    };

    // ── Vitrin pinleri (landing showcase) ─────────────────────────────
    // Harita kaynağı hazır olana kadar bekler, sonra GeoJSON'ı yükler.
    window.srrpSetShowcasePins = function (geojsonStr) {
      const map = window._srrpMap;
      if (!map) { setTimeout(function() { window.srrpSetShowcasePins(geojsonStr); }, 500); return; }
      var src = map.getSource('srrp-pins');
      if (!src) { setTimeout(function() { window.srrpSetShowcasePins(geojsonStr); }, 500); return; }
      try {
        src.setData(JSON.parse(geojsonStr));
        console.log('[SRRP] Vitrin pinleri yüklendi');
      } catch (e) { console.error('[SRRP] srrpSetShowcasePins:', e); }
    };

    // ── Pencere odak geri geldiğinde harita etkileşimini sıfırla ─────
    // Kullanıcı başka uygulamaya geçip döndüğünde interaktivite kilitli kalmasın.
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden && window._srrpMap) {
        window.srrpSetMapInteractive(true);
        window._srrpClickGuard = false;
      }
    });

    // ── Temel stil fill-extrusion layer'larını gizle/göster ─────────
    // Liberty gibi stiller kendi bina katmanlarıyla gelir; toggle için hepsini kontrol et.

    function _setBaseExtrusionVisibility(visible) {
      const map = window._srrpMap;
      if (!map) return;
      const style = map.getStyle();
      if (!style || !style.layers) return;
      const vis = visible ? 'visible' : 'none';
      for (const layer of style.layers) {
        if (layer.type === 'fill-extrusion' && !layer.id.startsWith('srrp-')) {
          try { map.setLayoutProperty(layer.id, 'visibility', vis); } catch (_) {}
        }
      }
    }

    // ── 3D Binalar (akıllı source-layer tespiti) ───────────────────
    // OFM Liberty = 'omnt', eski MapTiler = 'openmaptiles'
    // Hangisi varsa otomatik seçer; yükseklik property'sini de fallback ile alır.

    window.srrpAddBuildings = function (beforeId) {
      const map = window._srrpMap;
      if (!map) return false;
      try {
        const style = map.getStyle();
        if (!style || !style.sources) return false;

        // Source adını auto-detect et
        const candidates = ['omnt', 'openmaptiles', 'vectorTiles', 'composite'];
        let sourceId = null;
        for (const c of candidates) {
          if (style.sources[c] && style.sources[c].type === 'vector') {
            sourceId = c;
            break;
          }
        }
        if (!sourceId) {
          console.warn('[SRRP] 3D buildings: vektör kaynak bulunamadı. Mevcut kaynaklar:', Object.keys(style.sources));
          return false;
        }
        console.log('[SRRP] 3D buildings: kaynak =', sourceId);

        if (map.getLayer('srrp-buildings-3d')) map.removeLayer('srrp-buildings-3d');

        _setBaseExtrusionVisibility(false);

        const heightExpr = ['coalesce', ['get', 'render_height'], ['get', 'height'], 8];

    window.srrpRemoveBuildings = function () {
      const map = window._srrpMap;
      if (!map) return;

      // Stile ait bina katmanlarını geri göster

    };

    // ── Windy-Tarzı Rüzgar Akış Görselleştirmesi v3 ────────────────────────────
    // Full-trail-redraw yaklaşımı: her frame canvas temizlenir, her parçacığın
    // lon/lat trail'i map.project() ile yeniden çizilir.
    //
    // Avantajları:
    //  ✓ Gri birikim (alpha residue) olmaz
    //  ✓ Pan/zoom sırasında izler doğru pozisyonda kalır
    //  ✓ Dikdörtgen sınır görünmez
    //  ✓ Move handler'a gerek yok

    window.srrpStartWindParticles = function (geojsonStr) {
      const map = window._srrpMap;
      if (!map) return;
      window.srrpStopWindParticles();

      let data;
      try { data = JSON.parse(geojsonStr); } catch (e) {
        console.error('[SRRP] wind: GeoJSON parse hatası', e);
        return;
      }

      const vectors = data.features
        .filter(f => f.properties.speed > 0.3)
        .map(f => {
          const bRad = f.properties.bearing * Math.PI / 180;
          return {
            lon:   f.geometry.coordinates[0],
            lat:   f.geometry.coordinates[1],
            u:     Math.sin(bRad) * f.properties.speed,
            v:     Math.cos(bRad) * f.properties.speed,
            speed: f.properties.speed,
          };
        });

      if (vectors.length === 0) return;

      // ─── Grid sınırları — geniş tutarak dikdörtgen kenarını görünmez yap ───
      const B = { minLon: 22.0, maxLon: 48.0, minLat: 33.0, maxLat: 45.0 };

      // ─── IDW Bilinear Interpolasyon Grid ───
      const GW = 100, GH = 50;
      const gridU = new Float32Array(GW * GH);
      const gridV = new Float32Array(GW * GH);
      const gridS = new Float32Array(GW * GH);

      (function buildGrid() {
        // Vektörlerin konveks zarf mesafesini hesapla
        for (let gy = 0; gy < GH; gy++) {
          for (let gx = 0; gx < GW; gx++) {
            const lon = B.minLon + (gx + 0.5) * (B.maxLon - B.minLon) / GW;
            const lat = B.minLat + (gy + 0.5) * (B.maxLat - B.minLat) / GH;

            // Hızlı IDW: en yakın 4 vektör (daha fazla vektörle daha doğru ama yavaş)
            let n0d = Infinity, n1d = Infinity, n2d = Infinity, n3d = Infinity;
            let n0 = null, n1 = null, n2 = null, n3 = null;
            for (let vi = 0; vi < vectors.length; vi++) {
              const vec = vectors[vi];
              const d2 = (vec.lon - lon) ** 2 + (vec.lat - lat) ** 2;
              if (d2 < n0d) { n3d=n2d; n3=n2; n2d=n1d; n2=n1; n1d=n0d; n1=n0; n0d=d2; n0=vec; }
              else if (d2 < n1d) { n3d=n2d; n3=n2; n2d=n1d; n2=n1; n1d=d2; n1=vec; }
              else if (d2 < n2d) { n3d=n2d; n3=n2; n2d=d2; n2=vec; }
              else if (d2 < n3d) { n3d=d2; n3=vec; }
            }

            let wSum = 0, uSum = 0, vSum = 0;
            var nn = [n0, n1, n2, n3]; var nd = [n0d, n1d, n2d, n3d];
            for (let k = 0; k < 4; k++) {
              if (!nn[k]) continue;
              const w = 1.0 / (nd[k] + 0.0001);
              uSum += nn[k].u * w;
              vSum += nn[k].v * w;
              wSum += w;
            }

            const idx = gy * GW + gx;
            if (wSum > 0) {
              gridU[idx] = uSum / wSum;
              gridV[idx] = vSum / wSum;
              gridS[idx] = Math.sqrt((uSum / wSum) ** 2 + (vSum / wSum) ** 2);
            }

            // En yakın veri noktası çok uzaksa → hızı sıfırla (Türkiye dışı)
            if (n0d > 4.0) { gridU[idx] = 0; gridV[idx] = 0; gridS[idx] = 0; }
          }
        }
      })();

      // Bilinear interpolasyon
      function gridLookup(lon, lat) {
        const fx = (lon - B.minLon) / (B.maxLon - B.minLon) * GW - 0.5;
        const fy = (lat - B.minLat) / (B.maxLat - B.minLat) * GH - 0.5;
        const gx0 = Math.max(0, Math.min(GW - 2, Math.floor(fx)));
        const gy0 = Math.max(0, Math.min(GH - 2, Math.floor(fy)));
        const tx = fx - gx0, ty = fy - gy0;
        const i00 = gy0 * GW + gx0, i10 = i00 + 1;
        const i01 = i00 + GW, i11 = i01 + 1;
        const a = (1-tx)*(1-ty), b = tx*(1-ty), c = (1-tx)*ty, d = tx*ty;
        return {
          u:     gridU[i00]*a + gridU[i10]*b + gridU[i01]*c + gridU[i11]*d,
          v:     gridV[i00]*a + gridV[i10]*b + gridV[i01]*c + gridV[i11]*d,
          speed: gridS[i00]*a + gridS[i10]*b + gridS[i01]*c + gridS[i11]*d,
        };
      }

      // ─── Zoom-adaptif parametreler ───
      function getZoomParams() {
        const z = map.getZoom();
        if (z < 7)  return { count: 600,  minSpd: 3.0, trailLen: 30, maxAge: 4.5, speedMul: 5.0  };
        if (z < 9)  return { count: 900,  minSpd: 1.5, trailLen: 25, maxAge: 3.5, speedMul: 4.0  };
        if (z < 11) return { count: 1200, minSpd: 0.8, trailLen: 20, maxAge: 3.0, speedMul: 3.0  };
        return              { count: 1500, minSpd: 0.3, trailLen: 16, maxAge: 2.5, speedMul: 2.0  };
      }

      // ─── Windy renk paleti ───
      function speedColor(spd, alpha) {
        let r, g, b2;
        if (spd < 2) {
          const t = spd / 2;
          r = 60 + t * 20;  g = 100 + t * 80;  b2 = 180 + t * 40;
        } else if (spd < 4) {
          const t = (spd - 2) / 2;
          r = 80 - t * 20;  g = 180 + t * 50;  b2 = 220 + t * 15;
        } else if (spd < 7) {
          const t = (spd - 4) / 3;
          r = 60 + t * 80;  g = 230 + t * 10;  b2 = 235 - t * 150;
        } else if (spd < 10) {
          const t = (spd - 7) / 3;
          r = 140 + t * 115; g = 240 - t * 40;  b2 = 85 - t * 55;
        } else if (spd < 14) {
          const t = (spd - 10) / 4;
          r = 255;            g = 200 - t * 130; b2 = 30 + t * 10;
        } else {
          const t = Math.min((spd - 14) / 8, 1);
          r = 255;            g = 70 + t * 100;  b2 = 40 + t * 140;
        }
        return 'rgba(' + Math.round(r) + ',' + Math.round(g) + ',' + Math.round(b2) + ',' + alpha.toFixed(3) + ')';
      }

      function speedWidth(spd) {
        if (spd < 2)  return 0.8;
        if (spd < 5)  return 1.2;
        if (spd < 8)  return 1.8;
        if (spd < 12) return 2.5;
        return 3.2;
      }

      // ─── Canvas oluşturma ───
      const container = map.getContainer();
      container.style.position = 'relative';
      const mlCanvas = map.getCanvas();

      function _windCanvasSize() {
        var rect = container.getBoundingClientRect();
        if (rect.width > 0 && rect.height > 0) return { w: Math.round(rect.width), h: Math.round(rect.height) };
        if (mlCanvas.width > 0 && mlCanvas.height > 0) return { w: mlCanvas.width, h: mlCanvas.height };
        if (container.clientWidth > 0) return { w: container.clientWidth, h: container.clientHeight };
        return { w: window.innerWidth || 800, h: window.innerHeight || 600 };
      }

      const canvas = document.createElement('canvas');
      canvas.id = 'srrp-wind-canvas';
      // Canvas'ı harita container'ının içine ekle (body yerine)
      // Bu sayede Flutter'ın platform view z-order'ı bozulmaz
      // Mobil ve masaüstünde aynı şekilde çalışır
      canvas.style.cssText = 'position:absolute;pointer-events:none;z-index:9999;'
        + 'top:0;left:0;width:100%;height:100%;';
      container.appendChild(canvas);
      const ctx = canvas.getContext('2d');

      // DPI ölçekleme (retina/mobil ekranlar için)
      const dpr = window.devicePixelRatio || 1;

      var _initSize = _windCanvasSize();
      canvas.width = Math.round(_initSize.w * dpr);
      canvas.height = Math.round(_initSize.h * dpr);
      ctx.scale(dpr, dpr);

      function _windResync() {
        var sz = _windCanvasSize();
        var needsResize = (canvas.width !== Math.round(sz.w * dpr)) || (canvas.height !== Math.round(sz.h * dpr));
        if (needsResize) {
          canvas.width = Math.round(sz.w * dpr);
          canvas.height = Math.round(sz.h * dpr);
          ctx.scale(dpr, dpr);
        }
        // Container içi absolute konumlandırma — ek ayar gerekmez
      }
      map.on('resize', _windResync);
      window._srrpWindResync = _windResync;

      // ─── Parçacık havuzu — trail ile ───
      const MAX_P = 1600;
      const MAX_TRAIL = 35;  // maksimum kuyruk uzunluğu

      // Her parçacığın durumu
      const pLon = new Float64Array(MAX_P);
      const pLat = new Float64Array(MAX_P);
      const pAge = new Float32Array(MAX_P);
      const pMaxAge = new Float32Array(MAX_P);
      const pSpd = new Float32Array(MAX_P);

      // Trail: her parçacık için lon/lat ring buffer
      // [particle_i * MAX_TRAIL * 2 + trail_j * 2 + 0] = lon
      // [particle_i * MAX_TRAIL * 2 + trail_j * 2 + 1] = lat
      const trails = new Float64Array(MAX_P * MAX_TRAIL * 2);
      const tHead  = new Int32Array(MAX_P);   // ring buffer head
      const tLen   = new Int32Array(MAX_P);   // mevcut trail uzunluğu
      var activeN  = 0;

      function resetParticle(i, params) {
        var att = 0;
        do {
          pLon[i] = B.minLon + Math.random() * (B.maxLon - B.minLon);
          pLat[i] = B.minLat + Math.random() * (B.maxLat - B.minLat);
          var w = gridLookup(pLon[i], pLat[i]);
          pSpd[i] = w.speed;
          if (w.speed >= params.minSpd || att > 10) break;
          att++;
        } while (true);
        pAge[i] = Math.random() * 0.5;
        pMaxAge[i] = params.maxAge * (0.6 + Math.random() * 0.8);
        tHead[i] = 0;
        tLen[i] = 0;
        // İlk noktayı trail'e ekle
        var base = i * MAX_TRAIL * 2;
        trails[base] = pLon[i];
        trails[base + 1] = pLat[i];
        tLen[i] = 1;
      }

      var zp = getZoomParams();
      activeN = zp.count;
      for (var ii = 0; ii < activeN; ii++) resetParticle(ii, zp);

      console.log('[SRRP] Wind v3 başlatılıyor:', vectors.length, 'vektör,',
                  activeN, 'parçacık, grid:', GW, 'x', GH);

      // ─── Animasyon döngüsü ───
      var rafId = null, lastTs = 0;

      function frame(ts) {
        var dt = Math.min((ts - lastTs) / 1000, 0.05);
        lastTs = ts;

        var sz = _windCanvasSize();
        var wDpr = Math.round(sz.w * dpr), hDpr = Math.round(sz.h * dpr);
        if (canvas.width !== wDpr || canvas.height !== hDpr) {
          canvas.width = wDpr; canvas.height = hDpr;
          ctx.scale(dpr, dpr);
        }
        var cw = sz.w, ch = sz.h;
        var params = getZoomParams();

        // Parçacık sayısını ayarla
        if (activeN < params.count && activeN < MAX_P) {
          var add = Math.min(params.count - activeN, 40);
          for (var a = 0; a < add; a++) resetParticle(activeN + a, params);
          activeN += add;
        } else if (activeN > params.count) {
          activeN = Math.max(params.count, activeN - 40);
        }

        // ══════════════════════════════════════════════════════════════
        // HER FRAME: canvas'ı tamamen temizle → gri birikim YOK
        // ══════════════════════════════════════════════════════════════
        ctx.clearRect(0, 0, cw, ch);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        var usedTrailLen = Math.min(params.trailLen, MAX_TRAIL);

        for (var i = 0; i < activeN; i++) {
          pAge[i] += dt;
          if (pAge[i] >= pMaxAge[i]) { resetParticle(i, params); continue; }

          var wind = gridLookup(pLon[i], pLat[i]);
          if (wind.speed < 0.2) { pAge[i] = pMaxAge[i]; continue; }
          if (wind.speed < params.minSpd * 0.5) { pAge[i] = pMaxAge[i]; continue; }

          // Hareket
          var moveFactor = 0.00008 * params.speedMul * dt * 60;
          var nx = pLon[i] + wind.u * moveFactor;
          var ny = pLat[i] + wind.v * moveFactor;

          if (nx < B.minLon || nx > B.maxLon || ny < B.minLat || ny > B.maxLat) {
            resetParticle(i, params); continue;
          }

          // Trail'e yeni noktayı ekle
          pLon[i] = nx;
          pLat[i] = ny;
          pSpd[i] = wind.speed;

          var head = (tHead[i] + 1) % usedTrailLen;
          tHead[i] = head;
          if (tLen[i] < usedTrailLen) tLen[i]++;
          var bIdx = (i * MAX_TRAIL + head) * 2;
          trails[bIdx] = nx;
          trails[bIdx + 1] = ny;

          // ─── Trail çizimi ───
          var len = tLen[i];
          if (len < 2) continue;

          // Yaşam opaklığı
          var lt = pAge[i] / pMaxAge[i];
          var lifeAlpha = lt < 0.08 ? lt / 0.08 : lt > 0.75 ? (1.0 - lt) / 0.25 : 1.0;
          var baseAlpha = Math.min(0.35 + wind.speed * 0.055, 0.92);
          var maxAlpha = lifeAlpha * baseAlpha;
          var lw = speedWidth(wind.speed);

          // Trail segmentlerini çiz — kuyruktan başa, alpha artarak
          ctx.lineWidth = lw;
          for (var j = 1; j < len; j++) {
            // Ring buffer'dan sıralı indeks (kuyruk → baş)
            var ti0 = (head - len + j + usedTrailLen) % usedTrailLen;
            var ti1 = (head - len + j + 1 + usedTrailLen) % usedTrailLen;
            var b0 = (i * MAX_TRAIL + ti0) * 2;
            var b1 = (i * MAX_TRAIL + ti1) * 2;

            // Projeksiyon — lon/lat → ekran pikseli
            var p0 = map.project([trails[b0], trails[b0+1]]);
            var p1 = map.project([trails[b1], trails[b1+1]]);

            // Ekran dışı kontrolü
            if (p0.x < -50 || p0.x > cw+50 || p0.y < -50 || p0.y > ch+50) continue;

            // Segment alpha: kuyruk soluk → baş parlak
            var segT = (j / (len - 1));       // 0=kuyruk, 1=baş
            var segAlpha = segT * segT * maxAlpha;  // kuadratik artış

            ctx.beginPath();
            ctx.moveTo(p0.x, p0.y);
            ctx.lineTo(p1.x, p1.y);
            ctx.strokeStyle = speedColor(wind.speed, segAlpha);
            ctx.stroke();
          }
        }

        rafId = requestAnimationFrame(frame);
      }

      // Başlangıç boyutu (DPI-aware)
      rafId = requestAnimationFrame(frame);
      window._srrpWindRafId  = rafId;
      window._srrpWindCanvas = canvas;
    };

    window.srrpStopWindParticles = function () {

        if (window._srrpWindResync) {

          window._srrpWindResync = null;
        }

      if (window._srrpWindCanvas) {
        window._srrpWindCanvas.remove();
        window._srrpWindCanvas = null;
      }
    };

    // ── Coğrafi Seçim Modu (Bölge / İl / İlçe) ──────────────────────────────────

      "Bitlis":"13",     "Bolu":"14",         "Burdur":"15",        "Bursa":"16",
      "Çanakkale":"17",  "Çankırı":"18",      "Çorum":"19",         "Denizli":"20",
      "Diyarbakır":"21", "Edirne":"22",       "Elazığ":"23",        "Erzincan":"24",
      "Erzurum":"25",    "Eskişehir":"26",    "Gaziantep":"27",     "Giresun":"28",
      "Gümüşhane":"29",  "Hakkâri":"30",      "Hatay":"31",         "Isparta":"32",
      "Mersin":"33",     "İstanbul":"34",     "İzmir":"35",         "Kars":"36",
      "Kastamonu":"37",  "Kayseri":"38",      "Kırklareli":"39",    "Kırşehir":"40",

      "Şırnak":"73",     "Bartın":"74",       "Ardahan":"75",       "Iğdır":"76",
