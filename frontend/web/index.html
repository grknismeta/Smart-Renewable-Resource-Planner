  <!-- 2026-06-02 (deploy): API taban adresi. DEV (localhost) → backend :8000;
       PROD → same-origin /api (Caddy reverse proxy backend'e yönlendirir).
       JS shim'leri (window.SRRP_API_BASE) bunu okur; Dart tarafı api_client.dart
       içinde aynı mantığı uygular. -->
  <script>
    (function () {
      var h = location.hostname;
      window.SRRP_API_BASE = (h === 'localhost' || h === '127.0.0.1')
        ? 'http://' + h + ':8000'
        : location.origin + '/api';
    })();
  </script>

  <!-- AUTH-3 (2026-06-01): Google Sign-In (web) client ID — google_sign_in_web
       plugin'i bu meta tag'i okur. PUBLIC değer. -->
  <meta name="google-signin-client_id" content="756480872473-fm4vb6j5u3ic9c5fhbrr0jhkmrl74m7e.apps.googleusercontent.com">

  <!-- Google Fonts: Noto Sans (Türkçe + Latin Extended + Unicode kapsamı) -->

  <!-- 3D Santral: GLB modelleri three.js + MapLibre custom WebGL layer ile
       (tek context, gerçek 3B). importmap module script'lerden ÖNCE olmalı. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- MapLibre GL JS — Lazy-load: Sadece MapLibre moduna geçilince yüklenir.
       srrpEnsureMapLibre(callback) fonksiyonu ile yönetilir.
       Standart harita kullanıcıları için ~800KB script yüklenmez → lag yok. -->

  <!-- SRRP MapLibre Shim
       Amaç: Flutter maplibre paketi "source-layer" parametresini desteklemiyor.
       Bu shim MapLibre.Map constructor'ını Proxy ile sararak son harita örneğini
       window._srrpMap'e kaydeder; ardından Dart tarafından çağrılacak global
       yardımcı fonksiyonları (srrpAddLayer, srrpRemoveLayer, srrpSetTerrain) tanımlar.
  -->
  <script>
  (function () {
    // ── MapLibre Proxy/Shim kurulumu ──────────────────────────────────────────
    // maplibregl yüklendikten SONRA çağrılır (hem eager hem lazy yüklemede).
    var _proxyInstalled = false;
    function _srrpSetupProxy() {
      if (_proxyInstalled || typeof maplibregl === 'undefined') return;
      _proxyInstalled = true;

    // ── İdari sınır düzeltici ──────────────────────────────────────
    // Her style.load sonrası otomatik çalışır.
    // - İl (admin-1 / state) sınırları: solid, her zoom'da görünür
    // - İlçe (admin-2 / county / district) sınırları: zoom ≥ 7'de görünür
    // Carto dark-matter, OpenFreeMap Liberty ve benzer stillerin farklı
    // layer-id convention'larını hepsini yakalar.
    function _srrpApplyAdminBorderFixes(map) {
      try {
        const style = map.getStyle();
        if (!style || !style.layers) return;

        var provCount = 0, distCount = 0;

        for (const layer of style.layers) {
          if (layer.type !== 'line') continue;
          const id = layer.id.toLowerCase();

          // İl / eyalet sınırı — her zaman solid, belirgin
          const isProv = id.includes('admin-1') || id.includes('admin_1') ||
                         id.includes('state-border') || id.includes('state_border') ||
                         (id.includes('boundary') && id.includes('state')) ||
                         (id.includes('boundary') && id.includes('province'));

          // İlçe / ilçe sınırı — yalnızca yakın zoom'da
          const isDist = id.includes('admin-2') || id.includes('admin_2') ||
                         id.includes('county') || id.includes('district') ||
                         (id.includes('boundary') && id.includes('county'));

          if (isProv) {
            provCount++;
            try { map.setPaintProperty(id, 'line-dasharray', [1, 0]); } catch(_) {}
            try { map.setPaintProperty(id, 'line-color', 'rgba(220,220,220,0.55)'); } catch(_) {}
            try { map.setPaintProperty(id, 'line-width',
              ['interpolate', ['linear'], ['zoom'], 3, 0.4, 6, 0.8, 10, 1.4]); } catch(_) {}
            try { map.setPaintProperty(id, 'line-opacity', 1); } catch(_) {}
            try { map.setLayoutProperty(id, 'visibility', 'visible'); } catch(_) {}
          } else if (isDist) {
            distCount++;
            try { map.setPaintProperty(id, 'line-opacity',
              ['step', ['zoom'], 0, 7, 0.55]); } catch(_) {}
            try { map.setPaintProperty(id, 'line-dasharray', [1, 0]); } catch(_) {}
            try { map.setLayoutProperty(id, 'visibility', 'visible'); } catch(_) {}
          }
        }
        console.log('[SRRP] Admin sınır düzeltmeleri uygulandı — il:', provCount, 'ilçe:', distCount,
                     '(toplam line layer:', style.layers.filter(l => l.type === 'line').length + ')');
      } catch (e) {
        console.warn('[SRRP] Admin border fix hatası:', e);
      }
    }

    // Map constructor'ını Proxy ile sar — son örneği yakala
    maplibregl.Map = new Proxy(maplibregl.Map, {
      construct(Target, args) {
        const instance = Reflect.construct(Target, args);
        window._srrpMap = instance;

        // ── Custom Style-Ready Flag ──────────────────────────────────
        // MapLibre'nin `isStyleLoaded()` getter'ı sürekli tile yüklemesi
        // (vector tiles, MVT, choropleth tile fetch, raster reload, vb.)
        // sırasında HEP false dönüyor. Bu, click query'leri için yanlış sinyal —
        // ilk style.load fire ettiyse query'ler çalışabilmeli.
        //
        // Çözüm: kendi flag'imiz. Yeni instance açılınca false, ilk style.load
        // fire edince true. Bir daha false yapılmaz (style switch'te yeni
        // instance açılır → constructor tekrar çalışır → false reset olur).
        window._srrpStyleReady = false;

        // Her style.load'da (ilk yükleme + stil değişimi) sınır düzeltmesini uygula
        instance.on('style.load', function() {
          window._srrpStyleReady = true;
          // Dart tarafındaki _initLayers'ın bitmesini bekle (100ms yeterli)
          setTimeout(function() { _srrpApplyAdminBorderFixes(instance); }, 150);
          // MapLibre varsayılan 'grab' cursor'ını kaldır — 'default' kullan
          instance.getCanvas().style.cursor = 'default';
          // 2026-06-02: İstenen sayfa-durumunu (maxBounds + interactive) yeniden
          // uygula. Fresh build'de (örn. yeni port) harita constructor'ı Dart'ın
          // setMaxBounds/setInteractive çağrısından SONRA çalışabiliyor; o çağrılar
          // _srrpMap null iken global'e yazılıp burada (harita hazırken) uygulanır.
          // Aksi halde landing sınırları/kilidi düşüyordu (sınır dışına çıkılabiliyordu).
          try {
            // 2026-06-05 (TÜRKİYE-ONLY): maxBounds HER style.load'da uygulanır.
            // Global yoksa sabit TR kutusuna düş → harita ASLA sınırsız kalmaz
            // (tarayıcı/timing fark etmez; "harita dışarı çıkıyor" bug'ı biter).
            // İSTİSNA: globe (dünya) modu açıkken sınır UYGULANMAZ (dünya gezinir).
            if (window._srrpGlobeActive) {
              instance.setMaxBounds(null);
            } else {
              instance.setMaxBounds(
                window._srrpDesiredMaxBounds ||
                window._SRRP_TR_BOUNDS ||
                [[23.0, 33.8], [47.5, 43.5]]
              );
            }
            window.srrpSetMapInteractive(window._mapInteractive !== false);
          } catch (_) {}
        });

        // Drag sırasında grabbing cursor — başka durumda default
        instance.on('mousedown', function() {
          if (!window._mapInteractive) return;
          instance.getCanvas().style.cursor = 'grabbing';
        });
        instance.on('mouseup', function() {
          instance.getCanvas().style.cursor = 'default';
        });
        instance.on('dragend', function() {
          instance.getCanvas().style.cursor = 'default';
        });

        // ── Eksik İkonları Şeffaf Piksel ile Doldur (Uyarı Kirliliğini Önle) ──
        instance.on('styleimagemissing', function(e) {
          const id = e.id;
          // 1x1 şeffaf RGBA piksel data
          const data = new Uint8Array([0, 0, 0, 0]);
          instance.addImage(id, { width: 1, height: 1, data: data });
        });

        return instance;
      }
    });
    } // end _srrpSetupProxy

    // ── Pin Hover Detection ─────────────────────────────────────────
    // Dart, srrpSetPinHoverFn ile bir callback kaydeder.
    // srrpSetupPinHover ise 'srrp-pins-circles' layer'ına
    // mousemove / mouseleave handler'larını bağlar.
    // _initLayers her stil değişiminden sonra çağırır (layer yeniden oluşturulur).

    window._srrpPinHoverFn          = null;
    window._srrpPinMousemoveHandler = null;
    window._srrpPinMouseleaveHandler = null;

    window.srrpSetPinHoverFn = function(fn) {
      window._srrpPinHoverFn = fn;
    };

    window.srrpSetupPinHover = function() {
      const map = window._srrpMap;
      if (!map) return;

      const LAYER = 'srrp-pins-circles';

      // Eski handler'ları temizle (duplicate önle)
      if (window._srrpPinMousemoveHandler) {
        try { map.off('mousemove',  LAYER, window._srrpPinMousemoveHandler); } catch(_) {}
        try { map.off('mouseleave', LAYER, window._srrpPinMouseleaveHandler); } catch(_) {}
      }

      window._srrpPinMousemoveHandler = function(e) {
        if (!e.features || e.features.length === 0) return;
        const id = String(e.features[0].properties.id);
        map.getCanvas().style.cursor = 'pointer';
        if (window._srrpPinHoverFn) window._srrpPinHoverFn(id);
      };

      window._srrpPinMouseleaveHandler = function() {
        map.getCanvas().style.cursor = 'default';
        if (window._srrpPinHoverFn) window._srrpPinHoverFn('');
      };

      map.on('mousemove',  LAYER, window._srrpPinMousemoveHandler);
      map.on('mouseleave', LAYER, window._srrpPinMouseleaveHandler);
    };

    // ── Pin Click Detection ─────────────────────────────────────────
    // Dart, srrpSetPinClickFn ile bir callback kaydeder.
    // srrpSetupPinClick ise 'srrp-pins-circles' layer'ına
    // click handler bağlar. Pin tıklaması olduğunda properties JSON gönderilir.
    // Ayrıca cluster single pin tıklaması da desteklenir.

    window._srrpPinClickFn      = null;
    window._srrpPinClickHandler = null;
    window._srrpClusterClickHandler = null;

    window.srrpSetPinClickFn = function(fn) {
      window._srrpPinClickFn = fn;
    };

    window.srrpSetupPinClick = function() {
      const map = window._srrpMap;
      if (!map) return;

      const LAYER   = 'srrp-pins-circles';
      const CLUSTER = 'srrp-cluster-single';

      // Eski handler'ları temizle (duplicate önle)
      if (window._srrpPinClickHandler) {
        try { map.off('click', LAYER, window._srrpPinClickHandler); } catch(_) {}
      }
      if (window._srrpClusterClickHandler) {
        try { map.off('click', CLUSTER, window._srrpClusterClickHandler); } catch(_) {}
      }

      window._srrpPinClickHandler = function(e) {
        if (window._srrpClickGuard) return;
        if (!e.features || e.features.length === 0) return;
        var props = e.features[0].properties;
        // NOT: _srrpClickGuard burada AÇILMAZ — seçim katmanı tıklamalarını
        // engellemekten kaçınılır. Dart tarafında _jsClickHandled bayrağı
        // MapEventClick çakışmasını zaten önler.
        if (window._srrpPinClickFn) {
          try {
            window._srrpPinClickFn(JSON.stringify(props));
          } catch(err) { console.error('[SRRP] pinClickFn hata:', err); }
        }
      };

      map.on('click', LAYER, window._srrpPinClickHandler);

      // Cluster single pin tıklaması (kümeleme aktifken tekil pinler)
      window._srrpClusterClickHandler = function(e) {
        if (window._srrpClickGuard) return;
        if (!e.features || e.features.length === 0) return;
        var props = e.features[0].properties;
        if (window._srrpPinClickFn) {
          try {
            window._srrpPinClickFn(JSON.stringify(props));
          } catch(err) { console.error('[SRRP] clusterClickFn hata:', err); }
        }
      };

      // Cluster layer henüz yoksa hata vermez, map.on sessizce yok sayar
      try { map.on('click', CLUSTER, window._srrpClusterClickHandler); } catch(_) {}
    };

    // ── Pin Kümeleme (Cluster) ──────────────────────────────────────
    // srrpUpdateClusterPins: Flutter pin layer'larını gizler,
    //   MapLibre cluster source + layer'larını kurar.
    // srrpClearClusterPins: Cluster layer'larını kaldırır,
    //   Flutter pin layer'larını tekrar gösterir.

    var _CSRC = 'srrp-pins-cluster';
    var _CCIRC = 'srrp-cluster-circles';
    var _CCNT  = 'srrp-cluster-count';
    var _CSINGLE = 'srrp-cluster-single';
    var _FLUTTER_PIN_LAYERS = [
      'srrp-pins-shadow', 'srrp-pins-circles',
      'srrp-pins-labels', 'srrp-pins-city-labels'
    ];

    window._srrpClusterActive = false;

    window.srrpUpdateClusterPins = function(geojsonStr) {
      var map = window._srrpMap;
      if (!map) return;

      // Flutter pin layer'larını gizle
      _FLUTTER_PIN_LAYERS.forEach(function(id) {
        try { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'none'); } catch(_) {}
      });

      // Mevcut cluster layer/source'u kaldır (yeniden yükle)
      [_CCIRC, _CCNT, _CSINGLE].forEach(function(id) {
        try { if (map.getLayer(id)) map.removeLayer(id); } catch(_) {}
      });
      try { if (map.getSource(_CSRC)) map.removeSource(_CSRC); } catch(_) {}

      var geojson;
      try { geojson = JSON.parse(geojsonStr); } catch(_) { return; }

      map.addSource(_CSRC, {
        type: 'geojson',
        data: geojson,
        cluster: true,
        clusterMaxZoom: 10,
        clusterRadius: 60
      });

      // Cluster çemberleri (birden fazla pin)
      map.addLayer({
        id: _CCIRC, type: 'circle', source: _CSRC,
        filter: ['has', 'point_count'],
        paint: {
          'circle-color': [
            'step', ['get', 'point_count'],
            '#4ECDC4', 5, '#FFD93D', 15, '#FF6B6B'
          ],
          'circle-radius': ['step', ['get', 'point_count'], 22, 5, 30, 15, 40],
          'circle-stroke-width': 2,
          'circle-stroke-color': '#ffffff',
          'circle-opacity': 0.88
        }
      });

      // Cluster sayı etiketi
      map.addLayer({
        id: _CCNT, type: 'symbol', source: _CSRC,
        filter: ['has', 'point_count'],
        layout: {
          'text-field': '{point_count_abbreviated}',
          'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
          'text-size': 13
        },
        paint: { 'text-color': '#ffffff' }
      });

      // Tekil pinler (kümelenmemiş)
      map.addLayer({
        id: _CSINGLE, type: 'circle', source: _CSRC,
        filter: ['!', ['has', 'point_count']],
        paint: {
          'circle-color': ['coalesce', ['get', 'color'], '#66BB6A'],
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 4, 6, 10, 10],
          'circle-stroke-width': 2,
          'circle-stroke-color': '#ffffff',
          'circle-opacity': 0.9
        }
      });

      window._srrpClusterActive = true;
    };

    window.srrpClearClusterPins = function() {
      var map = window._srrpMap;
      if (!map) return;

      [_CCIRC, _CCNT, _CSINGLE].forEach(function(id) {
        try { if (map.getLayer(id)) map.removeLayer(id); } catch(_) {}
      });
      try { if (map.getSource(_CSRC)) map.removeSource(_CSRC); } catch(_) {}

      // Flutter pin layer'larını geri göster
      _FLUTTER_PIN_LAYERS.forEach(function(id) {
        try { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'visible'); } catch(_) {}
      });

      window._srrpClusterActive = false;
    };

    // ── 3D Santral (GLB model-viewer marker) ────────────────────────
    // Pinleri gerçek 3D modele çevirir: RES→türbin, GES→güneş paneli.
    // Daire pin layer'ı GÖRÜNÜR kalır (tıklama/hover onunla çalışır); model
    // üstte pointer-events:none overlay olarak durur. WebGL context limiti
    // (~16) nedeniyle: sadece yüksek zoom + görünür alan + en yakın CAP pin.
    var _M3D_MINZOOM = 6.5;   // bu zoom altında sadece daireler
    var _M3D_CAP = 40;        // vektör hafif → daha çok marker (WebGL limiti yok)
    window._srrp3DEnabled = false;
    window._srrp3DFeats = [];
    window._srrp3DById = {};        // pinId -> maplibregl.Marker
    window._srrp3DListener = null;

    function _m3dIsWind(props) {
      var t = (props && props.type ? String(props.type) : '').toLowerCase();
      return t.indexOf('rüzgar') >= 0 || t.indexOf('ruzgar') >= 0 ||
             t.indexOf('wind') >= 0 || t === 'res';
    }
    function _m3dIsSolar(props) {
      var t = (props && props.type ? String(props.type) : '').toLowerCase();
      return t.indexOf('güneş') >= 0 || t.indexOf('gunes') >= 0 ||
             t.indexOf('solar') >= 0 || t.indexOf('panel') >= 0 || t === 'ges';
    }

    // ── Türbin fiziği: rüzgar hızı (m/s) → kanat açısal hızı (deg/sn) ──
    // Gerçek güç eğrisi: cut-in 3, rated 12, cut-out 25 m/s. Rated'de ~15 RPM
    // (=90 deg/s). cut-in altı / cut-out üstü = durur (fren/feather).
    function _m3dTurbineOmega(windMs) {
      var CUT_IN = 3.0, RATED = 12.0, CUT_OUT = 25.0, RATED_OMEGA = 90.0;
      if (windMs == null || isNaN(windMs)) windMs = 7.5; // makul varsayılan
      if (windMs < CUT_IN || windMs > CUT_OUT) return 0;
      if (windMs < RATED) return RATED_OMEGA * (windMs - CUT_IN) / (RATED - CUT_IN);
      return RATED_OMEGA;
    }

    window._m3dUid = 0;
    window._m3dRaf = null;
    window._m3dLast = null;
    window._m3d3DScale = 1;   // kullanıcı boyut slider'ı (Katmanlar → 3D Santral)
    window._m3dBuiltScale = 1; // marker'ların kurulduğu efektif ölçek

    // Efektif ölçek = kullanıcı slider × zoom büyümesi. Boyut PX ile sürülür
    // (CSS scale() rasterleştirip piksellendiriyordu); büyüyünce yeniden kurulur.
    window._m3dEffScale = function() {
      var m = window._srrpMap;
      var z = m ? m.getZoom() : 12;
      var zf = Math.max(1, Math.min(2.8, 1 + (z - 10) * 0.18));
      return (window._m3d3DScale || 1) * zf;
    };

    // Dart'tan model boyut ölçeği — marker'ları yeni px boyutunda yeniden kurar.
    window.srrpSet3DScale = function(s) {
      window._m3d3DScale = (typeof s === 'number' && s > 0) ? s : 1;
      var byId = window._srrp3DById || {};
      Object.keys(byId).forEach(function(k){ byId[k].remove(); delete byId[k]; });
      if (window._srrpRefresh3D) window._srrpRefresh3D();
    };

    // Tek paylaşımlı rAF: tüm türbin kanat gruplarını döndürür (N marker → 1 tick).
    function _m3dTick(t) {
      var dt = Math.min(0.05, (t - (window._m3dLast || t)) / 1000);
      window._m3dLast = t;
      var byId = window._srrp3DById || {};
      var any = false;
      for (var k in byId) {
        var m = byId[k];
        if (m && m._blade) {
          any = true;
          if (m._omega > 0) {
            m._angle = (m._angle + m._omega * dt) % 360;
            // SVG attribute rotate → viewBox (0,0)=hub etrafında düzgün döner.
            m._blade.setAttribute('transform', 'rotate(' + m._angle.toFixed(1) + ')');
          }
        }
      }
      if (any && window._srrp3DEnabled) {
        window._m3dRaf = requestAnimationFrame(_m3dTick);
      } else {
        window._m3dRaf = null;
      }
    }
    window._m3dStartTick = function() {
      if (!window._m3dRaf) {
        window._m3dLast = null;
        window._m3dRaf = requestAnimationFrame(_m3dTick);
      }
    };

    // ── Vektör RÜZGAR TÜRBİNİ marker'ı ──
    // Gövde sabit, sadece kanat döner. `scene` katmanı kamera pitch/bearing'inden
    // sürülür (_m3dApplyCamera) → dünyaya çakılı 3B nesne gibi davranır:
    // top-down'da yatık, tam eğimde dik; bearing'le yan/arka görünür.
    function _m3dBuildTurbine(feat) {
      var size = Math.round(92 * window._m3dEffScale()); // px ile boyut (keskin)
      var p = feat.properties || {};
      var windMs = (p.windSpeed != null) ? parseFloat(p.windSpeed) : 7.5;
      var windDir = (p.windDir != null) ? parseFloat(p.windDir) : 0; // dünya yaw (deg)
      var uid = 'wt' + (window._m3dUid++);

      var wrap = document.createElement('div');
      // position:absolute ŞART — maplibre transform ile konumlandırır.
      wrap.style.cssText = 'width:' + size + 'px;height:' + (size * 1.6) +
        'px;position:absolute;top:0;left:0;perspective:700px;pointer-events:none;' +
        'filter:drop-shadow(0 6px 14px rgba(0,0,0,.45));';

      // scene — kamera-sürümlü 3B kök; pivot TABANDA (= pin).
      var scene = document.createElement('div');
      scene.style.cssText = 'position:absolute;left:0;top:0;width:100%;height:100%;' +
        'transform-origin:center bottom;transform-style:preserve-3d;';
      // Kule (statik SVG). Nacelle YOK — rotor'un hub'ı nacelle görevi görür
      // (ayrı ellipse boşluk/hizasızlık yaratıyordu). none → tam hizalama.
      scene.innerHTML =
        '<svg viewBox="0 0 100 150" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%">' +
        '<defs>' +
        '<linearGradient id="twr' + uid + '" x1="0" x2="1"><stop offset="0" stop-color="#6E7785"/><stop offset=".38" stop-color="#FAFBFD"/><stop offset=".62" stop-color="#CBD2DC"/><stop offset="1" stop-color="#586071"/></linearGradient>' +
        '</defs>' +
        '<path d="M 45.5 150 L 47.8 51 L 52.2 51 L 54.5 150 Z" fill="url(#twr' + uid + ')" stroke="rgba(0,0,0,.3)" stroke-width=".4"/>' +
        '</svg>';

      // Rotor — SVG (VEKTÖR → keskin, piksellenmez; bıçaklar hub'a bağlı).
      // Yön rotor'un rotateY'siyle (bıçak diski rüzgara döner). Disk DÖNER (spin).
      var rotor = document.createElement('div');
      rotor.style.cssText = 'position:absolute;left:50%;top:34%;width:' + size +
        'px;height:' + size + 'px;transform:translate(-50%,-50%);transform-style:preserve-3d;';
      // Airfoil bıçak path (viewBox -50..50; yukarı = -y; kök hub'a değer, uç daralır)
      var bp = 'M -2.4 -4 C -3.6 -16 -2.8 -38 0 -46 C 2.8 -38 3.6 -16 2.4 -4 C 1.5 -1 -1.5 -1 -2.4 -4 Z';
      rotor.innerHTML =
        '<svg viewBox="-50 -50 100 100" style="position:absolute;inset:0;width:100%;height:100%;overflow:visible">' +
        '<defs>' +
        '<linearGradient id="bl' + uid + '" x1="0" y1="0" x2="1" y2="0">' +
        '<stop offset="0" stop-color="#FFFFFF"/><stop offset=".5" stop-color="#E6EAF1"/><stop offset="1" stop-color="#8A93A2"/>' +
        '</linearGradient>' +
        '<radialGradient id="hb' + uid + '" cx=".35" cy=".35" r=".75">' +
        '<stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#2F6FD6"/>' +
        '</radialGradient>' +
        '</defs>' +
        '<g class="m3dspin">' +
        '<g transform="rotate(0)"><path d="' + bp + '" fill="url(#bl' + uid + ')" stroke="rgba(0,0,0,.22)" stroke-width=".5"/></g>' +
        '<g transform="rotate(120)"><path d="' + bp + '" fill="url(#bl' + uid + ')" stroke="rgba(0,0,0,.22)" stroke-width=".5"/></g>' +
        '<g transform="rotate(240)"><path d="' + bp + '" fill="url(#bl' + uid + ')" stroke="rgba(0,0,0,.22)" stroke-width=".5"/></g>' +
        '<circle r="7" fill="url(#hb' + uid + ')" stroke="rgba(0,0,0,.4)" stroke-width=".6"/>' +
        '</g></svg>';
      var blade = rotor.querySelector('.m3dspin'); // tick döndürür (rotate)
      scene.appendChild(rotor);
      wrap.appendChild(scene);

      var marker = new maplibregl.Marker({ element: wrap, anchor: 'bottom' })
        .setLngLat(feat.geometry.coordinates)
        .addTo(window._srrpMap);
      marker._kind = 'turbine';
      marker._scene = scene;
      marker._rotor = rotor;   // bearing yaw'ı SADECE rotor'a (kule silindir kalır)
      marker._yaw = windDir;
      marker._blade = blade;
      marker._omega = _m3dTurbineOmega(windMs);
      marker._angle = 0;
      return marker;
    }

    // ── Vektör GÜNEŞ PANELİ marker'ı (tilt + azimuth, kamera-sürümlü) ──
    function _m3dBuildPanel(feat) {
      var size = Math.round(90 * window._m3dEffScale()); // px ile boyut (keskin)
      var p = feat.properties || {};
      var coords = feat.geometry.coordinates;
      var lat = coords[1];
      // Mount tilt ≈ enlem (panel eğimi). Kullanıcı sonra override edebilir.
      var mountTilt = (p.tilt != null) ? parseFloat(p.tilt)
                                       : Math.max(10, Math.min(40, Math.abs(lat)));
      var azimuth = (p.azimuth != null) ? parseFloat(p.azimuth) : 0; // 0 = güney

      var wrap = document.createElement('div');
      wrap.style.cssText = 'width:' + size + 'px;height:' + size +
        'px;position:absolute;top:0;left:0;perspective:600px;pointer-events:none;' +
        'filter:drop-shadow(0 8px 14px rgba(0,0,0,.5));';

      // Zemin gölgesi — wrap'te (scene ile dönmez, zeminde kalır)
      var sh = document.createElement('div');
      sh.style.cssText = 'position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:' +
        (size * 0.55) + 'px;height:6px;background:rgba(0,0,0,.45);border-radius:50%;filter:blur(3px);';

      // scene — kamera pitch + heading(azimuth-bearing) buradan; pivot tabanda.
      var scene = document.createElement('div');
      scene.style.cssText = 'position:absolute;left:0;top:0;width:100%;height:100%;' +
        'transform-origin:center bottom;transform-style:preserve-3d;';

      // Panel — gerçek 3B KUTU (6 yüz): ön=grid, arka+4 kenar=koyu çerçeve.
      // Kapalı kutu → boşluk YOK, yandan tek levha gibi.
      var pw = size * 0.8, ph = size * 0.55, D = Math.max(3, Math.round(size * 0.045));
      var box = document.createElement('div');
      box.style.cssText = 'position:absolute;left:50%;bottom:2px;transform:translateX(-50%) rotateX(-' +
        mountTilt + 'deg);transform-origin:center bottom;transform-style:preserve-3d;width:' +
        pw + 'px;height:' + ph + 'px;';
      var _pface = function(w, h, tf, css) {
        var d = document.createElement('div');
        d.style.cssText = 'position:absolute;left:50%;top:50%;width:' + w + 'px;height:' + h +
          'px;transform:translate(-50%,-50%) ' + tf + ';' + css;
        return d;
      };
      var frameCss = 'background:linear-gradient(135deg,#26324A,#0E1A33);border:1px solid #2A3550;border-radius:2px;';
      box.appendChild(_pface(pw, ph, 'translateZ(' + (-D / 2) + 'px) rotateY(180deg)', frameCss)); // arka
      box.appendChild(_pface(D, ph, 'rotateY(90deg) translateZ(' + (pw / 2) + 'px)', frameCss));    // sağ
      box.appendChild(_pface(D, ph, 'rotateY(-90deg) translateZ(' + (pw / 2) + 'px)', frameCss));   // sol
      box.appendChild(_pface(pw, D, 'rotateX(90deg) translateZ(' + (ph / 2) + 'px)', frameCss));    // üst
      box.appendChild(_pface(pw, D, 'rotateX(-90deg) translateZ(' + (ph / 2) + 'px)', frameCss));   // alt
      // Ön yüz — mavi hücre grid'i
      var front = _pface(pw, ph, 'translateZ(' + (D / 2) + 'px)',
        'background:linear-gradient(135deg,#1E3A8A 0%,#2563EB 45%,#1E40AF 100%);' +
        'border:1px solid #475569;border-radius:2px;display:grid;' +
        'grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);gap:1.5px;padding:1.5px;' +
        'box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);overflow:hidden;');
      for (var i = 0; i < 8; i++) {
        var cell = document.createElement('div');
        cell.style.cssText = 'background:linear-gradient(135deg,#1E40AF 0%,#3B82F6 50%,#1E3A8A 100%);border-radius:1px;';
        front.appendChild(cell);
      }
      box.appendChild(front);
      scene.appendChild(box);
      wrap.appendChild(sh);
      wrap.appendChild(scene);

      var marker = new maplibregl.Marker({ element: wrap, anchor: 'bottom' })
        .setLngLat(coords)
        .addTo(window._srrpMap);
      marker._kind = 'panel';
      marker._scene = scene;
      marker._azimuth = azimuth;
      marker._tilt = mountTilt;
      return marker;
    }

    // ── Kamera senkronu — scene transform'unu harita pitch/bearing'inden sür ──
    // Bu, modeli dünyaya çakılı gerçek 3B nesne gibi gösterir (bakış açımız
    // değişince yön/açı dünya-sabit kalır; arka/yan/foreshorten görünür).
    window._m3dApplyCamera = function() {
      var map = window._srrpMap;
      if (!map) return;
      var pitch = map.getPitch();                 // 0 = top-down, ↑ = oblik
      var bearing = map.getBearing();
      var maxP = (map.getMaxPitch ? map.getMaxPitch() : 60) || 60;
      // NOT: boyut artık PX ile (builder'da effScale), CSS scale YOK → keskin.
      var byId = window._srrp3DById;
      for (var k in byId) {
        var m = byId[k];
        if (!m || !m._scene) continue;
        if (m._kind === 'turbine') {
          // Dikey nesne: top-down'da yatık (~82°), tam eğimde dik (0°).
          var lean = Math.max(0, Math.min(82, (1 - pitch / maxP) * 82));
          // KULE: sadece pitch lean → her bearing'de silindir profili korunur.
          m._scene.style.transform = 'rotateX(' + lean.toFixed(1) + 'deg)';
          // ROTOR: yön (bıçak diski) bearing'e göre döner; küçük translateZ ile
          // nacelle önünde (dönük olduğu yönün ucunda).
          if (m._rotor) {
            m._rotor.style.transform = 'translate(-50%,-50%) rotateY(' +
              ((m._yaw || 0) - bearing).toFixed(1) + 'deg) translateZ(4px)';
          }
        } else {
          // Yatay decal: pitch'le zemine yatar; heading = azimuth-bearing.
          m._scene.style.transform =
            'rotateX(' + pitch.toFixed(1) + 'deg) rotateZ(' +
            ((m._azimuth || 0) - bearing).toFixed(1) + 'deg)';
        }
      }
    };

    function _m3dMakeMarker(feat) {
      var props = feat.properties || {};
      if (_m3dIsWind(props))  return _m3dBuildTurbine(feat);
      if (_m3dIsSolar(props)) return _m3dBuildPanel(feat);
      return null; // HES / bilinmeyen → daire kalır
    }

    function _m3dDist(coord, center) {
      var dx = coord[0] - center.lng, dy = coord[1] - center.lat;
      return dx * dx + dy * dy;
    }

    window._srrpRefresh3D = function() {
      var map = window._srrpMap;
      if (!map || !window._srrp3DEnabled) return;
      var feats = window._srrp3DFeats || [];
      var byId = window._srrp3DById;
      var zoom = map.getZoom();

      // Efektif boyut belirgin değiştiyse mevcutları temizle → yeni px boyutta
      // (keskin) yeniden kurulurlar (CSS scale bulanıklığı yok).
      var eff = window._m3dEffScale();
      if (Math.abs(eff - (window._m3dBuiltScale || 1)) > 0.08) {
        Object.keys(byId).forEach(function(k){ byId[k].remove(); delete byId[k]; });
        window._m3dBuiltScale = eff;
      }

      // Zoom dışı → tüm modelleri kaldır (daireler zaten görünür)
      if (zoom < _M3D_MINZOOM) {
        Object.keys(byId).forEach(function(k){ byId[k].remove(); delete byId[k]; });
        return;
      }

      var bounds = map.getBounds();
      var center = map.getCenter();
      var visible = feats.filter(function(f){
        var c = f.geometry.coordinates;
        return bounds.contains([c[0], c[1]]);
      });
      visible.sort(function(a,b){
        return _m3dDist(a.geometry.coordinates, center) -
               _m3dDist(b.geometry.coordinates, center);
      });

      var keep = {};
      visible.slice(0, _M3D_CAP).forEach(function(f){
        var id = String(f.properties.id);
        keep[id] = true;
        if (!byId[id]) {
          var m = _m3dMakeMarker(f);
          if (m) byId[id] = m;
        }
      });
      // Görünür/cap dışı kalanları kaldır
      Object.keys(byId).forEach(function(k){
        if (!keep[k]) { byId[k].remove(); delete byId[k]; }
      });
      // Yeni marker'ları hemen kameraya göre yönlendir + kanat döngüsü
      window._m3dApplyCamera();
      window._m3dStartTick();
    };

    window.srrpSet3DPlants = function(geojsonStr, enabled) {
      var map = window._srrpMap;
      if (!map) return;
      window._srrp3DEnabled = !!enabled;

      try {
        var gj = JSON.parse(geojsonStr);
        window._srrp3DFeats = (gj && gj.features) ? gj.features : [];
      } catch(_) { window._srrp3DFeats = []; }

      if (!enabled) {
        var byId = window._srrp3DById;
        Object.keys(byId).forEach(function(k){ byId[k].remove(); delete byId[k]; });
        if (window._srrp3DListener) {
          map.off('moveend', window._srrp3DListener);
          map.off('zoomend', window._srrp3DListener);
          window._srrp3DListener = null;
        }
        if (window._srrp3DReposition) {
          map.off('move', window._srrp3DReposition);
          map.off('pitch', window._srrp3DReposition);
          map.off('rotate', window._srrp3DReposition);
          window._srrp3DReposition = null;
        }
        return;
      }

      // Aktif:
      //   • moveend/zoomend → cap/görünür-alan yeniden hesapla (ekle/çıkar)
      //   • move/pitch/rotate → her frame marker'ları ZORLA yeniden-projekte et.
      //     Bu, harita eğildiğinde (pitch) marker'ların koordinatından kaymasını
      //     engeller — taban her zaman pin lng/lat'ında kalır.
      if (!window._srrp3DListener) {
        window._srrp3DListener = function(){ window._srrpRefresh3D(); };
        map.on('moveend', window._srrp3DListener);
        map.on('zoomend', window._srrp3DListener);
      }
      if (!window._srrp3DReposition) {
        window._srrp3DReposition = function(){
          var b = window._srrp3DById;
          for (var k in b) {
            try { b[k].setLngLat(b[k].getLngLat()); } catch(_) {}
          }
          window._m3dApplyCamera(); // pitch/bearing → scene transform güncelle
        };
        map.on('move', window._srrp3DReposition);
        map.on('pitch', window._srrp3DReposition);
        map.on('rotate', window._srrp3DReposition);
      }
      window._srrpRefresh3D();
    };

    // ── GADM Sınır Katmanları ───────────────────────────────────────
    // Dart _initLayers içinden çağrılır.
    // MapLibre, data URL'si olan GeoJSON source'u otomatik fetch eder.

    // Türkiye coğrafi sınırları — bu bbox dışındaki ilçe feature'ları (ör. Yunan adaları)
    // district GeoJSON'dan elenir.
    var _TR_BOUNDS = { minLon: 25.0, maxLon: 46.0, minLat: 35.0, maxLat: 43.0 };

    /**
     * GeoJSON feature'ının merkez noktasını (yaklaşık centroid) hesaplar.
     * Polygon: ilk ring, MultiPolygon: ilk poligonun ilk ring'i.
     * Döner: [lon, lat] veya null.
     */
    function _featureCentroid(feature) {
      try {
        var geom = feature.geometry;
        if (!geom) return null;
        var rings = geom.type === 'Polygon'
          ? geom.coordinates
          : (geom.type === 'MultiPolygon' ? geom.coordinates[0] : null);
        if (!rings || !rings[0] || !rings[0].length) return null;
        var coords = rings[0];
        var sumLon = 0, sumLat = 0, n = coords.length;
        for (var i = 0; i < n; i++) { sumLon += coords[i][0]; sumLat += coords[i][1]; }
        return [sumLon / n, sumLat / n];
      } catch (_) { return null; }
    }

    /**
     * İlçe GeoJSON'unu Türkiye sınırları içinde filtrele.
     * Yunan adaları ve yanlış konumlanmış feature'ları eler.
     */
    // Non-Türkiye karakter içeren NAME_2 tespiti (Greek, Cyrillic, Arabic…).
    // Türkçe harfler Latin Extended-A içinde (≤U+024F) → Yunan/Kiril reddedilir.
    function _hasNonTurkishChar(s) {
      if (!s) return false;
      for (var i = 0; i < s.length; i++) {
        if (s.charCodeAt(i) > 0x024F) return true;
      }
      return false;
    }

    function _filterDistrictGeoJson(geojson) {
      if (!geojson || !Array.isArray(geojson.features)) return geojson;
      var b = _TR_BOUNDS;
      geojson.features = geojson.features.filter(function(f) {
        var props = f && f.properties ? f.properties : {};
        // Yunan adaları gibi yanlış etiketli feature'lar: NAME_2 Yunanca/Kiril
        if (_hasNonTurkishChar(props.NAME_2) || _hasNonTurkishChar(props.NAME_1)) return false;
        var c = _featureCentroid(f);
        if (!c) return false; // geometri yok → ele
        return c[0] >= b.minLon && c[0] <= b.maxLon &&
               c[1] >= b.minLat && c[1] <= b.maxLat;
      });
      return geojson;
    }

    window.srrpLoadBorderLayers = function(provUrl, distUrl, regUrl) {
      const map = window._srrpMap;
      if (!map) { console.warn('[SRRP] srrpLoadBorderLayers: map yok'); return; }

      const PROV_SRC  = 'srrp-borders-provinces';
      const DIST_SRC  = 'srrp-borders-districts';
      const REG_SRC   = 'srrp-borders-regions';
      const PROV_LINE = 'srrp-provinces-line';
      const DIST_LINE = 'srrp-districts-line';

      console.log('[SRRP] Sınır katmanları yükleniyor…');

      // Temizle (stil değişiminde yeniden kurulur)
      [PROV_LINE, DIST_LINE].forEach(function(id) {
        try { if (map.getLayer(id)) map.removeLayer(id); } catch(_) {}
      });
      [PROV_SRC, DIST_SRC, REG_SRC].forEach(function(id) {
        try { if (map.getSource(id)) map.removeSource(id); } catch(_) {}
      });

      // İl + bölge source: URL doğrudan yükle (Türkiye dışı veri yok)
      try {
        map.addSource(PROV_SRC, { type: 'geojson', data: provUrl });
        console.log('[SRRP] İl GeoJSON source eklendi:', provUrl);
      } catch(e) { console.error('[SRRP] İl source eklenemedi:', e); }

      if (regUrl) {
        try {
          map.addSource(REG_SRC, { type: 'geojson', data: regUrl });
        } catch(e) { console.error('[SRRP] Bölge source eklenemedi:', e); }
      }

      // İlçe source: fetch et → Türkiye dışı feature'ları ele → source'a ekle
      // distUrl'yi choropleth için de sakla
      window._srrpDistUrl = distUrl;

      fetch(distUrl)
        .then(function(r) { return r.json(); })
        .then(function(geojson) {
          // Map hâlâ mevcut mu kontrol et (stil değişimi sırasında kaybolabilir)
          var m = window._srrpMap;
          if (!m) { console.warn('[SRRP] İlçe fetch tamamlandı ama map artık yok'); return; }
          // Source zaten eklenmişse atla (tekrar çağrı koruması)
          if (m.getSource(DIST_SRC)) { console.log('[SRRP] İlçe source zaten mevcut, atlanıyor'); return; }
          var filtered = _filterDistrictGeoJson(geojson);
          var removed = geojson.features
            ? (geojson.features.length - filtered.features.length) : 0;
          if (removed > 0) {
            console.log('[SRRP] İlçe GeoJSON: ' + removed + ' Türkiye dışı feature elendi.');
          }
          // Choropleth için cache'le (orijinal, kliplenmemiş GeoJSON)
          _choroplethGeoCache = filtered;

          m.addSource(DIST_SRC, { type: 'geojson', data: filtered });
          console.log('[SRRP] İlçe GeoJSON source eklendi, feature sayısı:', filtered.features.length);
          // Kaynak eklenince sınır çizgilerini çiz
          _addDistrictLines(m, DIST_SRC, PROV_SRC, DIST_LINE, PROV_LINE);
        })
        .catch(function(err) {
          console.error('[SRRP] İlçe GeoJSON yüklenemedi, URL ile fallback:', err);
          var m = window._srrpMap;
          if (!m) return;
          // Hata halinde filtresiz yükle
          try {
            if (!m.getSource(DIST_SRC)) {
              m.addSource(DIST_SRC, { type: 'geojson', data: distUrl });
              _addDistrictLines(m, DIST_SRC, PROV_SRC, DIST_LINE, PROV_LINE);
            }
          } catch(e2) { console.error('[SRRP] İlçe fallback da başarısız:', e2); }
        });
    };

    function _addDistrictLines(map, DIST_SRC, PROV_SRC, DIST_LINE, PROV_LINE) {
      // beforeId: srrp-pins-shadow varsa onun altına, yoksa en üste ekle
      var beforeId = map.getLayer('srrp-pins-shadow') ? 'srrp-pins-shadow' : undefined;

      // İlçe sınırı (ince, zoom >= 6'da görünür, pin katmanının altında)
      try {
        map.addLayer({
          id: DIST_LINE,
          type: 'line',
          source: DIST_SRC,
          minzoom: 6,
          paint: {
            'line-color': '#7a8fa3',
            'line-width': ['interpolate', ['linear'], ['zoom'], 6, 0.3, 10, 0.7],
            'line-opacity': ['interpolate', ['linear'], ['zoom'], 6, 0.25, 8, 0.45]
          }
        }, beforeId);
        console.log('[SRRP] İlçe sınır katmanı eklendi');
      } catch(e) { console.warn('[SRRP] dist-line:', e); }

      // İl sınırı (belirgin, her zoom'da görünür)
      try {
        map.addLayer({
          id: PROV_LINE,
          type: 'line',
          source: PROV_SRC,
          paint: {
            'line-color': '#a0b5c8',
            'line-width': ['interpolate', ['linear'], ['zoom'], 3, 0.6, 6, 1.0, 10, 1.5],
            'line-opacity': ['interpolate', ['linear'], ['zoom'], 3, 0.45, 5, 0.65]
          }
        }, beforeId);
        console.log('[SRRP] İl sınır katmanı eklendi');
      } catch(e) { console.warn('[SRRP] prov-line:', e); }
    }

    // ── Choropleth (İlçe Tematik Harita) Katmanları ───────────────────

    var _activeChoroplethId = null;
    var _choroplethSrcId    = 'srrp-choropleth-src';

    /**
     * 2026-05-17 — Tematik harita aktifken graph coloring (srrp-sel-unique)
     * opacity'sini düşürür, choropleth okunabilir hale gelsin. Kapanınca
     * normal parlaklığa döner. Kullanıcı: "ilçe modunun renkleri arkadaki
     * renklendirme anlaşılacak kadar azalsın. kapatınca normal renklerine
     * geri gelsin."
     */
    function _srrpSyncGraphColoringOpacity(choroplethActive) {
      var map = window._srrpMap;
      if (!map) return;
      try {
        if (map.getLayer('srrp-sel-unique')) {
          map.setPaintProperty(
            'srrp-sel-unique',
            'fill-opacity',
            choroplethActive ? 0.2 : 1.0
          );
        }
      } catch(_) {}
    }

    /**
     * İlçe poligonlarını veri bazlı renklendirir.
     * Ayrı GeoJSON source oluşturur, her feature'a _cval property ekler,
     * MapLibre native interpolate ile sürekli gradyan sağlar.
     *
     * @param {string} mode - 'solar' | 'wind' | 'temp' | 'none'
     * @param {string} dataJson - JSON: {"İl|İlçe": {wind, solar, temp}}
     */
    // Orijinal ilçe GeoJSON cache (fetch sonrası saklanır)
    var _choroplethGeoCache = null;

    // Choropleth geçiş süresi (ms)
    var _CHORO_TRANSITION_MS = 600;
    // Fade-out sonrası katman temizleme zamanlayıcısı
    var _choroFadeTimer = null;

    window.srrpSetChoropleth = function(mode, dataJson) {
      var map = window._srrpMap;
      if (!map) return;

      var FILL_ID = 'srrp-choropleth-fill';
      var LINE_ID = 'srrp-choropleth-line';

      // Önceki fade-out zamanlayıcısını iptal et
      if (_choroFadeTimer) { clearTimeout(_choroFadeTimer); _choroFadeTimer = null; }

      // ── Kapatma: fade-out sonra temizle ──────────────────────────────
      if (mode === 'none' || !dataJson) {
        if (map.getLayer(FILL_ID)) {
          map.setPaintProperty(FILL_ID, 'fill-opacity', 0);
        }
        if (map.getLayer(LINE_ID)) {
          map.setPaintProperty(LINE_ID, 'line-opacity', 0);
        }
        _choroFadeTimer = setTimeout(function() {
          try { if (map.getLayer(FILL_ID)) map.removeLayer(FILL_ID); } catch(_) {}
          try { if (map.getLayer(LINE_ID)) map.removeLayer(LINE_ID); } catch(_) {}
          try { if (map.getSource(_choroplethSrcId)) map.removeSource(_choroplethSrcId); } catch(_) {}
          _activeChoroplethId = null;
          // Graph coloring opacity normale dönsün
          _srrpSyncGraphColoringOpacity(false);
        }, _CHORO_TRANSITION_MS + 50);
        return;
      }

      var data;
      try { data = JSON.parse(dataJson); } catch(e) { console.error('[SRRP] Choropleth JSON:', e); return; }

      // Cache varsa direkt kullan, yoksa border URL'den fetch et
      if (_choroplethGeoCache) {
        _applyChoropleth(map, mode, data, _choroplethGeoCache, FILL_ID, LINE_ID);
      } else {
        var distUrl = window._srrpDistUrl;
        if (!distUrl) {
          console.error('[SRRP] Choropleth: distUrl bulunamadı, border layers henüz yüklenmemiş olabilir');
          return;
        }
        fetch(distUrl)
          .then(function(r) { return r.json(); })
          .then(function(geojson) {
            var filtered = _filterDistrictGeoJson(geojson);
            _choroplethGeoCache = filtered;
            var m = window._srrpMap;
            if (!m) return;
            _applyChoropleth(m, mode, data, filtered, FILL_ID, LINE_ID);
          })
          .catch(function(err) {
            console.error('[SRRP] Choropleth GeoJSON fetch hatası:', err);
          });
      }
    };

    /**
     * M-B.2/3 — ML iklim projeksiyon choropleth'i.
     * dataJson: {"İl": değer, ...} (il bazlı; ilçeler n1 fallback ile renklenir).
     * Metrik/birim ne olursa olsun min-max normalize viridis rampası kullanır.
     * Mevcut choropleth pipeline'ını (geo cache, fade, layer, fallback) reuse eder.
     */
    window.srrpSetMlChoropleth = function(dataJson) {
      try {
        if (!dataJson) { window.srrpSetChoropleth('none', null); return; }
        var raw = JSON.parse(dataJson);
        var vals = [];
        for (var k in raw) {
          if (k === '_meta') continue;
          var v = (typeof raw[k] === 'number') ? raw[k] : (raw[k] && raw[k].value);
          if (typeof v === 'number' && isFinite(v)) vals.push(v);
        }
        if (vals.length === 0) { window.srrpSetChoropleth('none', null); return; }
        // 2026-06-02 (ML renk fix): Ham min/max yerine 5–95 PERSENTİL ile
        // normalize. Tek bir aykırı düşük (0/clamp) veya yüksek değer ölçeği
        // gerip, ilçelerin çoğunu mor uca sıkıştırıyor, birkaç ilçeyi parlak
        // "ada" yapıyordu. Persentil ile aykırılar uç renge KISILIR, gövde tüm
        // viridis gradyanını kullanır → komşu ilçeler arası fark görünür.
        var _sorted = vals.slice().sort(function(a, b) { return a - b; });
        function _pct(arr, p) { return arr[Math.round((arr.length - 1) * p)]; }
        var mn = _pct(_sorted, 0.05);
        var mx = _pct(_sorted, 0.95);
        // 2026-06-03 (RCP renk fix): _meta.nmin/nmax verilmişse onu kullan —
        // scenario-bağımsız (baseline) aralık. RCP delta'sı tüm lokasyonlara aynı
        // çarpan olduğundan, kendi min/max'ına göre normalize edilince renk
        // değişmiyordu; sabit baseline aralığı kullanınca RCP magnitüd kayması
        // (örn. rcp85 yağış↓ → harita topluca koyulaşır) görünür hale gelir.
        var _meta = raw._meta;
        if (_meta && typeof _meta.nmin === 'number' && typeof _meta.nmax === 'number'
            && isFinite(_meta.nmin) && isFinite(_meta.nmax) && _meta.nmax > _meta.nmin) {
          mn = _meta.nmin;
          mx = _meta.nmax;
        }
        if (mx - mn < 1e-9) { mn = _sorted[0]; mx = _sorted[_sorted.length - 1]; }
        if (mx - mn < 1e-9) mx = mn + 1;
        // Viridis 7-stop, veri aralığına yayılmış
        var pal = ['#440154','#414487','#2a788e','#22a884','#7ad151','#bddf26','#fde725'];
        _mlChoroplethStops = pal.map(function(c, i) {
          return [mn + (mx - mn) * (i / (pal.length - 1)), c];
        });
        // {İl: {ml: val}} formatına çevir (entry[mode] erişimi için)
        var data = {};
        for (var p in raw) {
          if (p === '_meta') continue;
          var vv = (typeof raw[p] === 'number') ? raw[p] : (raw[p] && raw[p].value);
          if (typeof vv === 'number') data[p] = { ml: vv };
        }
        window.srrpSetChoropleth('ml', JSON.stringify(data));
      } catch (e) {
        console.error('[SRRP] srrpSetMlChoropleth:', e);
      }
    };

    window.srrpClearMlChoropleth = function() {
      window.srrpSetChoropleth('none', null);
    };

    // İl adı normalize — diakritik/kısaltma farklarını köprüle (Hakkâri↔Hakkari,
    // â→a vb.). Choropleth il-fallback eşleşmesi için (2026-05-28).
    function _srrpNormName(s) {
      if (!s) return '';
      return s.toLowerCase()
        .replace(/â/g, 'a').replace(/î/g, 'i').replace(/û/g, 'u')
        .replace(/ı/g, 'i').replace(/İ/g, 'i')
        .replace(/ş/g, 's').replace(/ç/g, 'c')
        .replace(/ğ/g, 'g').replace(/ö/g, 'o').replace(/ü/g, 'u')
        .replace(/\s+/g, '').trim();
    }

    function _applyChoropleth(map, mode, data, geojson, FILL_ID, LINE_ID) {
      var features = geojson.features || [];
      var vals = [];

      // İl-seviyesi (tek token, '|' içermeyen) anahtarların normalize indexi —
      // ilçe anahtarı + düz il anahtarı tutmazsa son çare normalize eşleşme.
      var _provNormIndex = {};
      // 2026-06-03: İlçe normalize indexi — "il|ilçe" anahtarlarını ASCII-fold +
      // "İl Merkez"→"Merkez" eşlemesiyle indeksle. GADM ilçe adları (Sivas Merkez,
      // ASCII vb.) weather_data adıyla (Merkez) birebir tutmuyordu → ilçe değeri
      // kaybolup il-değerine düşüyordu. Bu indeks o eşleşmeleri kurtarır.
      var _distNormIndex = {};
      for (var dk in data) {
        if (dk === '_meta') continue;
        if (dk.indexOf('|') === -1) {
          _provNormIndex[_srrpNormName(dk)] = data[dk];
        } else {
          var pp = dk.split('|');
          _distNormIndex[_srrpNormName(pp[0]) + '|' + _srrpNormName(pp[1])] = data[dk];
        }
      }

      // Her feature'a _cval property ekle (orijinal GeoJSON'ı mutate etmiyoruz, klonluyoruz)
      var newFeatures = [];
      for (var i = 0; i < features.length; i++) {
        var f = features[i];
        var props = f.properties || {};
        var n1 = props.NAME_1 || '';
        var n2 = props.NAME_2 || '';
        var compositeKey = n1 + '|' + n2;

        // İlçe anahtarı eşleşmezse il (NAME_1) değerine düş; o da tutmazsa
        // normalize edilmiş il adıyla eşleştir (Hakkâri↔Hakkari, â→a vb.).
        // precompute uzun pencerelerde bazı adlar GADM ile birebir tutmuyor;
        // il fallback siyah deliği önler (2026-05-28).
        // "Sivas Merkez" → "Merkez" (il öneki sıyrılır), sonra ASCII-normalize eşleştir.
        var n2strip = (n1 && n2.indexOf(n1 + ' ') === 0) ? n2.slice(n1.length + 1) : n2;
        var entry = data[compositeKey]
          || _distNormIndex[_srrpNormName(n1) + '|' + _srrpNormName(n2strip)]
          || _distNormIndex[_srrpNormName(n1) + '|' + _srrpNormName(n2)]
          || data[n1] || _provNormIndex[_srrpNormName(n1)];
        var val = entry ? entry[mode] : null;

        newFeatures.push({
          type: 'Feature',
          properties: {
            NAME_1: n1,
            NAME_2: n2,
            _cval: (val != null && val !== undefined) ? val : -9999
          },
          geometry: f.geometry
        });
        if (val != null && val !== undefined) vals.push(val);
      }

      if (vals.length === 0) {
        console.warn('[SRRP] Choropleth: eşleşen veri yok, mode=' + mode);
        return;
      }

      vals.sort(function(a, b) { return a - b; });
      console.log('[SRRP] Choropleth veri aralığı: ' + vals[0].toFixed(1) + '–' + vals[vals.length-1].toFixed(1) +
        ', n=' + vals.length + ', mode=' + mode);

      // ── Renk rampası ──────────────────────────────────────────
      var baseStops = _choroplethBuildStops(mode);
      var colorExpr = ['interpolate', ['linear'], ['get', '_cval']];
      if (mode === 'solar') {
        // 2026-06-10: SOLAR için GÖRELI normalizasyon (5-95 persentil).
        // Solar uzun pencerelerde (6ay+) precompute gece-dahil ortalama
        // döndürüyor (137-313 dar bant); sabit 0-800 skalası bunu düşük/bordo
        // uca eziyordu → her yer kırmızı + ilçe ayrımı yok. Paleti verinin
        // KENDİ aralığına yayınca palet tam kullanılır, ilçe farkları görünür,
        // kısa/uzun pencere tutarlı olur. (wind/temp mutlak skalada KALIR —
        // orada absolute değer anlamlı; ör. 20°C tek-tip harita sahte kontrast
        // üretmesin. Legend de solar için dinamik p5-p95 gösterir.)
        var solarPalette = baseStops.map(function(st){ return st[1]; });
        var _pctV = function(p){ return vals[Math.round((vals.length - 1) * p)]; };
        var slo = _pctV(0.05), shi = _pctV(0.95);
        if (!(shi > slo)) { slo = vals[0]; shi = vals[vals.length - 1]; }
        if (!(shi > slo)) shi = slo + 1;
        for (var pi = 0; pi < solarPalette.length; pi++) {
          var t = solarPalette.length > 1 ? (pi / (solarPalette.length - 1)) : 0;
          colorExpr.push(slo + (shi - slo) * t);
          colorExpr.push(solarPalette[pi]);
        }
      } else {
        // wind / temp / ml — sabit fiziksel stop'lar (veya ML kendi min-max'i).
        for (var s = 0; s < baseStops.length; s++) {
          colorExpr.push(baseStops[s][0]);
          colorExpr.push(baseStops[s][1]);
        }
      }

      var fillColorExpr = [
        'case',
        ['==', ['get', '_cval'], -9999], 'rgba(0,0,0,0)',
        colorExpr
      ];

      var fillOpacityExpr = [
        'case',
        ['==', ['get', '_cval'], -9999], 0,
        0.82
      ];

      var newGeoJson = { type: 'FeatureCollection', features: newFeatures };

      // ── Katman zaten varsa: veri + renk güncelle (geçişli) ────────
      var layerExists = false;
      try { layerExists = !!map.getLayer(FILL_ID); } catch(_) {}

      if (layerExists) {
        // Kaynak verisini güncelle
        try {
          map.getSource(_choroplethSrcId).setData(newGeoJson);
        } catch(e) {
          console.warn('[SRRP] Source güncelleme hatası, yeniden oluşturuluyor:', e);
          layerExists = false; // Aşağıda yeniden oluşturulsun
        }
      }

      if (layerExists) {
        // Renk geçişi: setPaintProperty ile MapLibre transition mekanizması
        map.setPaintProperty(FILL_ID, 'fill-color', fillColorExpr);
        map.setPaintProperty(FILL_ID, 'fill-opacity', fillOpacityExpr);
        map.setPaintProperty(LINE_ID, 'line-opacity', 1);
        _activeChoroplethId = FILL_ID;
        _srrpSyncGraphColoringOpacity(true); // graph coloring zayıflasın
        console.log('[SRRP] Choropleth güncellendi (geçişli): mode=' + mode +
          ', ' + vals.length + ' veri');
        return;
      }

      // ── İlk yükleme: katmanları sıfırdan oluştur ─────────────────
      // Önce eski kalıntıları temizle
      try { if (map.getLayer(FILL_ID)) map.removeLayer(FILL_ID); } catch(_) {}
      try { if (map.getLayer(LINE_ID)) map.removeLayer(LINE_ID); } catch(_) {}
      try { if (map.getSource(_choroplethSrcId)) map.removeSource(_choroplethSrcId); } catch(_) {}

      try {
        map.addSource(_choroplethSrcId, { type: 'geojson', data: newGeoJson });
      } catch(e) {
        console.error('[SRRP] Choropleth source eklenemedi:', e);
        return;
      }

      var beforeId = map.getLayer('srrp-districts-line') ? 'srrp-districts-line' : undefined;
      var transitionConf = { duration: _CHORO_TRANSITION_MS, delay: 0 };

      try {
        // Fill katmanı — opacity 0'dan başla, geçişle 0.82'ye çık
        map.addLayer({
          id: FILL_ID,
          type: 'fill',
          source: _choroplethSrcId,
          paint: {
            'fill-color': fillColorExpr,
            'fill-opacity': 0,
            'fill-color-transition': transitionConf,
            'fill-opacity-transition': transitionConf,
          }
        }, beforeId);

        // Sınır çizgisi
        map.addLayer({
          id: LINE_ID,
          type: 'line',
          source: _choroplethSrcId,
          paint: {
            'line-color': [
              'case',
              ['==', ['get', '_cval'], -9999], 'rgba(0,0,0,0)',
              'rgba(255,255,255,0.35)'
            ],
            'line-width': ['interpolate', ['linear'], ['zoom'], 5, 0.4, 8, 1.0, 12, 1.5],
            'line-opacity': 0,
            'line-opacity-transition': transitionConf,
          }
        }, beforeId);

        // Fade-in: sonraki frame'de opacity'yi hedef değere çek
        requestAnimationFrame(function() {
          try {
            map.setPaintProperty(FILL_ID, 'fill-opacity', fillOpacityExpr);
            map.setPaintProperty(LINE_ID, 'line-opacity', 1);
          } catch(_) {}
        });

        _activeChoroplethId = FILL_ID;
        _srrpSyncGraphColoringOpacity(true); // graph coloring zayıflasın
        console.log('[SRRP] Choropleth oluşturuldu (fade-in): mode=' + mode +
          ', ' + newFeatures.length + ' feature, ' + vals.length + ' veri');
      } catch(e) {
        console.error('[SRRP] Choropleth katman eklenemedi:', e);
      }
    };

    /**
     * Mod bazlı renk rampası üretir — 10 eşit aralıklı stop.
     * Renk dizileri perceptually uniform ve koyu arka plan üzerinde
     * yüksek kontrast sağlayacak şekilde seçilmiştir.
     */
    // ML projeksiyon için dinamik (min-max normalize) renk stops.
    // srrpSetMlChoropleth doldurur; metrik/birim ne olursa olsun çalışır.
    var _mlChoroplethStops = null;

    function _choroplethBuildStops(mode) {
      // ML projeksiyon: veri min-max'ine göre dinamik viridis rampası.
      if (mode === 'ml') {
        return _mlChoroplethStops || [[0, '#440154'], [1, '#FDE725']];
      }
      // Tüm modlar sabit fiziksel değer → renk eşlemesi kullanır.
      // Native (map_view_maplibre_native.dart) ve tooltip (map_layer_mixin.dart)
      // ile birebir aynı renkler.
      if (mode === 'solar') {
        // Güneş ışınımı: 0–800 W/m².
        // 2026-05-19 — Renk skalası TERS ÇEVRİLDİ. Eski palet sezgisel
        // değildi: yüksek ışınım = koyu bordo, düşük = soluk sarı.
        // Yeni: gece/düşük = koyu, çok güneşli = parlak sarı.
        // Inferno-like progresyon: lacivert→mor→kırmızı→turuncu→sarı.
        return [
          [  0, '#1a1a2e'],   // gece / sıfır — koyu lacivert
          [ 50, '#4D0014'],   // çok düşük — koyu bordo
          [150, '#BD0026'],
          [250, '#E31A1C'],
          [350, '#FC4E2A'],
          [450, '#FD8D3C'],
          [550, '#FEB24C'],
          [650, '#FED976'],
          [750, '#FFEDA0'],
          [800, '#FFFFCC'],   // maksimum — parlak sarı
        ];
      } else if (mode === 'wind') {
        // Rüzgar hızı: 0–25 m/s
        return [
          [ 0, '#F7FBFF'],    // sakin — neredeyse beyaz
          [ 2, '#DEEBF7'],
          [ 4, '#C6DBEF'],
          [ 6, '#9ECAE1'],
          [ 8, '#6BAED6'],
          [10, '#4292C6'],
          [13, '#2171B5'],
          [16, '#08519C'],
          [20, '#083D7F'],
          [25, '#08306B'],    // fırtına — koyu lacivert
        ];
      } else {
        // Sıcaklık: -15°C → +45°C sabit fiziksel skala
        return [
          [-15, '#08306B'],   // çok soğuk — koyu lacivert
          [ -5, '#2171B5'],
          [  0, '#E0F3F8'],   // donma noktası — beyazımsı
          [  5, '#C6DBEF'],
          [ 10, '#ABD9E9'],
          [ 15, '#74ADD1'],
          [ 20, '#66BD63'],   // ılık — yeşil
          [ 25, '#A6D96A'],
          [ 30, '#FEE08B'],   // sıcak — sarı
          [ 33, '#FDAE61'],
          [ 36, '#F46D43'],   // çok sıcak — turuncu
          [ 40, '#D73027'],   // aşırı — kırmızı
          [ 45, '#A50026'],   // tehlikeli — koyu kırmızı
        ];
      }
    }

    // ── Layer yardımcıları ──────────────────────────────────────────

    window.srrpAddLayer = function (specJson, beforeId) {
      const map = window._srrpMap;
      if (!map) return;
      try {
        const spec = JSON.parse(specJson);
        if (map.getLayer(spec.id)) map.removeLayer(spec.id);
        map.addLayer(spec, beforeId || undefined);
      } catch (e) { console.error('[SRRP] srrpAddLayer:', e); }
    };

    window.srrpRemoveLayer = function (id) {
      const map = window._srrpMap;
      if (!map) return;
      try { if (map.getLayer(id)) map.removeLayer(id); } catch (e) {}
    };

    // ── Bug 4 fix: Pin/label layer'larını en üste taşı ───────────────
    //
    // Liberty (OpenFreeMap) gibi yoğun katmanlı style'larda fill-extrusion
    // ve symbol layer'lar pin circle'ı görsel olarak gizleyebiliyor. MapLibre
    // moveLayer(id) layer'ı stack'in tepesine alır → pin garantili görünür.
    //
    // Verilen id sırasında çağırın; sonraki çağrı bir öncekinin üstüne çıkar.
    window.srrpMoveLayerToTop = function (layerId) {
      const map = window._srrpMap;
      if (!map) return;
      try {
        if (map.getLayer(layerId)) map.moveLayer(layerId);
      } catch (e) {
        console.warn('[SRRP] srrpMoveLayerToTop:', layerId, e);
      }
    };

    // ── Aşama I: PostGIS MVT Vektör Katmanları ─────────────────────
    //
    // Backend tek tile endpoint'i 3 layer içerir:
    //   /api/v1/tiles/{z}/{x}/{y}.pbf → "hydro" + "restricted" + "energy"
    //
    // Source bir kez eklenir; her toggle layer-level visibility değiştirir.
    // Toggle'lar bağımsız — kullanıcı istediği kombinasyonu açabilir.

    const MVT_SOURCE_ID = 'srrp-mvt-overlays';
    const MVT_LAYER_HYDRO_FILL  = 'srrp-mvt-hydro-fill';
    const MVT_LAYER_HYDRO_LINE  = 'srrp-mvt-hydro-line';
    const MVT_LAYER_RESTRICTED  = 'srrp-mvt-restricted-fill';
    const MVT_LAYER_ENERGY      = 'srrp-mvt-energy-line';

    function _mvtTileUrl() {
      // Backend'in yayın URL'ini tespit et — index.html'de zaten api host
      // (window.SRRP_API_BASE) tanımlı olabilir, yoksa localhost:8000 default.
      const base = (window.SRRP_API_BASE || 'http://localhost:8000').replace(/\/$/, '');
      return `${base}/api/v1/tiles/{z}/{x}/{y}.pbf`;
    }

    function _ensureMvtSource() {
      const map = window._srrpMap;
      if (!map || typeof map.getSource !== 'function') return false;
      try {
        if (!map.getSource(MVT_SOURCE_ID)) {
          map.addSource(MVT_SOURCE_ID, {
            type: 'vector',
            tiles: [_mvtTileUrl()],
            minzoom: 6,
            maxzoom: 18,
          });
        }
        return true;
      } catch (e) {
        console.warn('[SRRP-MVT] addSource hata:', e);
        return false;
      }
    }

    /**
     * Hidro katmanı: göl/baraj/nehir polygon'ları.
     *
     * 2026-05-08 — Su sebepli "kurulamaz" alanları belirgin mavi göstermek için
     * opacity 0.55 → 0.7. Wetland tonu yeşilden mavi-sulak tonuna (mavi sema-
     * cıyla tutarlı). RES/GES için tıklanan koordinat su üzerindeyse backend
     * suitability false döner; harita rengi de bunu görsel olarak yansıtır.
     *   riverbank → açık mavi (akarsu — HES kıyısı)
     *   water     → orta mavi (göl)
     *   reservoir → koyu mavi (baraj)
     *   wetland   → mavi-camgöbeği (sulak)
     *   glacier   → buz beyazı
     *   dock      → gri-mavi (liman)
     */
    window.srrpToggleHydroLayer = function (visible) {
      const map = window._srrpMap;
      if (!_ensureMvtSource()) return;
      try {
        if (visible) {
          if (!map.getLayer(MVT_LAYER_HYDRO_FILL)) {
            map.addLayer({
              id: MVT_LAYER_HYDRO_FILL,
              type: 'fill',
              source: MVT_SOURCE_ID,
              'source-layer': 'hydro',
              paint: {
                'fill-color': [
                  'match', ['get', 'feature_type'],
                  'riverbank', '#3FA9F5',
                  'water',     '#1E5BA8',
                  'reservoir', '#16467F',
                  'wetland',   '#2E86AB',  // yeşil → mavi-camgöbeği
                  'glacier',   '#E8F1FA',
                  'dock',      '#5C6B7C',
                  /* default */ '#3D7AB3',
                ],
                'fill-opacity': 0.70,
                'fill-outline-color': '#0E3A6E',
              },
            });
          }
          if (!map.getLayer(MVT_LAYER_HYDRO_LINE)) {
            map.addLayer({
              id: MVT_LAYER_HYDRO_LINE,
              type: 'line',
              source: MVT_SOURCE_ID,
              'source-layer': 'hydro',
              paint: {
                'line-color': '#9FD8FF',
                'line-width': 0.8,
                'line-opacity': 0.8,
              },
            });
          }
        } else {
          if (map.getLayer(MVT_LAYER_HYDRO_FILL)) map.removeLayer(MVT_LAYER_HYDRO_FILL);
          if (map.getLayer(MVT_LAYER_HYDRO_LINE)) map.removeLayer(MVT_LAYER_HYDRO_LINE);
        }
      } catch (e) {
        console.warn('[SRRP-MVT] toggleHydroLayer hata:', e);
      }
    };

    /**
     * Yasaklı bölge katmanı (askeri / milli park / koruma alanı).
     *
     * 2026-05-08 — Renk semantiği düzeltildi: tüm yasaklı feature'lar KIRMIZI
     * tonunda. Eski yeşil tonları (national_park yeşil, vb) "uygun" hissi
     * yaratıyordu, oysa hepsi "kurulamaz" anlamı taşıyor. Şimdi:
     *   military          → koyu/saf kırmızı (en sıkı yasak)
     *   national_park     → kırmızımsı bordo (doğa koruma — kurulamaz)
     *   protected_area    → kırmızı (genel koruma)
     *   nature_reserve    → açık kırmızı/mercan (rezerv)
     * Opacity de 0.35 → 0.42 — görünürlük artar, basemap detayı yok olmaz.
     */
    window.srrpToggleRestrictedLayer = function (visible) {

                  'national_park',    '#AD1457',  // bordomsı kırmızı
                  'protected_area',   '#D32F2F',  // saf kırmızı
                  'nature_reserve',   '#E57373',  // açık kırmızı
                  /* default */       '#B71C1C',

    /**

    window.srrpToggleEnergyCorridorLayer = function (visible) {
