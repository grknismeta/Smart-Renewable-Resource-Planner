name: frontend
description: "Smart Renewable Resource Planner - Akıllı Yenilenebilir Kaynak Planlayıcısı"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- Ağ ---
  http: ^1.6.0

  # --- Harita ---
  latlong2: ^0.9.1
  flutter_map: ^8.2.2
  flutter_map_cancellable_tile_provider: ^3.1.1
  vector_map_tiles: ^9.0.0-beta.8
  vector_tile_renderer: ^6.0.0

  # --- State Management ---
  provider: ^6.1.5+1

  # --- Güvenli Depolama ---
  flutter_secure_storage: ^9.2.4

  # --- Grafik ---
  fl_chart: ^0.69.0

  # --- Lokalizasyon & Sayı Formatlama (Türkçe: 1.234,56) ---
  intl: ^0.20.2

  # --- Yerel Cache (şehir adları, son hesaplamalar) ---
  shared_preferences: ^2.3.5

  # --- PDF Rapor Export ---
  pdf: ^3.11.2
  printing: ^5.13.2

  # --- Paylaşım ---
  share_plus: ^10.1.4

  # --- Bağlantı Durumu ---
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
