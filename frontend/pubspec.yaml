name: frontend
description: "Smart Renewable Resource Planner - Akıllı Yenilenebilir Kaynak Planlayıcısı"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- Ağ ---
  http: ^1.6.0

  # --- Harita ---
  latlong2: ^0.9.1  # Pin dialog ve coğrafi hesaplamalar için LatLng tipi
  maplibre: ^0.2.2

  # --- State Management ---
  provider: ^6.1.5+1

  # --- Güvenli Depolama ---
  flutter_secure_storage: ^9.2.4

  # --- Grafik ---
  fl_chart: ^0.69.0

  # --- Lokalizasyon & Sayı Formatlama (Türkçe: 1.234,56) ---
  intl: ^0.20.2

  # --- Yerel Cache (şehir adları, son hesaplamalar) ---
  shared_preferences: ^2.3.5

  # --- PDF Rapor Export ---
  pdf: ^3.11.2
  printing: ^5.13.2

  # --- Paylaşım ---
  share_plus: ^10.1.4

  # --- Bağlantı Durumu ---
  connectivity_plus: ^6.1.3

  # --- Web: Platform view üzerindeki pointer event çakışmasını engeller ---
  pointer_interceptor: ^0.10.1+2

  # --- Mikro-animasyonlar (LottieFiles JSON / ileride asset hazır oldukça) ---
  # 2026-05-09 — AnimatedGradientButton'da Lottie wrapper desteği. Şu an
  # mikro-ikonlar Pure Flutter Transform ile yapılıyor (asset yok); asset
  # gelince `Lottie.asset(...)` ile 1 satır migration.
  lottie: ^3.1.2

  # --- Sohbet balonu pop-up (tooltip) — Sprint 6 (2026-05-09) ---
  # Pin ekleme/düzenleme pop-up'ları için. Anchor-based, otomatik flip,
  # tail çizimi, animasyonlu açma/kapama. Eski custom _PinPopoverWithTail +
  # _anchoredPositioned + _TailPainter + _Placement kodumuzu siler.
  # pub.dev: ~600 likes, aktif maintain.
  just_the_tooltip: ^0.0.12


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/geo/turkey_provinces.json
    - assets/geo/turkey_districts.json

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
