# SRRP — PRODUCTION compose (2026-06-02, DigitalOcean droplet)
#
# Mimari:
#   caddy   → 80/443 (public): statik frontend + /api reverse proxy + otomatik HTTPS
#   backend → İÇERİDE (host'a port AÇILMAZ; sadece caddy erişir)
#   db/redis→ İÇERİDE (host'a port AÇILMAZ)
#
# Sırlar `.env`'den gelir (köke koy, repoya GİTMEZ): SECRET_KEY, POSTGRES_PASSWORD,
# ALLOWED_ORIGINS, GOOGLE_API_KEY, GOOGLE_CLIENT_ID.
#
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    # PG17 — lokal dump PostgreSQL 17 + PostGIS 3.6'dan alındı; major sürüm
    # eşleşmeli (PG17 archive PG16'ya restore edilemez). PostGIS 3.5 image,
    # 3.6 dump'ının geometri verisini (WKB, taşınabilir) sorunsuz restore eder.
    image: postgis/postgis:17-3.5
    container_name: srrp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-srrp_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD .env'de gerekli}
      POSTGRES_DB: ${POSTGRES_DB:-srrp_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-srrp_admin} -d ${POSTGRES_DB:-srrp_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Host'a port AÇILMAZ (prod güvenlik)

  redis:
    image: redis:7-alpine
    container_name: srrp_redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Host'a port AÇILMAZ

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: srrp_backend
    restart: unless-stopped
    # Prod: --reload YOK (dev'e özgü). Görüntüdeki koddan çalışır.
    # --root-path /api: Caddy /api'yi soyup backend'e iletiyor; bu olmadan
    # trailing-slash redirect'leri (örn /equipments → /equipments/) /api önekini
    # düşürüp SPA'ya gidiyor (equipment/pin listeleri boş → "Model bulunamadı").
    # root_path ile redirect'ler /api ile üretilir → düzelir.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--root-path", "/api"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-srrp_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-srrp_db}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY .env'de gerekli}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://srrp-app.com,https://www.srrp-app.com}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-flash-latest}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-756480872473-fm4vb6j5u3ic9c5fhbrr0jhkmrl74m7e.apps.googleusercontent.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_data:/app/data
      # Backend runtime data (gitignore'da, image'a baked DEĞİL): sınır vektörleri
      # (vector/) + tr_stats/tr_regions/mock_climate JSON'ları. Droplet'te repo'ya
      # konup buradan mount edilir. (Büyük gis_osm_* droplet'te yok, sorun değil.)
      - ./backend/data:/app/backend/data:ro
    # Host'a port AÇILMAZ — caddy iç ağ üzerinden backend:8000'e erişir

  caddy:
    build:
      context: .
      dockerfile: frontend/Dockerfile.deploy
    container_name: srrp_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data      # Let's Encrypt sertifikaları (kalıcı)
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  backend_data:
  caddy_data:
  caddy_config:
