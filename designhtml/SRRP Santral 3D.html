<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SRRP — 3D Santral Görselleştirmeleri</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="tokens.css"/>
  <style>
    body { background: #0B0E14; }
    .dc-section-heading { color: var(--text) !important; }
    .scene {
      width: 100%; height: 100%;
      background:
        radial-gradient(120% 80% at 50% 110%, rgba(20,184,166,.06), transparent 60%),
        linear-gradient(180deg, #131825 0%, #0B0E14 100%);
      border-radius: 12px;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }
    .scene::before {
      content: "";
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, #000 40%, transparent 100%);
      pointer-events: none;
    }
    .scene-night {
      background:
        radial-gradient(120% 80% at 50% 110%, rgba(59,130,246,.05), transparent 60%),
        linear-gradient(180deg, #060810 0%, #03040A 100%);
    }
    .scene-cloud {
      background:
        radial-gradient(120% 80% at 50% 110%, rgba(148,163,184,.06), transparent 60%),
        linear-gradient(180deg, #1A1F2B 0%, #11141C 100%);
    }
    .state-pill {
      position: absolute;
      left: 12px; top: 12px;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 999px;
      font: 600 10.5px/1 var(--font);
      color: rgba(255,255,255,.85);
      letter-spacing: .04em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
    }
    .state-pill .dot {
      width: 6px; height: 6px; border-radius: 50%;
    }
    .scene-controls {
      position: absolute; left: 50%; bottom: 14px;
      transform: translateX(-50%);
      display: inline-flex; gap: 4px;
      padding: 4px;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 999px;
      backdrop-filter: blur(8px);
    }
    .scene-controls button {
      appearance: none; border: none; background: transparent;
      color: rgba(255,255,255,.65);
      padding: 6px 11px; border-radius: 999px;
      font: 600 11px/1 var(--font);
      cursor: pointer;
      letter-spacing: .02em;
    }
    .scene-controls button.on {
      background: rgba(255,255,255,.10);
      color: #fff;
    }
    code.k { font: 600 11.5px/1.4 var(--font-mono); color: #FBBF24; }
    .pill-note {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 8px;
      background: rgba(20,184,166,.12);
      border: 1px solid rgba(20,184,166,.3);
      border-radius: 999px;
      font: 600 10.5px/1 var(--font);
      color: #5EEAD4;
      letter-spacing: .03em;
      text-transform: uppercase;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="santral-3d.jsx"></script>
  <script type="text/babel" src="santral-map-3d.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Sahne sarmalı: tek bir komponenti, state pill ve background ile gösterir
    const Scene = ({ children, label, dotColor = '#14B8A6', night = false, cloud = false, controls = null }) => (
      <div className={`scene${night ? ' scene-night' : ''}${cloud ? ' scene-cloud' : ''}`}>
        <div className="state-pill">
          <span className="dot" style={{ background: dotColor }}/>
          {label}
        </div>
        {children}
        {controls}
      </div>
    );

    const StateSwitcher = ({ value, onChange, options }) => (
      <div className="scene-controls">
        {options.map(o => (
          <button key={o.value} className={value === o.value ? 'on' : ''} onClick={() => onChange(o.value)}>
            {o.label}
          </button>
        ))}
      </div>
    );

    // ─── Brief / Tasarım yorumu kartı ───────────────────────────
    const Intro = () => (
      <div style={{ width: 1240, padding: '28px 32px', background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 18, color: 'var(--text)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
          <div style={{ width: 40, height: 40, borderRadius: 12, background: 'linear-gradient(135deg, var(--solar), var(--wind) 55%, var(--hydro))', boxShadow: 'inset 0 0 0 1px rgba(255,255,255,.2)' }}/>
          <div>
            <div style={{ font: '700 19px/1 var(--font)', letterSpacing: '-.01em' }}>SRRP · 3D Santral Görselleştirmeleri</div>
            <div style={{ font: '500 12.5px/1.4 var(--font)', color: 'var(--text-3)', marginTop: 5 }}>State'e duyarlı 3 santral tipi · canlı önizleme · Flutter mimari önerisi</div>
          </div>
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
            <span className="pill-note">CSS 3D + rAF</span>
            <span className="pill-note">→ Flutter Transform + AnimationController</span>
          </div>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, marginTop: 18 }}>
          {/* Wind */}
          <div style={{ padding: 16, background: 'rgba(59,130,246,.06)', border: '1px solid rgba(59,130,246,.25)', borderRadius: 12 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom: 8 }}>
              <span style={{ width:8, height:8, borderRadius:'50%', background: 'var(--wind)' }}/>
              <div style={{ font: '700 13px/1 var(--font)', color: 'var(--wind-glow)' }}>Rüzgâr Türbini</div>
            </div>
            <div style={{ font: '500 12px/1.55 var(--font)', color: 'var(--text-2)' }}>
              <b style={{ color: 'var(--text)' }}>Durağan</b> → kanatlar hareketsiz.<br/>
              <b style={{ color: 'var(--text)' }}>Rüzgâr varsa</b> → orta hızda dönüş + arka plan rüzgâr çizgileri.<br/>
              <b style={{ color: 'var(--text)' }}>Edit/Ekleme anı</b> → hızlanır, halka pulse ile vurgulanır.
            </div>
            <div style={{ font: '500 10.5px/1.4 var(--font-mono)', color: 'var(--text-3)', marginTop: 10, padding: 8, background: 'rgba(0,0,0,.3)', borderRadius: 6 }}>
              hız = ease(target) — yumuşak başlangıç/duruş
            </div>
          </div>
          {/* Solar */}
          <div style={{ padding: 16, background: 'rgba(245,158,11,.06)', border: '1px solid rgba(245,158,11,.25)', borderRadius: 12 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom: 8 }}>
              <span style={{ width:8, height:8, borderRadius:'50%', background: 'var(--solar)' }}/>
              <div style={{ font: '700 13px/1 var(--font)', color: 'var(--solar-glow)' }}>Güneş Paneli</div>
            </div>
            <div style={{ font: '500 12px/1.55 var(--font)', color: 'var(--text-2)' }}>
              <b style={{ color: 'var(--text)' }}>Güneşli</b> → state'e girince <em>tek seferlik</em> beyaz parlama sweep'i.<br/>
              <b style={{ color: 'var(--text)' }}>Bulutlu gündüz</b> → 10 sn'de bir gri ışık geçişi.<br/>
              <b style={{ color: 'var(--text)' }}>Gece</b> → panel siyaha geçer, üstünde <em>Ay</em> belirir.
            </div>
            <div style={{ font: '500 10.5px/1.4 var(--font-mono)', color: 'var(--text-3)', marginTop: 10, padding: 8, background: 'rgba(0,0,0,.3)', borderRadius: 6 }}>
              shine: 1x · wash: every 10s · night: panelBg → black + moon
            </div>
          </div>
          {/* Hydro */}
          <div style={{ padding: 16, background: 'rgba(6,182,212,.06)', border: '1px solid rgba(6,182,212,.25)', borderRadius: 12 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom: 8 }}>
              <span style={{ width:8, height:8, borderRadius:'50%', background: 'var(--hydro)' }}/>
              <div style={{ font: '700 13px/1 var(--font)', color: 'var(--hydro-glow)' }}>HES (Hidroelektrik)</div>
            </div>
            <div style={{ font: '500 12px/1.55 var(--font)', color: 'var(--text-2)' }}>
              <b style={{ color: 'var(--text)' }}>Tek görünüm:</b> beton baraj + savaklardan akan su.<br/>
              State'e gerek yok; <em>sürekli</em> akış animasyonu ve havuzda köpük halkaları.<br/>
              Diğer iki tiple aynı görsel ritmi koruyacak biçimde 3D perspektifte.
            </div>
            <div style={{ font: '500 10.5px/1.4 var(--font-mono)', color: 'var(--text-3)', marginTop: 10, padding: 8, background: 'rgba(0,0,0,.3)', borderRadius: 6 }}>
              flow: continuous · pool-ripple: loop
            </div>
          </div>
        </div>
      </div>
    );

    // ─── Flutter Mimari kartı ──────────────────────────────────
    const FlutterCard = () => (
      <div style={{ width: 1240, padding: '24px 28px', background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 18, color: 'var(--text)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
          <div style={{ width: 30, height: 30, borderRadius: 8, background: 'linear-gradient(135deg, #02569B, #54C5F8)', display:'grid', placeItems:'center', font: '700 14px/1 var(--font)', color: '#fff' }}>F</div>
          <div style={{ font: '700 16px/1 var(--font)' }}>Flutter ile 3D + kendi animasyonlu yapı</div>
          <span className="pill-note" style={{ marginLeft: 'auto' }}>Önerilen mimari</span>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1.1fr 1fr 1fr', gap: 16 }}>
          {/* Approach */}
          <div>
            <div style={{ font: '600 11px/1 var(--font)', color: 'var(--accent)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 10 }}>1 · Yaklaşım Seçimi</div>
            <div style={{ font: '500 12.5px/1.6 var(--font)', color: 'var(--text-2)' }}>
              <b style={{ color: 'var(--text)' }}>3D illüzyonu için <code className="k">Transform</code> + <code className="k">Matrix4</code></b> yeterli — gerçek mesh'e ihtiyaç yok.
              <code className="k">setEntry(3,2,0.001)</code> ile perspektif, <code className="k">rotateX/Y/Z</code> ile yatırma.
              Three.js/Unity benzeri kütüphaneler (model_viewer, flutter_3d_controller) <em>fazla ağır</em>; harita üstünde 100+ marker performansı keser.
              <br/><br/>
              <b style={{ color: 'var(--text)' }}>Statik geometri → <code className="k">CustomPainter</code>.</b>
              Kanat, beton trapez, panel hücreleri vektör olarak çizilir — sonsuz keskin, çok hafif.
              <br/><br/>
              <b style={{ color: 'var(--text)' }}>Hareket → <code className="k">AnimationController</code> + <code className="k">AnimatedBuilder</code>.</b>
              Her santral kendi controller'ını yönetir.
            </div>
          </div>

          {/* State Machine */}
          <div>
            <div style={{ font: '600 11px/1 var(--font)', color: 'var(--accent)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 10 }}>2 · State Makinesi</div>
            <pre style={{ font: '500 11px/1.55 var(--font-mono)', color: 'var(--text-2)', margin: 0, padding: 12, background: 'rgba(0,0,0,.35)', borderRadius: 8, border: '1px solid var(--border-2)', whiteSpace: 'pre-wrap' }}>
{`enum WindState  { idle, windy, editing }
enum SolarState { sun, cloud, night }

// Veri kaynağı: hava + UI etkileşimi
final wind = combine(
  weatherService.windSpeed,
  uiBus.editingPin,
);

// Controller hız hedefi:
//   idle    → 0
//   windy   → 1.0 turn/s
//   editing → 1.8 turn/s
_speed = Tween(target).animate(curve);`}
            </pre>
            <div style={{ font: '500 11.5px/1.55 var(--font)', color: 'var(--text-3)', marginTop: 10 }}>
              <b style={{ color: 'var(--text)' }}>Yumuşak hız geçişi</b> için <code className="k">AnimationController</code> içinde <code className="k">.animateTo(target, curve: Curves.easeOutCubic)</code>. CSS'teki <code className="k">useEased</code>'in birebir karşılığı.
            </div>
          </div>

          {/* Per-Plant Recipe */}
          <div>
            <div style={{ font: '600 11px/1 var(--font)', color: 'var(--accent)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 10 }}>3 · Tip Bazında Tarif</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10, font: '500 12px/1.5 var(--font)', color: 'var(--text-2)' }}>
              <div style={{ padding: 10, background: 'rgba(59,130,246,.08)', borderRadius: 8, borderLeft: '2px solid var(--wind)' }}>
                <b style={{ color: 'var(--wind-glow)' }}>Rüzgâr:</b> <code className="k">repeat()</code> controller +  <code className="k">RotationTransition</code>. <code className="k">controller.duration</code> hızla değişir; <code className="k">stop()</code> yerine <em>hız 0</em>'a animateTo → kanat son açıda durur.
              </div>
              <div style={{ padding: 10, background: 'rgba(245,158,11,.08)', borderRadius: 8, borderLeft: '2px solid var(--solar)' }}>
                <b style={{ color: 'var(--solar-glow)' }}>Güneş:</b> 3 ayrı controller. <code className="k">_shine.forward(from:0)</code> state değişince <em>bir kez</em>. <code className="k">Timer.periodic(10s)</code> → <code className="k">_wash.forward(from:0)</code>. Gece için <code className="k">AnimatedSwitcher</code> + <code className="k">FadeTransition</code> ile Moon widget.
              </div>
              <div style={{ padding: 10, background: 'rgba(6,182,212,.08)', borderRadius: 8, borderLeft: '2px solid var(--hydro)' }}>
                <b style={{ color: 'var(--hydro-glow)' }}>HES:</b> sadece <code className="k">CustomPainter</code> + tek <code className="k">repeat()</code> controller. Su şeritleri <code className="k">controller.value</code>'ye göre Y eksenine çizilir; havuz ripple'ları kapatılırsa olduğu gibi durur.
              </div>
            </div>
          </div>
        </div>

        <div style={{ marginTop: 18, padding: 14, background: 'rgba(0,0,0,.3)', borderRadius: 10, border: '1px solid var(--border-2)' }}>
          <div style={{ font: '600 11px/1 var(--font)', color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 8 }}>Performans Notları (Harita Üstünde 100+ Marker İçin)</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, font: '500 12px/1.55 var(--font)', color: 'var(--text-2)' }}>
            <div>• <b>Uzak zoom'da</b> animasyonları durdur — sadece <code className="k">CustomPaint</code>'in statik hali render edilir.</div>
            <div>• <b>Aynı tip pin</b> için <code className="k">RepaintBoundary</code> + paylaşımlı controller. Tek tick → N marker.</div>
            <div>• <b>Görünüm dışı</b> marker'lar <code className="k">TickerMode(enabled: false)</code> ile dondurulur.</div>
          </div>
        </div>
      </div>
    );

    // ─── Demos ─────────────────────────────────────────────────
    const WindDemoLive = () => {
      const [s, setS] = useState('windy');
      return (
        <Scene
          label={`Rüzgâr · ${s === 'idle' ? 'DURAĞAN' : s === 'windy' ? 'RÜZGÂR VAR' : 'EDIT MODU'}`}
          dotColor={s === 'editing' ? 'var(--accent)' : 'var(--wind)'}
          controls={
            <StateSwitcher
              value={s} onChange={setS}
              options={[
                { value: 'idle', label: 'Durağan' },
                { value: 'windy', label: 'Rüzgâr' },
                { value: 'editing', label: 'Edit' },
              ]}
            />
          }
        >
          <WindTurbine3D state={s} size={170}/>
        </Scene>
      );
    };

    const SolarDemoLive = () => {
      const [s, setS] = useState('sun');
      return (
        <Scene
          label={`Güneş · ${s === 'sun' ? 'GÜNEŞLİ' : s === 'cloud' ? 'BULUTLU GÜNDÜZ' : 'GECE'}`}
          dotColor={s === 'night' ? '#94A3B8' : s === 'cloud' ? '#64748B' : 'var(--solar)'}
          night={s === 'night'}
          cloud={s === 'cloud'}
          controls={
            <StateSwitcher
              value={s} onChange={setS}
              options={[
                { value: 'sun', label: 'Güneşli' },
                { value: 'cloud', label: 'Bulutlu' },
                { value: 'night', label: 'Gece' },
              ]}
            />
          }
        >
          <SolarPanel3D state={s} size={200}/>
        </Scene>
      );
    };

    const HydroDemoLive = () => (
      <Scene label="HES · SÜREKLİ AKIŞ" dotColor="var(--hydro)">
        <HydroDam3D size={220} flow={1.2}/>
      </Scene>
    );

    // Mini "harita" gibi 3'ü birden gösteren sahne
    const CombinedScene = () => {
      const [wind, setWind] = useState('windy');
      const [solar, setSolar] = useState('sun');
      return (
        <div className="scene" style={{ flexDirection: 'column' }}>
          <div className="state-pill">
            <span className="dot" style={{ background: 'var(--accent)' }}/>
            CANLI ÖRNEK · 3 SANTRAL
          </div>
          <div style={{ display: 'flex', gap: 70, alignItems: 'flex-end' }}>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
              <WindTurbine3D state={wind} size={130}/>
              <div className="scene-controls" style={{ position:'static', transform:'none' }}>
                {[
                  { value: 'idle', label: 'Durağan' },
                  { value: 'windy', label: 'Rüzgâr' },
                  { value: 'editing', label: 'Edit' },
                ].map(o => (
                  <button key={o.value} className={wind === o.value ? 'on' : ''} onClick={() => setWind(o.value)}>{o.label}</button>
                ))}
              </div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
              <SolarPanel3D state={solar} size={160}/>
              <div className="scene-controls" style={{ position:'static', transform:'none' }}>
                {[
                  { value: 'sun', label: 'Güneşli' },
                  { value: 'cloud', label: 'Bulutlu' },
                  { value: 'night', label: 'Gece' },
                ].map(o => (
                  <button key={o.value} className={solar === o.value ? 'on' : ''} onClick={() => setSolar(o.value)}>{o.label}</button>
                ))}
              </div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
              <HydroDam3D size={180} flow={1.2}/>
              <div className="scene-controls" style={{ position:'static', transform:'none', opacity: .6 }}>
                <button className="on">Sürekli</button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ─── App ──────────────────────────────────────────────────
    const App = () => {
      useTweaks(/*EDITMODE-BEGIN*/{
        "windSize": 170,
        "solarSize": 200
      }/*EDITMODE-END*/);

      return (
        <DesignCanvas title="SRRP · 3D Santral Görselleştirmeleri">
          <DCSection id="intro" title="00 · Brief & Tasarım Yorumu">
            <DCArtboard id="brief" label="Davranış kuralları" width={1240} height={340}><Intro/></DCArtboard>
          </DCSection>

          <DCSection id="wind" title="01 · Rüzgâr Türbini — 3 State">
            <DCArtboard id="w-idle" label="Durağan (rüzgâr yok)" width={420} height={420}>
              <Scene label="DURAĞAN" dotColor="rgba(255,255,255,.4)">
                <WindTurbine3D state="idle" size={170}/>
              </Scene>
            </DCArtboard>
            <DCArtboard id="w-windy" label="Rüzgâr var — döner" width={420} height={420}>
              <Scene label="RÜZGÂR VAR" dotColor="var(--wind)">
                <WindTurbine3D state="windy" size={170}/>
              </Scene>
            </DCArtboard>
            <DCArtboard id="w-edit" label="Edit/Ekleme anı — vurgu" width={420} height={420}>
              <Scene label="EDIT MODU" dotColor="var(--accent)">
                <WindTurbine3D state="editing" size={170}/>
              </Scene>
            </DCArtboard>
            <DCArtboard id="w-live" label="★ Canlı state değiştirici" width={520} height={420}>
              <WindDemoLive/>
            </DCArtboard>
          </DCSection>

          <DCSection id="solar" title="02 · Güneş Paneli — 3 State">
            <DCArtboard id="s-sun" label="Güneşli — tek seferlik parlama" width={420} height={420}>
              <Scene label="GÜNEŞLİ" dotColor="var(--solar)">
                <SolarPanel3D state="sun" size={200}/>
              </Scene>
            </DCArtboard>
            <DCArtboard id="s-cloud" label="Bulutlu gündüz — 10sn'de bir wash" width={420} height={420}>
              <Scene label="BULUTLU GÜNDÜZ" dotColor="#64748B" cloud>
                <SolarPanel3D state="cloud" size={200}/>
              </Scene>
            </DCArtboard>
            <DCArtboard id="s-night" label="Gece — siyah panel + ay" width={420} height={420}>
              <Scene label="GECE" dotColor="#94A3B8" night>
                <SolarPanel3D state="night" size={200}/>
              </Scene>
            </DCArtboard>
            <DCArtboard id="s-live" label="★ Canlı state değiştirici" width={520} height={420}>
              <SolarDemoLive/>
            </DCArtboard>
          </DCSection>

          <DCSection id="hydro" title="03 · HES — Beton + Akan Su">
            <DCArtboard id="h-1" label="Sürekli akış" width={520} height={460}>
              <HydroDemoLive/>
            </DCArtboard>
          </DCSection>

          <DCSection id="combined" title="04 · Üçü Birarada — Canlı Sahne">
            <DCArtboard id="c-1" label="Mini harita / tüm santraller" width={1100} height={540}>
              <CombinedScene/>
            </DCArtboard>
          </DCSection>

          <DCSection id="map" title="05 · Harita Üstü 3D Yerleşim — Yönlü">
            <DCArtboard id="map-1" label="★ 3D Terrain + Rüzgâr yönü + Güneş açısı + Akarsu" width={1280} height={760}>
              <TerrainMapDemo/>
            </DCArtboard>

            <DCArtboard id="map-notes" label="Yön & eğim modeli" width={520} height={760}>
              <div style={{ width: '100%', height: '100%', padding: 24, background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, color: 'var(--text)', overflow: 'auto' }}>
                <div style={{ font: '700 14px/1 var(--font)', marginBottom: 6 }}>Yön & eğim nasıl hesaplandı</div>
                <div style={{ font: '500 11.5px/1.5 var(--font)', color: 'var(--text-3)', marginBottom: 16 }}>Hava verisi → görsel davranış</div>

                <div style={{ marginBottom: 14, padding: 12, background: 'rgba(59,130,246,.08)', borderRadius: 8, borderLeft: '2px solid var(--wind)' }}>
                  <div style={{ font: '700 12px/1 var(--font)', color: 'var(--wind-glow)', marginBottom: 6 }}>RES · Rüzgâr Yönü (yaw)</div>
                  <div style={{ font: '500 11.5px/1.55 var(--font)', color: 'var(--text-2)' }}>
                    Her türbinin nacelle'i <code className="k">windDirection</code> derecesinde rotate edilir.
                    Rotor diski yönüne göre <em>foreshorten</em> olur — rüzgâra paralel bakıldığında ince çizgi, dik bakıldığında tam daire.
                    Hız: <code className="k">windSpeed × 110°/s</code>.
                  </div>
                </div>

                <div style={{ marginBottom: 14, padding: 12, background: 'rgba(245,158,11,.08)', borderRadius: 8, borderLeft: '2px solid var(--solar)' }}>
                  <div style={{ font: '700 12px/1 var(--font)', color: 'var(--solar-glow)', marginBottom: 6 }}>GES · Güneş Takibi</div>
                  <div style={{ font: '500 11.5px/1.55 var(--font)', color: 'var(--text-2)' }}>
                    Panel wrapper: <code className="k">rotateY(azimut)</code> + dinamik <code className="k">rotateX(tilt)</code>.
                    Optimum tilt ≈ <code className="k">90° − güneş yüksekliği</code> — sabah/akşam daha dik, öğlen daha yatık.
                    Gece state'inde panel siyahlaşır, sahnede Ay görünür.
                  </div>
                </div>

                <div style={{ marginBottom: 14, padding: 12, background: 'rgba(6,182,212,.08)', borderRadius: 8, borderLeft: '2px solid var(--hydro)' }}>
                  <div style={{ font: '700 12px/1 var(--font)', color: 'var(--hydro-glow)', marginBottom: 6 }}>HES · Akarsu Yatağı</div>
                  <div style={{ font: '500 11.5px/1.55 var(--font)', color: 'var(--text-2)' }}>
                    SVG <code className="k">&lt;path&gt;</code> ile yatak çizilir, su animasyonu <code className="k">strokeDasharray</code> + <code className="k">strokeDashoffset</code> ile path boyunca akar.
                    Barajın yukarısında rezervuar genişlemesi (radyal gradient gölü), aşağısında köpüklü mansap.
                    HES marker'ı path tangentine göre <em>rotateZ</em> ile hizalanır.
                  </div>
                </div>

                <div style={{ padding: 12, background: 'rgba(0,0,0,.3)', borderRadius: 8, border: '1px solid var(--border-2)' }}>
                  <div style={{ font: '700 11px/1 var(--font)', color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '.05em', marginBottom: 8 }}>Flutter Karşılığı</div>
                  <div style={{ font: '500 11.5px/1.55 var(--font)', color: 'var(--text-2)' }}>
                    Terrain plane = <code className="k">Transform(Matrix4..setEntry(3,2,0.001)..rotateX(MAP_TILT))</code>.<br/>
                    Marker'lar terrain'in çocukları; her biri <em>billboard</em> için <code className="k">rotateX(-MAP_TILT)</code>.<br/>
                    Rüzgâr/güneş canlı veri → <code className="k">ValueListenableBuilder</code> ile yalnızca etkilenen marker rebuild olur.
                    Akarsu Path'i <code className="k">PathMetric</code> ile parametrize edilir; HES'in tangenti <code className="k">getTangentForOffset(t)</code>.
                  </div>
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="flutter" title="06 · Flutter Mimari Önerisi">
            <DCArtboard id="f-1" label="Yaklaşım · State makinesi · Tip bazında tarif" width={1240} height={620}>
              <FlutterCard/>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
