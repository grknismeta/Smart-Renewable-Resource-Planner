<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SRRP — Responsive Prototip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="tokens.css"/>
  <style>
    body { background: #0B0E14; }
    @keyframes srrp-pulse {
      0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.6; }
      100% { transform: translate(-50%, -50%) scale(2.4); opacity: 0; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="suitability.jsx"></script>
  <script type="text/babel" src="map-time-sim.jsx"></script>
  <script type="text/babel" src="app-shell.jsx"></script>

  <script type="text/babel">
    const Intro = () => (
      <div style={{ width: 1100, padding: '24px 28px', background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 18, color: 'var(--text)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
          <div style={{ width: 36, height: 36, borderRadius: 10, background: 'linear-gradient(135deg, var(--solar), var(--wind))', display: 'grid', placeItems: 'center' }}>
            <Icon name="globe" size={18} color="white"/>
          </div>
          <div>
            <div style={{ font: '700 18px/1 var(--font)', letterSpacing: '-.01em' }}>SRRP · Uçtan Uca Responsive Prototip</div>
            <div style={{ font: '500 12px/1.4 var(--font)', color: 'var(--text-3)', marginTop: 4 }}>Desktop · Tablet · Mobile — aynı paylaşımlı state, üç farklı düzen.</div>
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5,1fr)', gap: 10, marginTop: 10 }}>
          {[
            ['Sol panel', 'Senaryolar + Pinlerim sekmeli'],
            ['Marker', 'Operasyon ↔ Trend + cluster'],
            ['Ekleme', 'Popover → detay panel'],
            ['Detay', 'Sağ panel / bottom sheet'],
            ['Kurulabilir Alanlar', '3 katman · tip toggle · eşik slider'],
          ].map(([k, v], i) => (
            <div key={i} style={{ padding: 10, background: 'rgba(0,0,0,.25)', borderRadius: 10, border: '1px solid var(--border-2)' }}>
              <div style={{ font: '500 10px/1 var(--font)', color: 'var(--accent)', textTransform: 'uppercase', letterSpacing: '.06em' }}>{k}</div>
              <div style={{ font: '500 12px/1.4 var(--font)', color: 'var(--text-2)', marginTop: 6 }}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 14, padding: 12, background: 'rgba(20,184,166,.06)', border: '1px solid rgba(20,184,166,.25)', borderRadius: 10, font: '500 12px/1.5 var(--font)', color: 'var(--text-2)' }}>
          <b style={{ color: 'var(--accent)' }}>Etkileşimli:</b> Pin'lere tıkla, sol paneldeki sekmeleri değiştir, marker mode toggle'ı dene, "Yeni Kaynak Ekle" butonuna bas — popover sonra detaylı panel açılır. <b style={{ color: 'var(--accent)' }}>"Kurulabilir Alanlar"</b> butonuna basınca 3 katmanlı overlay açılır: yeşil verim choropleth + dashed yeşil uygun alanlar + kırmızı taramalı yasaklı bölgeler. Tip değiştir (RES/GES/HES), eşik slider'ı kaydır, yasaklı bölge üstüne gel — neden olduğunu söyleyen tooltip görünür.
        </div>
      </div>
    );

    const App = () => (
      <DesignCanvas title="SRRP · Responsive Prototip">
        <DCSection id="intro" title="00 · Brief">
          <DCArtboard id="brief" label="Tasarım kararları" width={1100} height={250}>
            <Intro/>
          </DCArtboard>
        </DCSection>
        <DCSection id="desktop" title="01 · Desktop (1280×800)">
          <DCArtboard id="desktop-1" label="Harita + senaryo paneli + üretim özeti" width={1280} height={800}>
            <DesktopApp/>
          </DCArtboard>
        </DCSection>

        {/* ZAMAN SİMÜLASYONU v2 — Spotify mantığı: persistent mini + tap-to-expand */}
        <DCSection id="timesim" title="01b · ZAMAN SİMÜLASYONU · Kalıcı mini + açılır panel · 3 cihaz">
          <DCArtboard id="timesim-intro" label="Tasarım notu · neden yenilendi" width={1180} height={380}>
            <div style={{ width: '100%', padding: '20px 22px', background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 14, color: 'var(--text)' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
                <div style={{ width: 32, height: 32, borderRadius: 9, background: 'rgba(20,184,166,.16)', border: '1px solid rgba(20,184,166,.45)', display: 'grid', placeItems: 'center' }}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
                </div>
                <div>
                  <div style={{ font: '700 16px/1 var(--font)', letterSpacing: '-.01em' }}>Zaman Simülasyonu v2 · Spotify mantığı</div>
                  <div style={{ font: '500 11.5px/1.4 var(--font)', color: 'var(--text-3)', marginTop: 4 }}>Kalıcı mini bar (her zaman ▶/⏸ + canlı MW okuması) + tap-to-expand tam panel. Veri çözünürlüğü timeline'da görsel olarak ayrışır.</div>
                </div>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10, marginBottom: 10 }}>
                {[
                  ['MİNİ KONTROL', 'Kapalı haldeyken bile ▶/⏸ + canlı MW + tarih okunabilir, kapatılabilir'],
                  ['VERİ AYRIMI',  '2024 öncesi GÜNLÜK · 2024 sonrası SAATLİK — timeline\'da görsel ayrılır'],
                  ['HIZLI SEÇİM', '7 preset chip: Şimdi · 1sa · 6sa · 1g · 1h · 1a · 1y · 3y'],
                  ['HARİTAYI ÖRTMEZ', 'Web/Tablet sağ-alt floating, sabit genişlik; Mobile mini bar altta'],
                ].map(([k, v]) => (
                  <div key={k} style={{ padding: 10, background: 'rgba(0,0,0,.25)', borderRadius: 9, border: '1px solid var(--border-2)' }}>
                    <div style={{ font: '600 10px/1 var(--font-mono)', color: 'var(--accent)', letterSpacing: '.06em', marginBottom: 5 }}>{k}</div>
                    <div style={{ font: '500 11.5px/1.45 var(--font)', color: 'var(--text-2)' }}>{v}</div>
                  </div>
                ))}
              </div>
              <div style={{ padding: 11, background: 'rgba(20,184,166,.06)', border: '1px solid rgba(20,184,166,.25)', borderRadius: 9, font: '500 11.5px/1.5 var(--font)', color: 'var(--text-2)' }}>
                <b style={{ color: 'var(--accent)' }}>Açılış:</b> Sağ üst "Kurulabilir Alanlar" → Katmanlar panelinde "Zaman Simülasyonu" toggle. <b style={{ color: 'var(--accent)' }}>Etkileşim:</b> mini bar tıklanır → panel açılır; preset chip tıkla, timeline'ı sürükle, ▶ ile oynat. Speed 1× (1sa/sn) → 168× (1 hafta/sn). <b style={{ color: 'var(--accent)' }}>Mobil:</b> ekranın alt 56px'ini kullanır, panel açıldığında map'in üst kısmı görünmeye devam eder.
              </div>
              <div style={{ marginTop: 11, padding: '9px 11px', background: 'rgba(0,0,0,.30)', borderRadius: 9, border: '1px dashed var(--border-2)', font: '500 11px/1.5 var(--font)', color: 'var(--text-3)' }}>
                <b style={{ color: 'var(--text-2)' }}>Veri modeli:</b> Mar 2020 (en eski devreye alım) → 26 May 2026 (bugün). Pre-2024 portion günlük örneklenmiş, 2024+ saatlik. Capacity factor type'a göre dinamik: solar=güneş arc + mevsim, wind=diurnal+ters-mevsim, hydro=kar erimesi peak\'ı.
              </div>
            </div>
          </DCArtboard>

          {/* Standalone — mini state */}
          <DCArtboard id="timesim-mini-web" label="Web · MİNİ (her zaman görünür)" width={500} height={110}>
            <div style={{ padding: 18, background: 'linear-gradient(135deg, #1a2237 0%, #0f1421 100%)', borderRadius: 12, height: '100%', display: 'flex', alignItems: 'center' }}>
              <MapTimeSim pins={SAMPLE_PINS} variant="desktop" expanded={false} setExpanded={() => {}} onClose={() => {}}/>
            </div>
          </DCArtboard>
          <DCArtboard id="timesim-mini-mobile" label="Telefon · MİNİ (kalıcı bar)" width={410} height={110}>
            <div style={{ padding: 12, background: 'linear-gradient(135deg, #1a2237 0%, #0f1421 100%)', borderRadius: 12, height: '100%', display: 'flex', alignItems: 'flex-end' }}>
              <div style={{ width: '100%' }}>
                <MapTimeSim pins={SAMPLE_PINS} variant="mobile" expanded={false} setExpanded={() => {}} onClose={() => {}}/>
              </div>
            </div>
          </DCArtboard>

          {/* Standalone — expanded state */}
          <DCArtboard id="timesim-expanded-web" label="Web · AÇIK panel (440px, harita için yer bırakır)" width={500} height={460}>
            <div style={{ padding: 18, background: 'linear-gradient(135deg, #1a2237 0%, #0f1421 100%)', borderRadius: 12, height: '100%', display: 'flex', alignItems: 'flex-end' }}>
              <MapTimeSim pins={SAMPLE_PINS} variant="desktop" expanded={true} setExpanded={() => {}} onClose={() => {}}/>
            </div>
          </DCArtboard>
          <DCArtboard id="timesim-expanded-tablet" label="Tablet · AÇIK panel (400px)" width={460} height={460}>
            <div style={{ padding: 14, background: 'linear-gradient(135deg, #1a2237 0%, #0f1421 100%)', borderRadius: 12, height: '100%', display: 'flex', alignItems: 'flex-end' }}>
              <MapTimeSim pins={SAMPLE_PINS} variant="tablet" expanded={true} setExpanded={() => {}} onClose={() => {}}/>
            </div>
          </DCArtboard>
          <DCArtboard id="timesim-expanded-mobile" label="Telefon · AÇIK panel (sheet)" width={410} height={460}>
            <div style={{ padding: 8, background: 'linear-gradient(135deg, #1a2237 0%, #0f1421 100%)', borderRadius: 12, height: '100%', display: 'flex', alignItems: 'flex-end' }}>
              <div style={{ width: '100%' }}>
                <MapTimeSim pins={SAMPLE_PINS} variant="mobile" expanded={true} setExpanded={() => {}} onClose={() => {}}/>
              </div>
            </div>
          </DCArtboard>

          {/* In-app real placement */}
          <DCArtboard id="timesim-desktop-in-app" label="Web · gerçek haritada (sağ-alt, harita önde)" width={1280} height={800}>
            <DesktopAppWithTimeSim/>
          </DCArtboard>
          <DCArtboard id="timesim-tablet-in-app" label="Tablet · gerçek haritada" width={820} height={1180}>
            <TabletAppWithTimeSim/>
          </DCArtboard>
          <DCArtboard id="timesim-mobile-in-app" label="Telefon · gerçek haritada (mini bar persistent)" width={430} height={930}>
            <IOSDevice width={390} height={844} dark>
              <MobileAppWithTimeSim/>
            </IOSDevice>
          </DCArtboard>
        </DCSection>

        <DCSection id="tablet" title="02 · Tablet (820×1180 — iPad portrait)">
          <DCArtboard id="tablet-1" label="Compact rail + sekmeli panel" width={820} height={1180}>
            <TabletApp/>
          </DCArtboard>
        </DCSection>
        <DCSection id="mobile" title="03 · Mobile (390×844 — iPhone)">
          <DCArtboard id="mobile-1" label="Bottom-sheet'lerle akış" width={430} height={930}>
            <IOSDevice width={390} height={844} dark>
              <MobileApp/>
            </IOSDevice>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
