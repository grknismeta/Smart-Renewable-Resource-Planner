<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRRP | Enerji Planlama Sistemi</title>
  <style>
    :root {
      --primary-green: #00ff88;
      --deep-blue: #0a192f;
      --glass: rgba(255, 255, 255, 0.1);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at center, #112240 0%, #0a192f 100%);
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Arka Plan Animasyonu */
    .bg-animate {
      position: absolute;
      width: 200%;
      height: 200%;
      background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
      opacity: 0.1;
      animation: rotate 60s linear infinite;
      z-index: -1;
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* Ana Kart */
    .login-card {
      background: var(--glass);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      width: 400px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      animation: slideUp 1s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(to right, #00ff88, #60efff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 3px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #8892b0;
      margin-bottom: 30px;
    }

    /* ROI & HES İstatistikleri */
    .stats-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
      gap: 10px;
    }

    .stat-box {
      background: rgba(0, 255, 136, 0.05);
      border-radius: 12px;
      padding: 15px;
      flex: 1;
      border-bottom: 2px solid var(--primary-green);
    }

    .stat-value {
      display: block;
      font-weight: bold;
      color: var(--primary-green);
      font-size: 1.1rem;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #a8b2d1;
    }

    /* Butonlar */
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-primary {
      background: var(--primary-green);
      color: var(--deep-blue);
    }

    .btn-primary:hover {
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
      transform: scale(1.02);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #8892b0;
      color: white;
    }

    .btn-outline:hover {
      background: rgba(255, 255, 255, 0.05);
    }
  </style>
</head>

<body>

  <div class="bg-animate"></div>

  <div class="login-card">
    <h1>SRRP</h1>
    <div class="subtitle">Sustainable Renewable Resource Planner</div>

    <div class="stats-row">
      <div class="stat-box">
        <span class="stat-value">84%</span>
        <span class="stat-label">HES Verimliliği</span>
      </div>
      <div class="stat-box">
        <span class="stat-box">
          <span class="stat-value">4.2 Yıl</span>
          <span class="stat-label">Ort. ROI</span>
        </span>
      </div>
    </div>

    <button class="btn btn-primary">ANALİZE BAŞLA</button>
    <button class="btn btn-outline">Proje Detayları</button>

    <p style="font-size: 0.8rem; color: #495670; margin-top: 20px;">
      HES ve Maliyet Analiz Modülü Aktif
    </p>
  </div>

</body>

</html>
